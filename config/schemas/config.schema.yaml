$schema: "https://json-schema.org/draft/2020-12/schema"
title: Food Optimization Configuration Schema
description: |
  Schema for validating global food systems optimization model configurations.
  Based on config/default.yaml structure.
type: object
required:
  - planning_horizon
  - currency_base_year
  - downloads
  - netcdf
  - validation
  - food_incentives
  - optimal_taxes
  - land
  - water
  - fertilizer
  - residues
  - emissions
  - luc
  - crops
  - non_food_crops
  - multiple_cropping
  - macronutrients
  - byproducts
  - animal_products
  - grazing
  - food_groups
  - diet
  - biomass
  - trade
  - health
  - aggregation
  - countries
  - data
  - irrigation
  - animal_costs
  - crop_costs
  - solving
  - plotting
  - credentials
additionalProperties: false

properties:
  name:
    type: string
    pattern: "^[a-zA-Z0-9_-]+$"
    description: "Optional config name identifier (overrides default)"

  scenario_defs:
    type: string
    description: "Path to scenario definitions YAML file"

  planning_horizon:
    type: integer
    minimum: 2020
    maximum: 2100
    description: "Target year for optimization (e.g., 2030)"

  currency_base_year:
    type: integer
    minimum: 2020
    maximum: 2024
    description: "Base year for inflation-adjusted USD values"

  downloads:
    type: object
    required: [show_progress]
    additionalProperties: false
    properties:
      show_progress:
        type: boolean
        description: "Whether to show download progress bars"

  netcdf:
    type: object
    description: "NetCDF export settings for PyPSA network files"
    required: [float32, compression]
    additionalProperties: false
    properties:
      float32:
        type: boolean
        description: "Downcast float64 to float32 to reduce file size"
      compression:
        oneOf:
          - type: object
            additionalProperties: false
            properties:
              zlib:
                type: boolean
              complevel:
                type: integer
                minimum: 1
                maximum: 9
          - type: "null"
        description: "Compression settings passed to xarray.Dataset.to_netcdf; null disables compression"

  validation:
    type: object
    required:
      - use_actual_yields
      - use_actual_production
      - enforce_baseline_diet
      - land_slack
      - disable_new_cropland
      - disable_new_pasture
      - disable_spared_cropland
      - disable_spared_grassland
      - slack_marginal_cost
      - grassland_yield_multiplier
      - feed_efficiency_multiplier
      - production_year
      - production_stability
    additionalProperties: false
    properties:
      use_actual_yields:
        type: boolean
        description: "Use current-day (actual) yields as opposed to potential yields"
      use_actual_production:
        type: boolean
        description: "Use current-day crop harvested areas as well as animal production"
      enforce_baseline_diet:
        type: boolean
        description: "Set food consumption equal to current day values"
      land_slack:
        type: boolean
        description: "Enable land slack generators (allows exceeding regional land limits at cost)"
      disable_new_cropland:
        type: boolean
        description: "If true, no new land can supply the cropland pool"
      disable_new_pasture:
        type: boolean
        description: "If true, no new land can supply the pasture pool"
      disable_spared_cropland:
        type: boolean
        description: "If true, existing cropland cannot be allocated to spared-land sinks"
      disable_spared_grassland:
        type: boolean
        description: "If true, existing grassland cannot be allocated to spared-land sinks"
      slack_marginal_cost:
        type: number
        minimum: 0
        description: "bn USD per Mt/Mha for validation slack (food groups, feed, land)"
      grassland_yield_multiplier:
        type: number
        exclusiveMinimum: 0
        description: "Multiplier applied to effective grassland feed yields before adding grassland production links"
      feed_efficiency_multiplier:
        type: number
        exclusiveMinimum: 0
        description: "Multiplier applied to feed-to-animal efficiency values (product per feed)"
      production_year:
        type: integer
        minimum: 1990
        maximum: 2024
        description: "Reference year for production data"
      production_stability:
        type: object
        required: [enabled, penalty_mode, crops, animals]
        additionalProperties: false
        description: "Limit production deviation from baseline levels"
        properties:
          enabled:
            type: boolean
            description: "Whether to apply production stability bounds"
          penalty_mode:
            type: string
            enum: ["hard", "quadratic", "l1"]
            description: "hard = inequality bounds, quadratic = soft penalty in objective, l1 = linear absolute value penalty"
          quadratic_cost:
            type: number
            minimum: 0
            description: "Cost coefficient for quadratic deviation penalty (bn USD per deviation² unit)"
          l1_cost:
            type: number
            minimum: 0
            description: "Cost coefficient for L1 (absolute value) deviation penalty (bn USD per Mt deviation for absolute, bn USD per unit relative deviation for relative)"
          deviation_type:
            type: string
            enum: ["absolute", "relative"]
            description: "For quadratic: absolute = (P - B)², relative = ((P - B) / B)². For L1: absolute = |P - B|, relative = |(P - B) / B|"
          crops:
            type: object
            required: [enabled, max_relative_deviation, enable_slack]
            additionalProperties: false
            properties:
              enabled:
                type: boolean
                description: "Whether to apply crop production bounds"
              max_relative_deviation:
                type: number
                minimum: 0
                maximum: 1
                description: "Maximum relative deviation from baseline (e.g., 0.2 = ±20%)"
              enable_slack:
                type: boolean
                description: "Allow violating minimum production bounds at penalty cost (slack_marginal_cost)"
          animals:
            type: object
            required: [enabled, max_relative_deviation, enable_slack]
            additionalProperties: false
            properties:
              enabled:
                type: boolean
                description: "Whether to apply animal production bounds"
              max_relative_deviation:
                type: number
                minimum: 0
                maximum: 1
                description: "Maximum relative deviation from baseline (e.g., 0.2 = ±20%)"
              enable_slack:
                type: boolean
                description: "Allow violating minimum production bounds at penalty cost (slack_marginal_cost)"

  food_incentives:
    type: object
    required: [enabled, sources]
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        description: "When true, food-level incentives are applied to the objective"
      sources:
        type: array
        items:
          type: string
        description: "Paths to food incentives CSVs (may include {name} placeholder)"

  optimal_taxes:
    type: object
    required: [enabled]
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        description: "When true, enables the optimal taxes/subsidies workflow"

  land:
    type: object
    required: [regional_limit, filtering]
    additionalProperties: false
    properties:
      regional_limit:
        type: number
        minimum: 0
        maximum: 1
        description: "Fraction of each region's potential cropland that is made available"
      filtering:
        type: object
        required: [min_crop_yield_t_per_ha, min_grassland_yield_t_per_ha, min_area_ha]
        additionalProperties: false
        properties:
          min_crop_yield_t_per_ha:
            type: number
            minimum: 0
            description: "Minimum yield threshold for crop production links (t/ha)"
          min_grassland_yield_t_per_ha:
            type: number
            minimum: 0
            description: "Minimum yield threshold for grassland feed links (t/ha)"
          min_area_ha:
            type: number
            minimum: 0
            description: "Minimum land area threshold (ha)"

  water:
    type: object
    required: [supply_scenario, huang_reference_year]
    additionalProperties: false
    properties:
      supply_scenario:
        type: string
        enum: [sustainable, current_use]
        description: |
          Water supply scenario determining which dataset is used for regional water limits:
          - 'sustainable': Water Footprint Network blue water availability (Hoekstra & Mekonnen 2011)
          - 'current_use': Huang et al. (2018) gridded irrigation water withdrawals
      huang_reference_year:
        type: integer
        minimum: 1971
        maximum: 2010
        description: "Reference year for Huang irrigation data (only used when supply_scenario is 'current_use')"

  fertilizer:
    type: object
    required:
      - limit
      - marginal_cost_usd_per_tonne
      - n_percentile
      - manure_n_to_fertilizer
    additionalProperties: false
    properties:
      limit:
        type: number
        minimum: 0
        description: "Maximum global use of synthetic fertilizer in t-N"
      marginal_cost_usd_per_tonne:
        type: number
        minimum: 0
        description: "USD per t-N of synthetic fertilizer"
      n_percentile:
        type: integer
        minimum: 0
        maximum: 100
        description: "Percentile of global FUBC data for high-input systems"
      manure_n_to_fertilizer:
        type: number
        minimum: 0
        maximum: 1
        description: "Fraction of N excreted in confined quarters available as fertilizer"

  residues:
    type: object
    required: [max_feed_fraction, max_feed_fraction_by_region]
    additionalProperties: false
    properties:
      max_feed_fraction:
        type: number
        minimum: 0
        maximum: 1
        description: "Maximum fraction of residues that can be removed for animal feed"
      max_feed_fraction_by_region:
        type: object
        additionalProperties: false
        patternProperties:
          ".*":
            type: number
            minimum: 0
            maximum: 1
            description: "Override fraction by ISO3 country code or M49 region/sub-region name"

  emissions:
    type: object
    required:
      - ghg_pricing_enabled
      - ghg_price
      - ch4_to_co2_factor
      - n2o_to_co2_factor
      - rice
      - fertilizer
      - residues
    additionalProperties: false
    properties:
      ghg_pricing_enabled:
        type: boolean
        description: "Whether to include GHG pricing in the objective function"
      ghg_price:
        type: number
        minimum: 0
        description: "USD/tCO2-eq (emissions stored in MtCO2-eq internally)"
      ch4_to_co2_factor:
        type: number
        minimum: 0
        description: "IPCC AR6 GWP100 for CH4"
      n2o_to_co2_factor:
        type: number
        minimum: 0
        description: "IPCC AR6 GWP100 for N2O"
      rice:
        type: object
        required:
          - methane_emission_factor_kg_per_ha
          - rainfed_wetland_rice_ch4_scaling_factor
        additionalProperties: false
        properties:
          methane_emission_factor_kg_per_ha:
            type: number
            minimum: 0
            description: "kg CH4 per ha per crop (IPCC 2019)"
          rainfed_wetland_rice_ch4_scaling_factor:
            type: number
            minimum: 0
            description: "Scaling factor for rainfed rice (IPCC 2019)"
      fertilizer:
        type: object
        required:
          - synthetic_n2o_factor
          - indirect_ef4
          - indirect_ef5
          - frac_gasf
          - frac_gasm
          - frac_leach
        additionalProperties: false
        properties:
          synthetic_n2o_factor:
            type: number
            minimum: 0
            description: "kg N2O-N per kg N input (IPCC 2019)"
          indirect_ef4:
            type: number
            minimum: 0
            description: "kg N2O-N per kg (NH3-N + NOx-N) volatilized (IPCC 2019)"
          indirect_ef5:
            type: number
            minimum: 0
            description: "kg N2O-N per kg N leached/runoff (IPCC 2019)"
          frac_gasf:
            type: number
            minimum: 0
            maximum: 1
            description: "Fraction of synthetic fertilizer N volatilized as NH3 and NOx"
          frac_gasm:
            type: number
            minimum: 0
            maximum: 1
            description: "Fraction of organic N and grazing N volatilized"
          frac_leach:
            type: number
            minimum: 0
            maximum: 1
            description: "Fraction of applied/deposited N lost through leaching"
      residues:
        type: object
        required: [incorporation_n2o_factor]
        additionalProperties: false
        properties:
          incorporation_n2o_factor:
            type: number
            minimum: 0
            description: "kg N2O-N per kg residue N incorporated into soil"

  luc:
    type: object
    required:
      - horizon_years
      - managed_flux_mode
      - forest_fraction_threshold
      - spared_land_agb_threshold_tc_per_ha
      - cropland_source
    additionalProperties: false
    properties:
      horizon_years:
        type: integer
        minimum: 1
        description: "Time horizon for land use change accounting (years)"
      managed_flux_mode:
        type: string
        enum: [zero]
        description: "How to treat ongoing emissions from managed agricultural land (currently only 'zero' is implemented, which assumes no net flux from existing agricultural land)"
      forest_fraction_threshold:
        type: number
        minimum: 0
        maximum: 1
        description: "Minimum forest fraction to apply regrowth sequestration"
      spared_land_agb_threshold_tc_per_ha:
        type: number
        minimum: 0
        description: "Max AGB (tC/ha) for spared land eligibility"
      cropland_source:
        type: string
        enum: [gaez, esa]
        description: "Data source for cropland baseline: 'gaez' (RES06-HAR harvested area) or 'esa' (satellite land cover)"

  crops:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      pattern: "^[a-z0-9-]+$"
    description: "List of crop names to include in the model"

  non_food_crops:
    type: array
    uniqueItems: true
    items:
      type: string
      pattern: "^[a-z0-9-]+$"
    description: "Crops not intended for human food (e.g. fodder, biomass); excluded from foods.csv validation"

  multiple_cropping:
    type: object
    patternProperties:
      "^[a-z0-9_]+$":
        oneOf:
          - type: "null"
          - type: object
            required: [crops, water_supplies]
            additionalProperties: false
            properties:
              crops:
                type: array
                minItems: 2
                maxItems: 3
                items:
                  type: string
              water_supplies:
                type: array
                minItems: 2
                maxItems: 3
                items:
                  type: string
                  enum: [r, i]
    description: "Multiple cropping systems (double cropping)"

  macronutrients:
    type: object
    additionalProperties: false
    patternProperties:
      "^(carb|protein|fat|cal)$":
        type: object
        additionalProperties: false
        patternProperties:
          "^(min|max|equal)$":
            type: number
            minimum: 0
            description: "g/person/day or kcal/person/day"
    description: "Optional macronutrient constraints (min/max/equal in g or kcal per person per day)"

  byproducts:
    type: array
    uniqueItems: true
    items:
      type: string
      pattern: "^[a-z0-9-]+$"
    description: "Foods not for direct human consumption (excluded from food group tracking)"

  animal_products:
    type: object
    required:
      - include
      - feed_efficiency_regions
      - net_to_metabolizable_energy_conversion
      - carcass_to_retail_meat
      - feed_proxy_map
      - residue_crops
    additionalProperties: false
    properties:
      include:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          type: string
          pattern: "^[a-z0-9-]+$"
        description: "Animal products to include in the model"
      feed_efficiency_regions:
        oneOf:
          - type: array
            items:
              type: string
              enum:
                - East Asia
                - East Europe
                - Latin America & Caribbean
                - North Africa & West Asia
                - North America & Oceania
                - South & Central Asia
                - Sub-Saharan Africa
                - West Europe
          - type: "null"
        description: "Regions for averaging feed conversion efficiencies (list) or null for country-specific regional values"
      net_to_metabolizable_energy_conversion:
        type: object
        required: [k_m, k_g, k_l]
        additionalProperties: false
        properties:
          k_m:
            type: number
            minimum: 0
            maximum: 1
            description: "Maintenance efficiency"
          k_g:
            type: number
            minimum: 0
            maximum: 1
            description: "Growth efficiency"
          k_l:
            type: number
            minimum: 0
            maximum: 1
            description: "Lactation efficiency (dairy)"
      carcass_to_retail_meat:
        type: object
        required:
          - meat-cattle
          - meat-pig
          - meat-chicken
          - eggs
          - dairy
        additionalProperties: false
        patternProperties:
          "^[a-z0-9-]+$":
            type: number
            minimum: 0
            maximum: 1
            description: "kg retail product per kg carcass/raw product"
      feed_proxy_map:
        type: object
        additionalProperties: false
        patternProperties:
          "^[a-z0-9-]+$":
            type: string
            pattern: "^[a-z0-9-]+$"
            description: "Source product whose feed requirements are reused"
        description: "Mapping of proxy animal products to source products"
      residue_crops:
        type: array
        uniqueItems: true
        items:
          type: string
          pattern: "^[a-z0-9-]+$"
        description: "Crops that produce residues usable as animal feed"

  grazing:
    type: object
    required: [enabled, isimip_utilization_rate]
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        description: "Whether to enable grazing in the model"
      isimip_utilization_rate:
        type: number
        minimum: 0
        maximum: 1
        description: "Utilization rate applied to ISIMIP grassland yields in the merge step"

  food_groups:
    type: object
    required: [included, constraints, equal_by_country_source, max_per_capita, fix_within_group_ratios]
    additionalProperties: false
    properties:
      included:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          type: string
          pattern: "^[a-z0-9_]+$"
        description: "Food groups to track in the model"
      constraints:
        type: object
        patternProperties:
          "^[a-z0-9_]+$":
            type: object
            additionalProperties: false
            patternProperties:
              "^(min|max|equal)$":
                type: number
                minimum: 0
                description: "g/person/day"
        description: "Optional per-group constraints with min/max/equal in g/person/day"
      equal_by_country_source:
        type:
          - string
          - "null"
        description: "CSV path with group/country equality targets (g/person/day)"
      max_per_capita:
        type: object
        patternProperties:
          "^[a-z0-9_]+$":
            type: number
            minimum: 0
        description: "Per-group maximum consumption caps in g/person/day, applied as e_nom_max on stores"
      fix_within_group_ratios:
        type: object
        required: [enabled]
        additionalProperties: false
        description: "Fix relative food contributions within each food group based on baseline consumption ratios"
        properties:
          enabled:
            type: boolean
            description: "Whether to fix within-group food ratios from baseline data"

  diet:
    type: object
    required: [baseline_age, baseline_reference_year]
    additionalProperties: false
    properties:
      baseline_age:
        type: string
        description: "Age group for baseline diet (e.g., 'All ages')"
      baseline_reference_year:
        type: integer
        minimum: 1990
        maximum: 2019
        description: "Reference year for baseline diet"
      fbs_override_foods:
        type: array
        uniqueItems: true
        default: []
        items:
          type: string
          pattern: "^[a-z0-9-]+$"
        description: "Foods whose consumption is overridden with waste-corrected FAOSTAT FBS supply data"

  biomass:
    type: object
    required: [crops, marginal_cost]
    additionalProperties: false
    properties:
      crops:
        type: array
        uniqueItems: true
        items:
          type: string
          pattern: "^[a-z0-9-]+$"
        description: "Crops available for biomass export"
      marginal_cost:
        type: number
        minimum: 0
        description: "Revenue in USD per tonne dry matter exported to energy sector"

  trade:
    type: object
    required:
      - hubs
      - crop_default_trade_cost_per_km
      - crop_trade_cost_categories
      - non_tradable_crops
      - food_default_trade_cost_per_km
      - food_trade_cost_categories
      - non_tradable_foods
      - feed_default_trade_cost_per_km
      - feed_trade_cost_categories
      - non_tradable_feeds
    additionalProperties: false
    properties:
      hubs:
        type: integer
        minimum: 1
        description: "Number of trade hubs (shared across crop, food, and feed trade)"
      crop_default_trade_cost_per_km:
        type: number
        minimum: 0
        description: "USD per tonne per km (default for unlisted crops)"
      crop_trade_cost_categories:
        type: object
        patternProperties:
          "^[a-z0-9_]+$":
            type: object
            required: [cost_per_km, crops]
            additionalProperties: false
            properties:
              cost_per_km:
                type: number
                minimum: 0
                description: "USD per tonne per km"
              crops:
                type: array
                items:
                  type: string
                  pattern: "^[a-z0-9-]+$"
      non_tradable_crops:
        type: array
        uniqueItems: true
        items:
          type: string
          pattern: "^[a-z0-9-]+$"
        description: "Crops that cannot be traded"
      food_default_trade_cost_per_km:
        type: number
        minimum: 0
        description: "USD per tonne per km (default for unlisted foods)"
      food_trade_cost_categories:
        type: object
        patternProperties:
          "^[a-z0-9_]+$":
            type: object
            required: [cost_per_km, foods]
            additionalProperties: false
            properties:
              cost_per_km:
                type: number
                minimum: 0
                description: "USD per tonne per km"
              foods:
                type: array
                items:
                  type: string
                  pattern: "^[a-z0-9-]+$"
      non_tradable_foods:
        type: array
        uniqueItems: true
        items:
          type: string
          pattern: "^[a-z0-9-]+$"
        description: "Foods that cannot be traded"
      feed_default_trade_cost_per_km:
        type: number
        minimum: 0
        description: "USD per tonne per km (default for unlisted feeds)"
      feed_trade_cost_categories:
        type: object
        patternProperties:
          "^[a-z0-9_]+$":
            type: object
            required: [cost_per_km, feeds]
            additionalProperties: false
            properties:
              cost_per_km:
                type: number
                minimum: 0
                description: "USD per tonne per km"
              feeds:
                type: array
                items:
                  type: string
                  pattern: "^[a-z0-9_]+$"
      non_tradable_feeds:
        type: array
        uniqueItems: true
        items:
          type: string
          pattern: "^[a-z0-9_]+$"
        description: "Feeds that cannot be traded"

  health:
    type: object
    required:
      - enabled
      - region_clusters
      - reference_year
      - intake_grid_points
      - log_rr_points
      - omega3_per_100g_fish
      - ssb_sugar_g_per_100g
      - value_per_yll
      - intake_cap_g_per_day
      - risk_factors
      - causes
      - risk_cause_map
      - clustering
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        description: "Whether to include health costs in the objective function"
      region_clusters:
        type: integer
        minimum: 1
        description: "Number of health clusters"
      reference_year:
        type: integer
        minimum: 1990
        maximum: 2018
        description: "Reference year for health data"
      intake_grid_points:
        type: integer
        minimum: 2
        description: "Number of intake grid points over empirical RR data range"
      log_rr_points:
        type: integer
        minimum: 1
        description: "Number of points for log relative risk interpolation"
      intake_age_min:
        type: integer
        minimum: 0
        description: "Lower bound (inclusive) of age buckets used for intake weighting"
      omega3_per_100g_fish:
        type: number
        minimum: 0
        description: "g omega-3 per 100g fish"
      ssb_sugar_g_per_100g:
        type: number
        minimum: 0
        description: "g sugar per 100g sugar-sweetened beverage"
      value_per_yll:
        type: number
        minimum: 0
        description: "USD per year of life lost"
      intake_cap_g_per_day:
        type: number
        minimum: 0
        description: "Uniform generous cap applied to intake grids for all risk factors"
      risk_factors:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          type: string
          pattern: "^[a-z0-9_]+$"
        description: "Dietary risk factors to consider (must match GDD data items)"
      causes:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          type: string
          pattern: "^[A-Za-z0-9]+$"
        description: "Health outcomes/causes to consider (IHME GBD codes)"
      risk_cause_map:
        type: object
        description: "Explicit mapping from risk_factor to list of causes it affects"
        additionalProperties:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            pattern: "^[A-Za-z0-9]+$"
      clustering:
        type: object
        required:
          - gdp_reference_year
          - weights
        additionalProperties: false
        properties:
          gdp_reference_year:
            type: integer
            minimum: 1990
            maximum: 2030
            description: "Reference year for GDP per capita data used in clustering"
          weights:
            type: object
            required:
              - geography
              - gdp
              - population
            additionalProperties: false
            properties:
              geography:
                type: number
                minimum: 0
                description: "Weight for geographic proximity in clustering"
              gdp:
                type: number
                minimum: 0
                description: "Weight for GDP per capita similarity in clustering"
              population:
                type: number
                minimum: 0
                description: "Weight for population balance in clustering"

  aggregation:
    type: object
    required:
      - regions
      - simplify_tolerance_km
      - simplify_min_area_km
      - resource_class_quantiles
      - irrigated_area_source
    additionalProperties: false
    properties:
      regions:
        type: object
        required: [target_count, allow_cross_border, method]
        additionalProperties: false
        properties:
          target_count:
            type: integer
            minimum: 1
            description: "Target number of regions to create through clustering"
          allow_cross_border:
            type: boolean
            description: "Whether to allow regions to cross country borders (false = cluster within each country separately)"
          method:
            type: string
            enum: [kmeans, agglomerative]
            description: "Clustering method: 'kmeans' (faster, default) or 'agglomerative' (hierarchical clustering with ward linkage)"
      simplify_tolerance_km:
        type: number
        minimum: 0
        description: "Tolerance for geometry simplification (km)"
      simplify_min_area_km:
        type: number
        minimum: 0
        description: "Minimum area for simplified geometries (km²)"
      resource_class_quantiles:
        type: array
        minItems: 1
        items:
          type: number
          minimum: 0
          maximum: 1
        description: "Quantiles for resource class binning"
      irrigated_area_source:
        type: string
        enum: [current, potential]
        description: "Data source for irrigated land area: 'current' uses GAEZ land equipped for irrigation, 'potential' uses crop-specific irrigated suitability rasters"

  countries:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      pattern: "^[A-Z]{3}$"
    description: "ISO 3166-1 alpha-3 country codes to include in the model"

  data:
    type: object
    required: [gaez, usda, land_cover, faostat, luicube, soilgrids]
    additionalProperties: false
    properties:
      gaez:
        type: object
        required:
          - climate_model
          - climate_model_ensemble
          - period
          - climate_scenario
          - input_level
          - yield_var
          - water_requirement_var
          - suitability_var
        additionalProperties: false
        properties:
          climate_model:
            type: string
            description: "GAEZ v5 climate model (specific GCM)"
          climate_model_ensemble:
            type: string
            description: "GAEZ v5 ensemble model"
          period:
            type: string
            pattern: "^(FP|HP)[0-9]{4}$"
            description: "GAEZ v5 time period (e.g., FP2140, HP0120)"
          climate_scenario:
            type: string
            enum: [SSP126, SSP370, SSP585, HIST]
            description: "GAEZ v5 climate scenario"
          input_level:
            type: string
            enum: [H, L]
            description: "GAEZ v5 input level (H=High, L=Low)"
          yield_var:
            type: string
            description: "GAEZ v5 yield variable code"
          water_requirement_var:
            type: string
            description: "GAEZ v5 water requirement variable code"
          suitability_var:
            type: string
            description: "GAEZ v5 suitability variable code"
      usda:
        type: object
        required: [retrieve_nutrition, nutrients]
        additionalProperties: false
        properties:
          retrieve_nutrition:
            type: boolean
            description: "Whether to fetch nutrition data from USDA API"
          nutrients:
            type: object
            required: [protein, carb, fat, cal]
            additionalProperties: false
            properties:
              protein:
                type: string
              carb:
                type: string
              fat:
                type: string
              cal:
                type: string
      land_cover:
        type: object
        required: [year, version]
        additionalProperties: false
        properties:
          year:
            type: string
            pattern: "^[0-9]{4}$"
            description: "Year for land cover data"
          version:
            type: string
            description: "Version of land cover dataset"
      faostat:
        type: object
        required: [qcl_production_element_code, fbs_food_supply_element_code]
        additionalProperties: false
        properties:
          qcl_production_element_code:
            type: integer
            description: "FAOSTAT element code for 'Production' in tonnes (QCL dataset)"
          fbs_food_supply_element_code:
            type: integer
            description: "FAOSTAT element code for 'Food supply quantity (kg/capita/yr)' in FBS dataset"
      luicube:
        type: object
        required: [year]
        additionalProperties: false
        properties:
          year:
            type: string
            pattern: "^[0-9]{4}$"
            description: "Year for LUIcube grassland data (Matej et al. 2025)"
      soilgrids:
        type: object
        required: [target_resolution_m]
        additionalProperties: false
        properties:
          target_resolution_m:
            type: integer
            minimum: 1000
            description: "Target resolution in meters"

  irrigation:
    type: object
    required: [irrigated_crops]
    additionalProperties: false
    properties:
      irrigated_crops:
        oneOf:
          - type: string
            const: all
          - type: array
            uniqueItems: true
            items:
              type: string
              pattern: "^[a-z0-9-]+$"
        description: "Which crops are allowed irrigated production ('all' or list)"

  animal_costs:
    type: object
    required: [averaging_period, fadn, usda, faostat]
    additionalProperties: false
    properties:
      averaging_period:
        type: object
        required: [start_year, end_year]
        additionalProperties: false
        properties:
          start_year:
            type: integer
            minimum: 1900
          end_year:
            type: integer
            minimum: 1900
      fadn:
        type: object
        required:
          - high_cost_threshold_usd_per_mt
          - livestock_specific_costs
          - shared_farm_costs
          - exclude_costs
        additionalProperties: false
        properties:
          high_cost_threshold_usd_per_mt:
            type: number
            minimum: 0
          livestock_specific_costs:
            type: object
            patternProperties:
              "^SE[0-9]+$":
                type: string
          shared_farm_costs:
            type: object
            patternProperties:
              "^SE[0-9]+$":
                type: string
          grazing_cost_items:
            type: object
            patternProperties:
              "^SE[0-9]+$":
                type: string
          exclude_costs:
            type: object
            patternProperties:
              "^SE[0-9]+$":
                type: string
      usda:
        type: object
        required:
          - request_timeout_seconds
          - dressed_weight_kg_per_head
          - include_items
          - exclude_items
          - grazing_cost_items
        additionalProperties: false
        properties:
          request_timeout_seconds:
            type: integer
            minimum: 1
          dressed_weight_kg_per_head:
            type: object
            patternProperties:
              "^[a-z0-9-]+$":
                type: number
                minimum: 0
          include_items:
            type: array
            items:
              type: string
          exclude_items:
            type: array
            items:
              type: string
          grazing_cost_items:
            type: array
            items:
              type: string
      faostat:
        type: object
        required: [aggregate_area_code_limit, element_codes]
        additionalProperties: false
        properties:
          aggregate_area_code_limit:
            type: integer
            minimum: 1
          element_codes:
            type: object
            required: [production, stocks, producing_animals]
            additionalProperties: false
            properties:
              production:
                type: array
                items:
                  type: string
              stocks:
                type: array
                items:
                  type: string
              producing_animals:
                type: array
                items:
                  type: string

  crop_costs:
    type: object
    required: [averaging_period, fadn, usda]
    additionalProperties: false
    properties:
      averaging_period:
        type: object
        required: [start_year, end_year]
        additionalProperties: false
        properties:
          start_year:
            type: integer
            minimum: 1900
          end_year:
            type: integer
            minimum: 1900
      fadn:
        type: object
        required:
          - per_year_costs
          - per_planting_costs
          - exclude_costs
          - crop_groups
        additionalProperties: false
        properties:
          per_year_costs:
            type: object
            patternProperties:
              "^SE[0-9]+$":
                type: string
          per_planting_costs:
            type: object
            patternProperties:
              "^SE[0-9]+$":
                type: string
          exclude_costs:
            type: object
            patternProperties:
              "^SE[0-9]+$":
                type: string
          crop_groups:
            type: object
            patternProperties:
              "^[A-Za-z0-9 &]+$":
                type: object
                required: [outputs, area, crops]
                additionalProperties: false
                properties:
                  outputs:
                    type: array
                    items:
                      type: string
                      pattern: "^SE[0-9]+$"
                  area:
                    type: string
                    pattern: "^SE[0-9]+$"
                  crops:
                    type: array
                    items:
                      type: string
                      pattern: "^SE[0-9]+$"
      usda:
        type: object
        required:
          - request_timeout_seconds
          - per_year_costs
          - per_planting_costs
          - exclude_items
        additionalProperties: false
        properties:
          request_timeout_seconds:
            type: integer
            minimum: 1
          per_year_costs:
            type: array
            items:
              type: string
          per_planting_costs:
            type: array
            items:
              type: string
          exclude_items:
            type: array
            items:
              type: string

  solving:
    type: object
    required: [solver, io_api, threads, calculate_fixed_duals, options_gurobi, options_highs]
    additionalProperties: false
    properties:
      solver:
        type: string
        enum: [highs, gurobi, cplex]
        description: "Linear programming solver"
      io_api:
        type: ["string", "null"]
        enum: [lp, mps, direct, null]
        description: "How the model is communicated to the solver"
      threads:
        type: integer
        minimum: 1
        description: "Number of threads for the solver"
      calculate_fixed_duals:
        type: boolean
        description: "Solve MILP, fix integer variables, then resolve as LP to obtain dual variables"
      options_gurobi:
        type: object
        patternProperties:
          "^[A-Za-z0-9_]+$":
            oneOf:
              - type: number
              - type: string
        description: "Gurobi solver options"
      options_highs:
        type: object
        patternProperties:
          "^[a-z_]+$":
            oneOf:
              - type: number
              - type: string
        description: "HiGHS solver options"

  plotting:
    type: object
    required: [colors, fallback_cmaps, comparison_scenarios]
    additionalProperties: false
    properties:
      comparison_scenarios:
        oneOf:
          - type: string
            const: "all"
          - type: array
            minItems: 1
            items:
              type: string
              pattern: "^scen-.*"
        description: "Scenario wildcards (suffixes after 'model_') available for comparison plots. Use 'all' to compare all scenarios defined in scenario_defs."
      colors:
        type: object
        required: [crops, food_groups]
        additionalProperties: false
        properties:
          crops:
            type: object
            patternProperties:
              "^[a-z0-9-]+$":
                type: string
                pattern: "^#[0-9A-Fa-f]{6}$"
            description: "Hex color codes for each crop"
          food_groups:
            type: object
            patternProperties:
              "^[a-z0-9_]+$":
                type: string
                pattern: "^#[0-9A-Fa-f]{6}$"
            description: "Hex color codes for each food group"
      fallback_cmaps:
        type: object
        required: [crops]
        additionalProperties: false
        properties:
          crops:
            type: string
            description: "Matplotlib colormap name for crops without specified colors"

  credentials:
    type: object
    required: [usda, ecmwf]
    additionalProperties: false
    description: "API credentials for external data sources (configure via config/secrets.yaml or environment variables)"
    properties:
      usda:
        type: object
        required: [api_key]
        additionalProperties: false
        properties:
          api_key:
            type: string
            minLength: 1
            description: "USDA FoodData Central API key (or set USDA_API_KEY env var)"
      ecmwf:
        type: object
        required: [url, key]
        additionalProperties: false
        properties:
          url:
            type: string
            minLength: 1
            format: uri
            description: "ECMWF datastores API URL (or set ECMWF_DATASTORES_URL env var)"
          key:
            type: string
            minLength: 1
            description: "ECMWF datastores API key (or set ECMWF_DATASTORES_KEY env var)"

  sensitivity:
    type: object
    additionalProperties: false
    description: "Sensitivity analysis adjustment factors applied to network components"
    properties:
      crop_yields:
        type: object
        additionalProperties: false
        description: "Multiplicative factors for crop production yields"
        properties:
          all:
            type: number
            minimum: 0
            description: "Factor applied to all crops"
          by_crop:
            type: object
            additionalProperties:
              type: number
              minimum: 0
            description: "Per-crop factors (applied after 'all')"
      emission_factors:
        type: object
        additionalProperties: false
        description: "Multiplicative factors for emission efficiencies"
        properties:
          ch4:
            type: number
            minimum: 0
            description: "Factor for CH4 emissions from animal production"
          n2o:
            type: number
            minimum: 0
            description: "Factor for N2O emissions from animal production"
          luc:
            type: number
            minimum: 0
            description: "Factor for CO2 from land-use change"
      costs:
        type: object
        additionalProperties: false
        description: "Multiplicative factors for production costs"
        properties:
          crop:
            type: number
            minimum: 0
            description: "Factor for crop production marginal costs"
          animal:
            type: number
            minimum: 0
            description: "Factor for animal production marginal costs"
      health_relative_risk:
        type: object
        additionalProperties:
          type: number
          minimum: 0
          maximum: 1
        description: >
          Per-risk-factor quantile values in [0, 1] interpolating between GBD
          rr_low (q=0) and rr_high (q=1) for each dose-response curve.

# Disallow enabling the health objective while also enforcing fixed baseline diet
allOf:
  - not:
      required: [health, validation]
      properties:
        health:
          properties:
            enabled:
              const: true
        validation:
          properties:
            enforce_baseline_diet:
              const: true
