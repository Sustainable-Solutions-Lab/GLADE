$schema: "https://json-schema.org/draft/2020-12/schema"
title: Food Optimization Configuration Schema
description: |
  Schema for validating global food systems optimization model configurations.
  Based on config/default.yaml structure.
type: object
required:
  - planning_horizon
  - baseline_year
  - currency_base_year
  - downloads
  - paths
  - netcdf
  - validation
  - consumer_values
  - food_incentives
  - food_utility_piecewise
  - optimal_taxes
  - land
  - water
  - fertilizer
  - residues
  - emissions
  - luc
  - crops
  - non_food_crops
  - multiple_cropping
  - macronutrients
  - byproducts
  - animal_products
  - fodder_decomposition
  - grazing
  - food_groups
  - diet
  - biomass
  - trade
  - health
  - aggregation
  - countries
  - data
  - irrigation
  - costs
  - animal_costs
  - crop_costs
  - cost_calibration
  - solving
  - remote_solve
  - plotting
  - credentials
additionalProperties: false

properties:
  name:
    type: string
    pattern: "^[a-zA-Z0-9_-]+$"
    description: "Optional config name identifier (overrides default)"

  scenarios:
    type: object
    additionalProperties: true
    description: "Inline scenario definitions (overrides applied per scenario)"

  planning_horizon:
    type: integer
    minimum: 2020
    maximum: 2100
    description: "Target year for optimization. Controls population projections (UN WPP) and GDP clustering (IMF WEO)."

  baseline_year:
    type: integer
    minimum: 2010
    maximum: 2020
    description: "Reference year for observed baseline data. Controls FAOSTAT production, GDD dietary intake, GBD health data, ESA CCI land cover, and LUIcube grassland data."

  currency_base_year:
    type: integer
    minimum: 2020
    maximum: 2024
    description: "Base year for inflation-adjusted USD values"

  downloads:
    type: object
    required: [show_progress]
    additionalProperties: false
    properties:
      show_progress:
        type: boolean
        description: "Whether to show download progress bars"

  paths:
    type: object
    required: [results_root, processing_root, logs_root, benchmarks_root]
    additionalProperties: false
    description: "Root directories for workflow artifacts; environment variables and ~ are expanded by the Snakefile"
    properties:
      results_root:
        type: string
        minLength: 1
        description: "Root directory for result outputs"
      processing_root:
        type: string
        minLength: 1
        description: "Root directory for preprocessing outputs"
      logs_root:
        type: string
        minLength: 1
        description: "Root directory for rule logs"
      benchmarks_root:
        type: string
        minLength: 1
        description: "Root directory for Snakemake benchmark TSV files"

  netcdf:
    type: object
    description: "NetCDF export settings for PyPSA network files"
    required: [float32, compression]
    additionalProperties: false
    properties:
      float32:
        type: boolean
        description: "Downcast float64 to float32 to reduce file size"
      compression:
        oneOf:
          - type: object
            additionalProperties: false
            properties:
              zlib:
                type: boolean
              complevel:
                type: integer
                minimum: 1
                maximum: 9
          - type: "null"
        description: "Compression settings passed to xarray.Dataset.to_netcdf; null disables compression"

  validation:
    type: object
    required:
      - use_actual_yields
      - use_actual_production
      - enforce_baseline_diet
      - enforce_baseline_feed
      - land_slack
      - disable_new_cropland
      - disable_new_pasture
      - disable_spared_cropland
      - disable_spared_grassland
      - slack_marginal_cost
      - grassland_yield_multiplier
      - feed_slack_cost_factor
      - production_stability
      - animal_growth_cap
    additionalProperties: false
    properties:
      use_actual_yields:
        type: boolean
        description: "Use current-day (actual) yields as opposed to potential yields"
      use_actual_production:
        type: boolean
        description: "Use current-day crop harvested areas as well as animal production"
      enforce_baseline_diet:
        type: boolean
        description: "Set food consumption equal to current day values"
      enforce_baseline_feed:
        type: boolean
        description: "Fix animal feed use to GLEAM baseline values"
      land_slack:
        type: boolean
        description: "Enable land slack generators (allows exceeding regional land limits at cost)"
      disable_new_cropland:
        type: boolean
        description: "If true, no new land can supply the cropland pool"
      disable_new_pasture:
        type: boolean
        description: "If true, no new land can supply the pasture pool"
      disable_spared_cropland:
        type: boolean
        description: "If true, existing cropland cannot be allocated to spared-land sinks"
      disable_spared_grassland:
        type: boolean
        description: "If true, existing grassland cannot be allocated to spared-land sinks"
      slack_marginal_cost:
        type: number
        minimum: 0
        description: "bn USD per Mt/Mha for validation slack (food groups, feed, land)"
      grassland_yield_multiplier:
        type: number
        exclusiveMinimum: 0
        description: "Multiplier applied to effective grassland feed yields before adding grassland production links"
      feed_slack_cost_factor:
        type: number
        exclusiveMinimum: 0
        maximum: 1
        description: "Feed slack cost as fraction of slack_marginal_cost (lower separates feed from food slack)"
      production_stability:
        type: object
        required: [enabled, penalty_mode, crops, grassland, animals, land_conversion]
        additionalProperties: false
        description: "Limit production deviation from baseline levels"
        properties:
          enabled:
            type: boolean
            description: "Whether to apply production stability bounds"
          penalty_mode:
            type: string
            enum: ["hard", "quadratic", "l1"]
            description: "hard = inequality bounds, quadratic = soft penalty in objective, l1 = linear absolute value penalty"
          quadratic_cost:
            type: number
            minimum: 0
            description: "Cost coefficient for quadratic deviation penalty (bn USD per deviation² unit)"
          l1_cost:
            type: number
            minimum: 0
            description: "Cost coefficient for L1 (absolute value) deviation penalty (bn USD per Mt deviation for absolute, bn USD per unit relative deviation for relative)"
          deviation_type:
            type: string
            enum: ["absolute", "relative"]
            description: "For quadratic: absolute = (P - B)², relative = ((P - B) / B)². For L1: absolute = |P - B|, relative = |(P - B) / B|"
          crops:
            type: object
            required: [enabled, max_relative_deviation, enable_slack, min_baseline]
            additionalProperties: false
            properties:
              enabled:
                type: boolean
                description: "Whether to apply crop production bounds"
              max_relative_deviation:
                type: number
                minimum: 0
                maximum: 1
                description: "Maximum relative deviation from baseline (e.g., 0.2 = ±20%)"
              enable_slack:
                type: boolean
                description: "Allow violating minimum production bounds at penalty cost (slack_marginal_cost)"
              min_baseline:
                type: number
                exclusiveMinimum: 0
                description: "Mha floor. Hard mode: minimum crop baseline to include a link in stability constraints. Relative penalty modes: denominator floor for near-zero/zero baselines."
          grassland:
            type: object
            required: [enabled, max_relative_deviation, enable_slack, min_baseline]
            additionalProperties: false
            properties:
              enabled:
                type: boolean
                description: "Whether to apply grassland production bounds"
              max_relative_deviation:
                type: number
                minimum: 0
                maximum: 1
                description: "Maximum relative deviation from baseline (e.g., 0.2 = ±20%)"
              enable_slack:
                type: boolean
                description: "Allow violating minimum production bounds at penalty cost (slack_marginal_cost)"
              min_baseline:
                type: number
                exclusiveMinimum: 0
                description: "Mha floor. Hard mode: minimum grassland baseline to include a link in stability constraints. Relative penalty modes: denominator floor for near-zero/zero baselines."
          animals:
            type: object
            required: [enabled, max_relative_deviation, enable_slack, min_baseline]
            additionalProperties: false
            properties:
              enabled:
                type: boolean
                description: "Whether to apply animal production bounds"
              max_relative_deviation:
                type: number
                minimum: 0
                maximum: 1
                description: "Maximum relative deviation from baseline (e.g., 0.2 = ±20%)"
              enable_slack:
                type: boolean
                description: "Allow violating minimum production bounds at penalty cost (slack_marginal_cost)"
              min_baseline:
                type: number
                exclusiveMinimum: 0
                description: "Mt DM floor (scaled to Mha-eq internally). Hard mode: minimum animal baseline to include a target in stability constraints. Relative penalty modes: denominator floor for near-zero/zero baselines."
          land_conversion:
            type: object
            required: [enabled]
            additionalProperties: false
            properties:
              enabled:
                type: boolean
                description: "Whether to penalize land-use transitions (conversion, pasture routing, sparing) from zero baseline. Uses parent penalty_mode and l1_cost/quadratic_cost. Hard mode is skipped (zero baselines would forbid all conversion)."
      animal_growth_cap:
        type: object
        required: [enabled, max_relative_increase, min_baseline]
        additionalProperties: false
        description: "Cap animal production growth to prevent unrealistic spatial reallocation. Applies a hard upper bound per animal production link."
        properties:
          enabled:
            type: boolean
            description: "Whether to apply animal growth caps"
          max_relative_increase:
            type: number
            minimum: 0
            description: "Maximum relative increase from baseline (e.g., 0.1 = +10%)"
          min_baseline:
            type: number
            exclusiveMinimum: 0
            description: "Mt DM floor; ignore near-zero baselines below this threshold"

  food_incentives:
    type: object
    required: [enabled, sources]
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        description: "When true, food-level incentives are applied to the objective"
      sources:
        type: array
        items:
          type: string
        description: "Paths to food incentives CSVs (may include {name} placeholder)"

  consumer_values:
    type: object
    required: [baseline_scenario]
    additionalProperties: false
    properties:
      baseline_scenario:
        type: string
        description: "Scenario name used for consumer values extraction (must have enforce_baseline_diet=true)"

  food_utility_piecewise:
    type: object
    required: [enabled, n_blocks, decline_factor, total_width_multiplier, min_block_width_mt]
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        description: "When true, apply piecewise diminishing marginal utility for food consumption"
      n_blocks:
        type: integer
        minimum: 1
        description: "Number of utility blocks per (food, country)"
      decline_factor:
        type: number
        exclusiveMinimum: 0
        maximum: 1
        description: "Multiplicative marginal-utility decay by block index"
      total_width_multiplier:
        type: number
        exclusiveMinimum: 0
        description: "Total incentivized quantity as multiple of baseline consumption"
      min_block_width_mt:
        type: number
        minimum: 0
        description: "Minimum per-block width floor (Mt/year) applied at solve time for numerical robustness"

  optimal_taxes:
    type: object
    required: [enabled]
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        description: "When true, enables the optimal taxes/subsidies workflow"

  land:
    type: object
    required: [regional_limit, land_use_cost_usd_per_ha, conversion_cost_forest_usd_per_ha, conversion_cost_nonforest_usd_per_ha, investment_horizon, discount_rate, filtering]
    additionalProperties: false
    properties:
      regional_limit:
        type: number
        minimum: 0
        maximum: 1
        description: "Fraction of each region's potential cropland that is made available"
      land_use_cost_usd_per_ha:
        type: number
        minimum: 0
        description: "Optional marginal land-use cost applied to land supply dispatch (USD per ha)"
      conversion_cost_forest_usd_per_ha:
        type: number
        minimum: 0
        description: "Overnight investment cost for converting forested land to agriculture (USD/ha)"
      conversion_cost_nonforest_usd_per_ha:
        type: number
        minimum: 0
        description: "Overnight investment cost for converting non-forested land to agriculture (USD/ha)"
      investment_horizon:
        type: integer
        minimum: 1
        description: "Years over which to annualize land conversion investment costs"
      discount_rate:
        type: number
        minimum: 0
        maximum: 1
        description: "Annual discount rate for annualizing land conversion investment costs"
      filtering:
        type: object
        required: [min_crop_yield_t_per_ha, min_grassland_yield_t_per_ha, min_area_ha]
        additionalProperties: false
        properties:
          min_crop_yield_t_per_ha:
            type: number
            minimum: 0
            description: "Minimum yield threshold for crop production links (t/ha)"
          min_grassland_yield_t_per_ha:
            type: number
            minimum: 0
            description: "Minimum yield threshold for grassland feed links (t/ha)"
          min_area_ha:
            type: number
            minimum: 0
            description: "Minimum land area threshold (ha)"

  water:
    type: object
    required: [supply_scenario, huang_reference_year]
    additionalProperties: false
    properties:
      supply_scenario:
        type: string
        enum: [sustainable, current_use]
        description: |
          Water supply scenario determining which dataset is used for regional water limits:
          - 'sustainable': Water Footprint Network blue water availability (Hoekstra & Mekonnen 2011)
          - 'current_use': Huang et al. (2018) gridded irrigation water withdrawals
      huang_reference_year:
        type: integer
        minimum: 1971
        maximum: 2010
        description: "Reference year for Huang irrigation data (only used when supply_scenario is 'current_use')"

  fertilizer:
    type: object
    required:
      - limit
      - marginal_cost_usd_per_tonne
      - n_percentile
      - manure_n_to_fertilizer
    additionalProperties: false
    properties:
      limit:
        type: number
        minimum: 0
        description: "Maximum global use of synthetic fertilizer in t-N"
      marginal_cost_usd_per_tonne:
        type: number
        minimum: 0
        description: "USD per t-N of synthetic fertilizer"
      n_percentile:
        type: integer
        minimum: 0
        maximum: 100
        description: "Percentile of global FUBC data for high-input systems"
      manure_n_to_fertilizer:
        type: number
        minimum: 0
        maximum: 1
        description: "Fraction of N excreted in confined quarters available as fertilizer"

  residues:
    type: object
    required: [max_feed_fraction, max_feed_fraction_by_region]
    additionalProperties: false
    properties:
      max_feed_fraction:
        type: number
        minimum: 0
        maximum: 1
        description: "Maximum fraction of residues that can be removed for animal feed"
      max_feed_fraction_by_region:
        type: object
        additionalProperties: false
        patternProperties:
          ".*":
            type: number
            minimum: 0
            maximum: 1
            description: "Override fraction by ISO3 country code or M49 region/sub-region name"

  emissions:
    type: object
    required:
      - ghg_pricing_enabled
      - ghg_price
      - ch4_to_co2_factor
      - n2o_to_co2_factor
      - rice
      - fertilizer
      - residues
    additionalProperties: false
    properties:
      ghg_pricing_enabled:
        type: boolean
        description: "Whether to include GHG pricing in the objective function"
      ghg_price:
        type: number
        minimum: 0
        description: "USD/tCO2-eq (emissions stored in MtCO2-eq internally)"
      ch4_to_co2_factor:
        type: number
        minimum: 0
        description: "IPCC AR6 GWP100 for CH4"
      n2o_to_co2_factor:
        type: number
        minimum: 0
        description: "IPCC AR6 GWP100 for N2O"
      rice:
        type: object
        required:
          - methane_emission_factor_kg_per_ha
          - rainfed_wetland_rice_ch4_scaling_factor
        additionalProperties: false
        properties:
          methane_emission_factor_kg_per_ha:
            type: number
            minimum: 0
            description: "kg CH4 per ha per crop (IPCC 2019)"
          rainfed_wetland_rice_ch4_scaling_factor:
            type: number
            minimum: 0
            description: "Scaling factor for rainfed rice (IPCC 2019)"
      fertilizer:
        type: object
        required:
          - synthetic_n2o_factor
          - indirect_ef4
          - indirect_ef5
          - frac_gasf
          - frac_gasm
          - frac_leach
        additionalProperties: false
        properties:
          synthetic_n2o_factor:
            type: number
            minimum: 0
            description: "kg N2O-N per kg N input (IPCC 2019)"
          indirect_ef4:
            type: number
            minimum: 0
            description: "kg N2O-N per kg (NH3-N + NOx-N) volatilized (IPCC 2019)"
          indirect_ef5:
            type: number
            minimum: 0
            description: "kg N2O-N per kg N leached/runoff (IPCC 2019)"
          frac_gasf:
            type: number
            minimum: 0
            maximum: 1
            description: "Fraction of synthetic fertilizer N volatilized as NH3 and NOx"
          frac_gasm:
            type: number
            minimum: 0
            maximum: 1
            description: "Fraction of organic N and grazing N volatilized"
          frac_leach:
            type: number
            minimum: 0
            maximum: 1
            description: "Fraction of applied/deposited N lost through leaching"
      residues:
        type: object
        required: [incorporation_n2o_factor]
        additionalProperties: false
        properties:
          incorporation_n2o_factor:
            type: number
            minimum: 0
            description: "kg N2O-N per kg residue N incorporated into soil"

  luc:
    type: object
    required:
      - horizon_years
      - managed_flux_mode
      - forest_fraction_threshold
      - cropland_source
    additionalProperties: false
    properties:
      horizon_years:
        type: integer
        minimum: 1
        description: "Time horizon for land use change accounting (years)"
      managed_flux_mode:
        type: string
        enum: [zero]
        description: "How to treat ongoing emissions from managed agricultural land (currently only 'zero' is implemented, which assumes no net flux from existing agricultural land)"
      forest_fraction_threshold:
        type: number
        minimum: 0
        maximum: 1
        description: "Minimum forest fraction to apply regrowth sequestration"
      cropland_source:
        type: string
        enum: [gaez, esa]
        description: "Data source for cropland baseline: 'gaez' (RES06-HAR harvested area) or 'esa' (satellite land cover)"

  crops:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      pattern: "^[a-z0-9-]+$"
    description: "List of crop names to include in the model"

  non_food_crops:
    type: array
    uniqueItems: true
    items:
      type: string
      pattern: "^[a-z0-9-]+$"
    description: "Crops not intended for human food (e.g. fodder, biomass); excluded from foods.csv validation"

  multiple_cropping:
    type: object
    patternProperties:
      "^[a-z0-9_]+$":
        oneOf:
          - type: "null"
          - type: object
            required: [crops, water_supplies]
            additionalProperties: false
            properties:
              crops:
                type: array
                minItems: 2
                maxItems: 3
                items:
                  type: string
              water_supplies:
                type: array
                minItems: 2
                maxItems: 3
                items:
                  type: string
                  enum: [r, i]
    description: "Multiple cropping systems (double cropping)"

  macronutrients:
    type: object
    additionalProperties: false
    patternProperties:
      "^(carb|protein|fat|cal)$":
        type: object
        additionalProperties: false
        properties:
          equal_to_baseline:
            type: boolean
            description: "Enforce per-country equality at baseline diet level (derived from baseline_diet.csv × nutrition.csv)"
        patternProperties:
          "^(min|max|equal)$":
            type: number
            minimum: 0
            description: "g/person/day or kcal/person/day"
        if:
          properties:
            equal_to_baseline:
              const: true
          required: [equal_to_baseline]
        then:
          not:
            anyOf:
              - required: [min]
              - required: [max]
              - required: [equal]
    description: "Optional macronutrient constraints (min/max/equal in g or kcal per person per day; or equal_to_baseline: true for country-specific baseline values)"

  byproducts:
    type: array
    uniqueItems: true
    items:
      type: string
      pattern: "^[a-z0-9-]+$"
    description: "Foods not for direct human consumption (excluded from food group tracking)"

  animal_products:
    type: object
    required:
      - include
      - gleam3_system_product_map
      - me_scaling_clamp_factor
      - net_to_metabolizable_energy_conversion
      - carcass_to_retail_meat
      - faostat_items
      - residue_crops
    additionalProperties: false
    properties:
      include:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          type: string
          pattern: "^[a-z0-9-]+$"
        description: "Animal products to include in the model"
      gleam3_system_product_map:
        type: object
        minProperties: 1
        additionalProperties: false
        patternProperties:
          "^[A-Z][a-z]+$":
            type: object
            minProperties: 1
            additionalProperties: false
            patternProperties:
              "^[A-Z][a-z]+$":
                type: array
                minItems: 1
                items:
                  type: string
                  pattern: "^[a-z0-9-]+$"
                description: "Model products produced by this (Animal, LPS) system"
        description: "GLEAM3 (Animal, LPS) → model product mapping"
      me_scaling_clamp_factor:
        type: number
        exclusiveMinimum: 1
        description: "Clamp Wirsenius scaling factors to [median/k, median*k] per region"
      net_to_metabolizable_energy_conversion:
        type: object
        required: [k_m, k_g, k_l]
        additionalProperties: false
        properties:
          k_m:
            type: number
            minimum: 0
            maximum: 1
            description: "Maintenance efficiency"
          k_g:
            type: number
            minimum: 0
            maximum: 1
            description: "Growth efficiency"
          k_l:
            type: number
            minimum: 0
            maximum: 1
            description: "Lactation efficiency (dairy)"
      carcass_to_retail_meat:
        type: object
        required:
          - meat-cattle
          - meat-pig
          - meat-chicken
          - eggs
          - dairy
        additionalProperties: false
        patternProperties:
          "^[a-z0-9-]+$":
            type: number
            minimum: 0
            maximum: 1
            description: "kg retail product per kg carcass/raw product"
      faostat_items:
        type: object
        minProperties: 1
        additionalProperties: false
        patternProperties:
          "^[a-z0-9-]+$":
            type: array
            minItems: 1
            items:
              type: string
            description: "FAOSTAT QCL item names to aggregate for this product"
        description: "FAOSTAT QCL item names to aggregate for each model product"
      residue_crops:
        type: array
        uniqueItems: true
        items:
          type: string
          pattern: "^[a-z0-9-]+$"
        description: "Crops that produce residues usable as animal feed"

  fodder_decomposition:
    type: object
    required: [fdd_crops, eurostat, suitability_blend_weight, yield_corrections]
    additionalProperties: false
    description: "Configuration for decomposing aggregate GAEZ FDD fodder area into individual crops"
    properties:
      fdd_crops:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          type: string
          pattern: "^[a-z0-9-]+$"
        description: "Crops to decompose within the FDD module"
      eurostat:
        type: object
        required: [averaging_years]
        additionalProperties: false
        properties:
          averaging_years:
            type: integer
            minimum: 1
            maximum: 20
            description: "Number of years to average over, centered on baseline_year"
      suitability_blend_weight:
        type: number
        minimum: 0
        maximum: 1
        description: "Weight for blending country-specific suitability shares with global average"
      yield_corrections:
        type: object
        required: [enabled, eurostat_moisture, floor, ceiling]
        additionalProperties: false
        description: "Per-country yield corrections for FDD crops based on Eurostat data"
        properties:
          enabled:
            type: boolean
            description: "Whether to apply Eurostat-based yield corrections to FDD crops"
          eurostat_moisture:
            type: number
            minimum: 0
            maximum: 1
            description: "EU standard humidity for green fodder (moisture fraction in fresh weight)"
          floor:
            type: number
            minimum: 0
            description: "Minimum allowed yield correction factor"
          ceiling:
            type: number
            minimum: 0
            description: "Maximum allowed yield correction factor"

  grazing:
    type: object
    required: [enabled, isimip_utilization_rate, forage_overlap_crops, grassland_forage_calibration]
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        description: "Whether to enable grazing in the model"
      isimip_utilization_rate:
        type: number
        minimum: 0
        maximum: 1
        description: "Utilization rate applied to ISIMIP grassland yields in the merge step"
      forage_overlap_crops:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          type: string
          pattern: "^[a-z0-9-]+$"
        description: "Crops whose feed_conversion links are subject to fodder conversion calibration"
      grassland_forage_calibration:
        type: object
        required: [enabled, generate, grassland_yield_correction, fodder_conversion_correction, exogenous_forage, scenario]
        additionalProperties: false
        properties:
          enabled:
            type: boolean
            description: "Apply per-country grassland yield corrections, fodder conversion corrections, and exogenous forage"
          generate:
            type: boolean
            description: "Generate calibration CSVs from a solved model's forage slack"
          grassland_yield_correction:
            type: string
            description: "Path to CSV with per-country grassland yield correction factors (country, yield_correction)"
          fodder_conversion_correction:
            type: string
            description: "Path to CSV with per-country fodder-to-forage conversion corrections (country, fodder_conversion_correction)"
          exogenous_forage:
            type: string
            description: "Path to CSV with per-country exogenous forage supply for deficit countries (country, exogenous_forage_mt_dm)"
          scenario:
            type: string
            pattern: "^[a-zA-Z0-9_]+$"
            description: "Scenario whose solved model is used to generate calibration"

  food_groups:
    type: object
    required: [included, constraints, equal_by_country_source, max_per_capita, fix_within_group_ratios]
    additionalProperties: false
    properties:
      included:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          type: string
          pattern: "^[a-z0-9_]+$"
        description: "Food groups to track in the model"
      constraints:
        type: object
        patternProperties:
          "^[a-z0-9_]+$":
            type: object
            additionalProperties: false
            patternProperties:
              "^(min|max|equal)$":
                type: number
                minimum: 0
                description: "g/person/day"
        description: "Optional per-group constraints with min/max/equal in g/person/day"
      equal_by_country_source:
        type:
          - string
          - "null"
        description: "CSV path with group/country equality targets (g/person/day)"
      max_per_capita:
        type: object
        patternProperties:
          "^[a-z0-9_]+$":
            type: number
            minimum: 0
        description: "Per-group maximum consumption caps in g/person/day, applied as e_nom_max on stores"
      fix_within_group_ratios:
        type: object
        required: [enabled]
        additionalProperties: false
        description: "Fix relative food contributions within each food group based on baseline consumption ratios"
        properties:
          enabled:
            type: boolean
            description: "Whether to fix within-group food ratios from baseline data"

  diet:
    type: object
    required: [baseline_age]
    additionalProperties: false
    properties:
      baseline_age:
        type: string
        description: "Age group for baseline diet (e.g., 'All ages')"
      stimulant_brewed_to_dry:
        type: object
        required: [tea]
        additionalProperties: false
        properties:
          tea:
            type: number
            minimum: 0
            description: "GDD cups-to-dry-grams conversion factor for tea (v18)"
        description: "Conversion factor from GDD beverage intake (cups/day) to dry commodity weight (g/day). Only tea is used; coffee is sourced from FAOSTAT FBS."
      fbs_override_foods:
        type: array
        uniqueItems: true
        default: []
        items:
          type: string
          pattern: "^[a-z0-9-]+$"
        description: "Foods whose consumption is overridden with waste-corrected FAOSTAT FBS supply data"

  biomass:
    type: object
    required: [crops, marginal_values_usd_per_tonne, enforce_baseline_demand, biofuel_demand_scale, biogas_crop_demand, enforce_fiber_demand]
    additionalProperties: false
    properties:
      crops:
        type: array
        uniqueItems: true
        items:
          type: string
          pattern: "^[a-z0-9-]+$"
        description: "Crops available for biomass export"
      marginal_values_usd_per_tonne:
        type: number
        minimum: 0
        description: "Revenue in USD per tonne dry matter exported to energy sector"
      enforce_baseline_demand:
        type: boolean
        description: "When true, enforce baseline biofuel/industrial and biogas demand"
      biofuel_demand_scale:
        type: number
        minimum: 0
        description: "Solve-time multiplier on enforced biofuel/industrial and biogas demand"
      biogas_crop_demand:
        type: [string, "null"]
        description: "Path to CSV with biogas crop demand per country (Mt DM); null to disable"
      enforce_fiber_demand:
        type: boolean
        description: "When true, enforce baseline fiber demand (cotton lint) from FAOSTAT FBS"

  trade:
    type: object
    required:
      - hubs
      - crop_default_trade_cost_per_km
      - crop_trade_cost_categories
      - non_tradable_crops
      - food_default_trade_cost_per_km
      - food_trade_cost_categories
      - non_tradable_foods
      - feed_default_trade_cost_per_km
      - feed_trade_cost_categories
      - non_tradable_feeds
    additionalProperties: false
    properties:
      hubs:
        type: integer
        minimum: 1
        description: "Number of trade hubs (shared across crop, food, and feed trade)"
      crop_default_trade_cost_per_km:
        type: number
        minimum: 0
        description: "USD per tonne per km (default for unlisted crops)"
      crop_trade_cost_categories:
        type: object
        patternProperties:
          "^[a-z0-9_]+$":
            type: object
            required: [cost_per_km, crops]
            additionalProperties: false
            properties:
              cost_per_km:
                type: number
                minimum: 0
                description: "USD per tonne per km"
              crops:
                type: array
                items:
                  type: string
                  pattern: "^[a-z0-9-]+$"
      non_tradable_crops:
        type: array
        uniqueItems: true
        items:
          type: string
          pattern: "^[a-z0-9-]+$"
        description: "Crops that cannot be traded"
      food_default_trade_cost_per_km:
        type: number
        minimum: 0
        description: "USD per tonne per km (default for unlisted foods)"
      food_trade_cost_categories:
        type: object
        patternProperties:
          "^[a-z0-9_]+$":
            type: object
            required: [cost_per_km, foods]
            additionalProperties: false
            properties:
              cost_per_km:
                type: number
                minimum: 0
                description: "USD per tonne per km"
              foods:
                type: array
                items:
                  type: string
                  pattern: "^[a-z0-9-]+$"
      non_tradable_foods:
        type: array
        uniqueItems: true
        items:
          type: string
          pattern: "^[a-z0-9-]+$"
        description: "Foods that cannot be traded"
      feed_default_trade_cost_per_km:
        type: number
        minimum: 0
        description: "USD per tonne per km (default for unlisted feeds)"
      feed_trade_cost_categories:
        type: object
        patternProperties:
          "^[a-z0-9_]+$":
            type: object
            required: [cost_per_km, feeds]
            additionalProperties: false
            properties:
              cost_per_km:
                type: number
                minimum: 0
                description: "USD per tonne per km"
              feeds:
                type: array
                items:
                  type: string
                  pattern: "^[a-z0-9_]+$"
      non_tradable_feeds:
        type: array
        uniqueItems: true
        items:
          type: string
          pattern: "^[a-z0-9_]+$"
        description: "Feeds that cannot be traded"

  health:
    type: object
    required:
      - enabled
      - region_clusters
      - intake_grid_points
      - log_rr_points
      - ssb_sugar_g_per_100g
      - value_per_yll
      - intake_cap_g_per_day
      - risk_factors
      - causes
      - risk_cause_map
      - clustering
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        description: "Whether to include health costs in the objective function"
      region_clusters:
        type: integer
        minimum: 1
        description: "Number of health clusters"
      intake_grid_points:
        type: integer
        minimum: 2
        description: "Number of intake grid points over empirical RR data range"
      log_rr_points:
        type: integer
        minimum: 1
        description: "Number of points for log relative risk interpolation"
      intake_age_min:
        type: integer
        minimum: 0
        description: "Lower bound (inclusive) of age buckets used for intake weighting"
      ssb_sugar_g_per_100g:
        type: number
        minimum: 0
        description: "g sugar per 100g sugar-sweetened beverage"
      value_per_yll:
        type: number
        minimum: 0
        description: "USD per year of life lost"
      intake_cap_g_per_day:
        type: number
        minimum: 0
        description: "Uniform generous cap applied to intake grids for all risk factors"
      risk_factors:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          type: string
          pattern: "^[a-z0-9_]+$"
        description: "Dietary risk factors to consider (must match GDD data items)"
      causes:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          type: string
          pattern: "^[A-Za-z0-9]+$"
        description: "Health outcomes/causes to consider (IHME GBD codes)"
      risk_cause_map:
        type: object
        description: "Explicit mapping from risk_factor to list of causes it affects"
        additionalProperties:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            pattern: "^[A-Za-z0-9]+$"
      alternative_rr:
        type: object
        description: "Per risk-factor overrides using log-linear RR from literature CSV files"
        additionalProperties:
          type: ["string", "null"]
      clustering:
        type: object
        required:
          - weights
        additionalProperties: false
        properties:
          weights:
            type: object
            required:
              - geography
              - gdp
              - population
            additionalProperties: false
            properties:
              geography:
                type: number
                minimum: 0
                description: "Weight for geographic proximity in clustering"
              gdp:
                type: number
                minimum: 0
                description: "Weight for GDP per capita similarity in clustering"
              population:
                type: number
                minimum: 0
                description: "Weight for population balance in clustering"

  aggregation:
    type: object
    required:
      - regions
      - simplify_tolerance_km
      - simplify_min_area_km
      - resource_class_quantiles
      - irrigated_area_source
    additionalProperties: false
    properties:
      regions:
        type: object
        required: [target_count, allow_cross_border, method]
        additionalProperties: false
        properties:
          target_count:
            type: integer
            minimum: 1
            description: "Target number of regions to create through clustering"
          allow_cross_border:
            type: boolean
            description: "Whether to allow regions to cross country borders (false = cluster within each country separately)"
          method:
            type: string
            enum: [kmeans, agglomerative]
            description: "Clustering method: 'kmeans' (faster, default) or 'agglomerative' (hierarchical clustering with ward linkage)"
      simplify_tolerance_km:
        type: number
        minimum: 0
        description: "Tolerance for geometry simplification (km)"
      simplify_min_area_km:
        type: number
        minimum: 0
        description: "Minimum area for simplified geometries (km²)"
      resource_class_quantiles:
        type: array
        minItems: 1
        items:
          type: number
          minimum: 0
          maximum: 1
        description: "Quantiles for resource class binning"
      irrigated_area_source:
        type: string
        enum: [current, potential]
        description: "Data source for irrigated land area: 'current' uses GAEZ land equipped for irrigation, 'potential' uses crop-specific irrigated suitability rasters"

  countries:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      pattern: "^[A-Z]{3}$"
    description: "ISO 3166-1 alpha-3 country codes to include in the model"

  data:
    type: object
    required: [gaez, usda, land_cover, faostat, soilgrids]
    additionalProperties: false
    properties:
      gaez:
        type: object
        required:
          - climate_model
          - climate_model_ensemble
          - period
          - climate_scenario
          - input_level
          - yield_var
          - water_requirement_var
          - suitability_var
        additionalProperties: false
        properties:
          climate_model:
            type: string
            description: "GAEZ v5 climate model (specific GCM)"
          climate_model_ensemble:
            type: string
            description: "GAEZ v5 ensemble model"
          period:
            type: string
            pattern: "^(FP|HP)[0-9]{4}$"
            description: "GAEZ v5 time period (e.g., FP2140, HP0120)"
          climate_scenario:
            type: string
            enum: [SSP126, SSP370, SSP585, HIST]
            description: "GAEZ v5 climate scenario"
          input_level:
            type: string
            enum: [H, L]
            description: "GAEZ v5 input level (H=High, L=Low)"
          yield_var:
            type: string
            description: "GAEZ v5 yield variable code"
          water_requirement_var:
            type: string
            description: "GAEZ v5 water requirement variable code"
          suitability_var:
            type: string
            description: "GAEZ v5 suitability variable code"
      usda:
        type: object
        required: [retrieve_nutrition, nutrients]
        additionalProperties: false
        properties:
          retrieve_nutrition:
            type: boolean
            description: "Whether to fetch nutrition data from USDA API"
          nutrients:
            type: object
            required: [protein, carb, fat, cal]
            additionalProperties: false
            properties:
              protein:
                type: string
              carb:
                type: string
              fat:
                type: string
              cal:
                type: string
      land_cover:
        type: object
        required: [version]
        additionalProperties: false
        properties:
          version:
            type: string
            description: "Version of land cover dataset"
      faostat:
        type: object
        required: [qcl_production_element_code, fbs_food_supply_element_code, fbs_other_uses_element_code]
        additionalProperties: false
        properties:
          qcl_production_element_code:
            type: integer
            description: "FAOSTAT element code for 'Production' in tonnes (QCL dataset)"
          fbs_food_supply_element_code:
            type: integer
            description: "FAOSTAT element code for 'Food supply quantity (kg/capita/yr)' in FBS dataset"
          fbs_other_uses_element_code:
            type: integer
            description: "FAOSTAT element code for 'Other uses (non-food)' in 1000 tonnes (FBS dataset)"
      soilgrids:
        type: object
        required: [target_resolution_m]
        additionalProperties: false
        properties:
          target_resolution_m:
            type: integer
            minimum: 1000
            description: "Target resolution in meters"

  irrigation:
    type: object
    required: [irrigated_crops]
    additionalProperties: false
    properties:
      irrigated_crops:
        oneOf:
          - type: string
            const: all
          - type: array
            uniqueItems: true
            items:
              type: string
              pattern: "^[a-z0-9-]+$"
        description: "Which crops are allowed irrigated production ('all' or list)"

  costs:
    type: object
    required: [averaging_period]
    additionalProperties: false
    properties:
      averaging_period:
        type: object
        required: [start_year, end_year]
        additionalProperties: false
        properties:
          start_year:
            type: integer
            minimum: 1900
          end_year:
            type: integer
            minimum: 1900

  animal_costs:
    type: object
    required: [fadn, usda, faostat]
    additionalProperties: false
    properties:
      fadn:
        type: object
        required:
          - high_cost_threshold_usd_per_mt
          - livestock_specific_costs
          - shared_farm_costs
          - exclude_costs
        additionalProperties: false
        properties:
          high_cost_threshold_usd_per_mt:
            type: number
            minimum: 0
          livestock_specific_costs:
            type: object
            patternProperties:
              "^SE[0-9]+$":
                type: string
          shared_farm_costs:
            type: object
            patternProperties:
              "^SE[0-9]+$":
                type: string
          grazing_cost_items:
            type: object
            patternProperties:
              "^SE[0-9]+$":
                type: string
          exclude_costs:
            type: object
            patternProperties:
              "^SE[0-9]+$":
                type: string
      usda:
        type: object
        required:
          - request_timeout_seconds
          - dressed_weight_kg_per_head
          - include_items
          - exclude_items
          - grazing_cost_items
        additionalProperties: false
        properties:
          request_timeout_seconds:
            type: integer
            minimum: 1
          dressed_weight_kg_per_head:
            type: object
            patternProperties:
              "^[a-z0-9-]+$":
                type: number
                minimum: 0
          include_items:
            type: array
            items:
              type: string
          exclude_items:
            type: array
            items:
              type: string
          grazing_cost_items:
            type: array
            items:
              type: string
      faostat:
        type: object
        required: [aggregate_area_code_limit, element_codes]
        additionalProperties: false
        properties:
          aggregate_area_code_limit:
            type: integer
            minimum: 1
          element_codes:
            type: object
            required: [production, stocks, producing_animals]
            additionalProperties: false
            properties:
              production:
                type: array
                items:
                  type: string
              stocks:
                type: array
                items:
                  type: string
              producing_animals:
                type: array
                items:
                  type: string

  crop_costs:
    type: object
    required: [non_endogenous_cost_share, faostat]
    additionalProperties: false
    properties:
      non_endogenous_cost_share:
        type: number
        minimum: 0
        maximum: 1
        description: "Fraction of revenue (price × yield) attributed to non-endogenous production costs"
      faostat:
        type: object
        required: [price_element_code, yield_element_code]
        additionalProperties: false
        properties:
          price_element_code:
            type: integer
            description: "FAOSTAT element code for producer price (USD/tonne)"
          yield_element_code:
            type: integer
            description: "FAOSTAT QCL element code for yield (hg/ha); 5412 for crops"

  cost_calibration:
    type: object
    required: [enabled, generate, scenario, crop_correction_csv, grassland_correction_csv, animal_correction_csv]
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        description: "Apply calibration corrections to production costs"
      generate:
        type: boolean
        description: "Generate calibration from solved model (breaks DAG cycle)"
      scenario:
        type: string
        description: "Scenario name used for calibration solve"
      crop_correction_csv:
        type: string
        description: "Path to crop cost calibration correction CSV"
      grassland_correction_csv:
        type: string
        description: "Path to grassland cost calibration correction CSV"
      animal_correction_csv:
        type: string
        description: "Path to animal cost calibration correction CSV"

  solving:
    type: object
    required: [solver, io_api, threads, calculate_fixed_duals, options_gurobi, options_highs, time_limit, runtime, mem_mb, inline_analysis]
    additionalProperties: false
    properties:
      solver:
        type: string
        enum: [highs, gurobi, cplex]
        description: "Linear programming solver"
      io_api:
        type: ["string", "null"]
        enum: [lp, mps, direct, null]
        description: "How the model is communicated to the solver"
      threads:
        type: integer
        minimum: 1
        description: "Number of threads for the solver"
      calculate_fixed_duals:
        type: boolean
        description: "Solve MILP, fix integer variables, then resolve as LP to obtain dual variables"
      options_gurobi:
        type: object
        patternProperties:
          "^[A-Za-z0-9_]+$":
            oneOf:
              - type: number
              - type: string
        description: "Gurobi solver options"
      options_highs:
        type: object
        patternProperties:
          "^[a-z_]+$":
            oneOf:
              - type: number
              - type: string
        description: "HiGHS solver options"
      export_for_tuning:
        type: boolean
        description: "Export the fully-constructed model to MPS before solving (for Gurobi parameter tuning)"
      time_limit:
        type: ["integer", "null"]
        minimum: 1
        description: "Solver-internal time limit in minutes (null = no limit)"
      runtime:
        type: integer
        minimum: 1
        description: "Maximum solver runtime in minutes (SLURM resource)"
      mem_mb:
        type: integer
        minimum: 100
        description: "Maximum solver memory in MB (SLURM resource)"
      inline_analysis:
        type: boolean
        description: "When true, analysis runs inside the solve process without writing the intermediate solved .nc file"

  remote_solve:
    type: object
    required:
      [
        enabled,
        local_scenarios,
        host,
        workdir,
        pixi_env,
        use_slurm,
        slurm_account,
        slurm_partition,
        sync_workflow,
        sync_pixi_files,
        ssh_options,
        rsync_options,
        preflight_check,
      ]
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        description: "Whether to run solve_model remotely over SSH"
      local_scenarios:
        type: array
        items:
          type: string
          pattern: "^[a-zA-Z0-9_]+$"
        description: "Scenario names that must use local solve_model instead of remote solve (currently only 'baseline' is supported)"
      host:
        type: string
        minLength: 1
        description: "SSH host or alias"
      workdir:
        type: string
        minLength: 1
        description: "Remote project root containing this repository"
      pixi_env:
        type: string
        minLength: 1
        description: "Remote pixi environment passed to tools/smk -e"
      use_slurm:
        type: boolean
        description: "Whether to add --slurm for remote tools/smk execution"
      slurm_account:
        type: string
        description: "SLURM account for remote job submission"
      slurm_partition:
        type: string
        description: "SLURM partition for remote compute jobs"
      sync_workflow:
        type: boolean
        description: "Sync workflow/ and config/ before remote solve"
      sync_pixi_files:
        type: boolean
        description: "Sync pixi.toml and pixi.lock before remote solve"
      ssh_options:
        type: array
        items:
          type: string
        description: "Additional SSH CLI arguments"
      rsync_options:
        type: array
        items:
          type: string
        description: "Additional rsync CLI arguments"
      preflight_check:
        type: boolean
        description: "Create the remote workdir before syncing"

  sensitivity_analysis:
    type: object
    description: "Configuration for surrogate-based sensitivity analysis methods"
    required: [holdout_fraction, methods]
    additionalProperties: false
    properties:
      holdout_fraction:
        type: number
        minimum: 0
        maximum: 0.5
        description: "Fraction of samples held out for validation (0 disables holdout)"
      methods:
        type: object
        description: "Surrogate method configs keyed by method name (e.g. pce, rf)"
        patternProperties:
          "^[a-z_]+$":
            type: object
            additionalProperties: true
            properties:
              grid_resolution:
                type: integer
                minimum: 2
                description: "Number of conditioning grid points for slice parameters"
              method_options:
                type: object
                additionalProperties: true
                description: "Method-specific hyperparameters"

  plotting:
    type: object
    required: [colors, fallback_cmaps, comparison_scenarios, crop_groups]
    additionalProperties: false
    properties:
      crop_groups:
        type: object
        minProperties: 1
        description: "Crop groupings for map visualizations. Keys are display names; each entry has a hex color and a list of member crops."
        additionalProperties:
          type: object
          required: [color, crops]
          additionalProperties: false
          properties:
            color:
              type: string
              pattern: "^#[0-9A-Fa-f]{6}$"
            crops:
              type: array
              minItems: 1
              items:
                type: string
      comparison_scenarios:
        oneOf:
          - type: string
            const: "all"
          - type: array
            minItems: 1
            items:
              type: string
              pattern: "^scen-.*"
        description: "Scenario wildcards (suffixes after 'model_') available for comparison plots. Use 'all' to compare all scenarios defined under the `scenarios` key."
      colors:
        type: object
        required: [parameter_groups, crops, food_groups]
        additionalProperties: false
        properties:
          parameter_groups:
            type: object
            description: "Sensitivity parameter groups with colors for consistent plotting"
            patternProperties:
              ".+":
                type: object
                required: [color, parameters]
                additionalProperties: false
                properties:
                  color:
                    type: string
                    pattern: "^#[0-9A-Fa-f]{6}$"
                    description: "Group-level color (used when plotting aggregated groups)"
                  parameters:
                    type: object
                    patternProperties:
                      "^[a-z0-9_]+$":
                        type: string
                        pattern: "^#[0-9A-Fa-f]{6}$"
                    description: "Per-parameter hex color codes within this group"
          crops:
            type: object
            patternProperties:
              "^[a-z0-9-]+$":
                type: string
                pattern: "^#[0-9A-Fa-f]{6}$"
            description: "Hex color codes for each crop"
          food_groups:
            type: object
            patternProperties:
              "^[a-z0-9_]+$":
                type: string
                pattern: "^#[0-9A-Fa-f]{6}$"
            description: "Hex color codes for each food group"
      fallback_cmaps:
        type: object
        required: [crops]
        additionalProperties: false
        properties:
          crops:
            type: string
            description: "Matplotlib colormap name for crops without specified colors"

  credentials:
    type: object
    required: [usda, ecmwf]
    additionalProperties: false
    description: "API credentials for external data sources (configure via config/secrets.yaml or environment variables)"
    properties:
      usda:
        type: object
        required: [api_key]
        additionalProperties: false
        properties:
          api_key:
            type: string
            minLength: 1
            description: "USDA FoodData Central API key (or set USDA_API_KEY env var)"
      ecmwf:
        type: object
        required: [url, key]
        additionalProperties: false
        properties:
          url:
            type: string
            minLength: 1
            format: uri
            description: "ECMWF datastores API URL (or set ECMWF_DATASTORES_URL env var)"
          key:
            type: string
            minLength: 1
            description: "ECMWF datastores API key (or set ECMWF_DATASTORES_KEY env var)"

  sensitivity:
    type: object
    additionalProperties: false
    description: "Sensitivity analysis adjustment factors applied to network components"
    properties:
      crop_yields:
        type: object
        additionalProperties: false
        description: "Multiplicative factors for crop production yields"
        properties:
          all:
            type: number
            minimum: 0
            description: "Factor applied to all crops"
          by_crop:
            type: object
            additionalProperties:
              type: number
              minimum: 0
            description: "Per-crop factors (applied after 'all')"
      emission_factors:
        type: object
        additionalProperties: false
        description: "Multiplicative factors for emission efficiencies"
        properties:
          ch4:
            type: number
            minimum: 0
            description: "Factor for all CH4 emissions (animal production + rice cultivation)"
          n2o:
            type: number
            minimum: 0
            description: "Factor for all N2O emissions (animal production + synthetic fertilizer)"
          luc:
            type: number
            minimum: 0
            description: "Factor for CO2 from land-use change"
      food_loss_waste:
        type: number
        minimum: 0
        description: "Multiplicative factor for food loss and waste fractions on food processing links"
      feed_conversion:
        type: number
        minimum: 0
        description: "Multiplicative factor for feed conversion efficiencies on animal production links"
      costs:
        type: object
        additionalProperties: false
        description: "Multiplicative factors for production costs"
        properties:
          crop:
            type: number
            minimum: 0
            description: "Factor for crop production marginal costs"
          animal:
            type: number
            minimum: 0
            description: "Factor for animal production marginal costs"
      health_relative_risk:
        type: object
        additionalProperties:
          type: number
          minimum: 0
          maximum: 1
        description: >
          Per-risk-factor quantile values in [0, 1] interpolating between GBD
          rr_low (q=0) and rr_high (q=1) for each dose-response curve.

allOf:
  - not:
      required: [food_incentives, food_utility_piecewise]
      properties:
        food_incentives:
          properties:
            enabled:
              const: true
        food_utility_piecewise:
          properties:
            enabled:
              const: true
