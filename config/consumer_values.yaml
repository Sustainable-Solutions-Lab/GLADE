# Use coarser spatial aggregation for faster processing
aggregation:
  regions:
    target_count: 250

# Default health and emissions settings (overridden by scenarios)
health:
  enabled: false
  value_per_yll: 50000

emissions:
  ghg_pricing_enabled: false
  ghg_price: 200

validation:
  use_actual_yields: true

animal_products:
  feed_efficiency_regions: null

# Legacy linear incentives (disabled for piecewise-utility testing)
food_incentives:
  enabled: false
  sources: []

# Piecewise diminishing utility derived from consumer values
food_utility_piecewise:
  enabled: false
  n_blocks: 4
  decline_factor: 0.7
  total_width_multiplier: 2.0

# Compare all consumer values scenarios in plots
plotting:
  comparison_scenarios: "all"

solving:
  solver: "gurobi"
  io_api: "direct"
  threads: 2
