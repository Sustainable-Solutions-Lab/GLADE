# Consumer Values Analysis Configuration
# --------------------------------------
# This workflow extracts "consumer values" (dual variables from food group
# constraints) from a baseline model with fixed consumption, then uses these
# values in subsequent solves to explore how health/environmental pricing
# affects consumption while accounting for revealed consumer preferences.

name: "consumer_values"
scenarios:
  # Consumer Values Analysis Scenarios
  # ----------------------------------
  # Workflow:
  # 1. "baseline": Fixed consumption, no health/GHG - used to extract consumer values (duals)
  # 2. "cv": Consumer values in objective only - verifies consumption matches baseline
  # 3. "cv_H": Consumer values + health objective
  # 4. "cv_G": Consumer values + GHG pricing
  # 5. "cv_HG": Consumer values + health + GHG
  # 6. "no_cv": No consumer values, no fixed consumption
  # 7. "no_cv_H": No consumer values + health
  # 8. "no_cv_G": No consumer values + GHG pricing
  # 9. "no_cv_HG": No consumer values + health + GHG

  baseline:
    # Fixed consumption to extract consumer values (dual variables)
    validation:
      enforce_baseline_diet: true
    food_incentives:
      enabled: false
    food_utility_piecewise:
      enabled: false
    food_groups:
      fix_within_group_ratios:
        enabled: true
    health:
      enabled: false
    emissions:
      ghg_pricing_enabled: false

  cv:
    # Piecewise food utility in objective, no fixed demands (verification)
    validation:
      enforce_baseline_diet: false
    food_incentives:
      enabled: false
    food_utility_piecewise:
      enabled: true
    food_groups:
      fix_within_group_ratios:
        enabled: true
    health:
      enabled: false
    emissions:
      ghg_pricing_enabled: false

  cv_no_ratios:
    # Piecewise food utility in objective, no fixed demands, no within-group ratio constraints
    validation:
      enforce_baseline_diet: false
    food_incentives:
      enabled: false
    food_utility_piecewise:
      enabled: true
    health:
      enabled: false
    emissions:
      ghg_pricing_enabled: false

  # cv_H:
  #   # Consumer values + health
  #   validation:
  #     enforce_baseline_diet: false
  #   food_incentives:
  #     enabled: true
  #   food_groups:
  #     fix_within_group_ratios:
  #       enabled: true
  #   macronutrients:
  #     cal:
  #       equal: 2400
  #   health:
  #     enabled: true
  #   emissions:
  #     ghg_pricing_enabled: false

  # cv_G:
  #   # Consumer values + GHG pricing
  #   validation:
  #     enforce_baseline_diet: false
  #   food_incentives:
  #     enabled: true
  #   food_groups:
  #     fix_within_group_ratios:
  #       enabled: true
  #   macronutrients:
  #     cal:
  #       equal: 2400
  #   health:
  #     enabled: false
  #   emissions:
  #     ghg_pricing_enabled: true

  # cv_HG:
  #   # Consumer values + health + GHG
  #   validation:
  #     enforce_baseline_diet: false
  #   food_incentives:
  #     enabled: true
  #   food_groups:
  #     fix_within_group_ratios:
  #       enabled: true
  #   macronutrients:
  #     cal:
  #       equal: 2400
  #   health:
  #     enabled: true
  #   emissions:
  #     ghg_pricing_enabled: true

  # no_cv:
  #   # No consumer values, no fixed demands
  #   validation:
  #     enforce_baseline_diet: false
  #   food_incentives:
  #     enabled: false
  #   food_groups:
  #     fix_within_group_ratios:
  #       enabled: true
  #   macronutrients:
  #     cal:
  #       equal: 2400
  #   health:
  #     enabled: false
  #   emissions:
  #     ghg_pricing_enabled: false

  # no_cv_H:
  #   # No consumer values + health
