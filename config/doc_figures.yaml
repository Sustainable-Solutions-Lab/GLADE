# Configuration for generating documentation figures
# This inherits from default.yaml but uses coarser resolution for faster execution
# and to showcase global coverage without excessive computational cost

name: "doc_figures"

scenarios:
  # Scenario definitions for documentation figures
  # -----------------------------------------------
  # The 'default' scenario mirrors config/scenarios.yaml so existing doc figure
  # rules (which hardcode scen-default) keep working unchanged.
  #
  # The four trade-friction scenarios sweep trade costs from 0.25x to 100x the
  # baseline values, with moderate health and GHG pricing enabled.

  default:
    health:
      enabled: false
    emissions:
      ghg_pricing_enabled: false

  # --- Trade friction scenarios for landing-page GIF ---
  # Each multiplies every cost_per_km and default_trade_cost_per_km by the
  # stated factor. All enable moderate health + GHG pricing.

  free_trade:
    health:
      enabled: true
      value_per_yll: 5000
    emissions:
      ghg_pricing_enabled: false
    food_groups:
      fix_within_group_ratios:
        enabled: true
    validation:
      production_stability:
        enabled: true
        penalty_mode: "l1"
    trade:
      crop_default_trade_cost_per_km: 0.0025
      crop_trade_cost_categories:
        bulk_dry_goods:
          cost_per_km: 0.0015
        bulky_fresh:
          cost_per_km: 0.0035
        perishable_high_value:
          cost_per_km: 0.0055
      food_default_trade_cost_per_km: 0.00525
      food_trade_cost_categories:
        chilled_meat:
          cost_per_km: 0.007
        dairy_and_eggs:
          cost_per_km: 0.006
      feed_default_trade_cost_per_km: 0.003
      feed_trade_cost_categories:
        grain_protein:
          cost_per_km: 0.0015
        forage:
          cost_per_km: 0.003
        bulky_low_quality:
          cost_per_km: 0.004

  default_trade:
    health:
      enabled: true
      value_per_yll: 5000
    emissions:
      ghg_pricing_enabled: false
    food_groups:
      fix_within_group_ratios:
        enabled: true
    validation:
      production_stability:
        enabled: true
        penalty_mode: "l1"

  costly_trade:
    health:
      enabled: true
      value_per_yll: 5000
    emissions:
      ghg_pricing_enabled: false
    food_groups:
      fix_within_group_ratios:
        enabled: true
    validation:
      production_stability:
        enabled: true
        penalty_mode: "l1"
    trade:
      crop_default_trade_cost_per_km: 0.04
      crop_trade_cost_categories:
        bulk_dry_goods:
          cost_per_km: 0.024
        bulky_fresh:
          cost_per_km: 0.056
        perishable_high_value:
          cost_per_km: 0.088
      food_default_trade_cost_per_km: 0.084
      food_trade_cost_categories:
        chilled_meat:
          cost_per_km: 0.112
        dairy_and_eggs:
          cost_per_km: 0.096
      feed_default_trade_cost_per_km: 0.048
      feed_trade_cost_categories:
        grain_protein:
          cost_per_km: 0.024
        forage:
          cost_per_km: 0.048
        bulky_low_quality:
          cost_per_km: 0.064

  autarky:
    health:
      enabled: true
      value_per_yll: 5000
    emissions:
      ghg_pricing_enabled: false
    food_groups:
      fix_within_group_ratios:
        enabled: true
    validation:
      production_stability:
        enabled: true
        penalty_mode: "l1"
    trade:
      crop_default_trade_cost_per_km: 1.0
      crop_trade_cost_categories:
        bulk_dry_goods:
          cost_per_km: 0.6
        bulky_fresh:
          cost_per_km: 1.4
        perishable_high_value:
          cost_per_km: 2.2
      food_default_trade_cost_per_km: 2.1
      food_trade_cost_categories:
        chilled_meat:
          cost_per_km: 2.8
        dairy_and_eggs:
          cost_per_km: 2.4
      feed_default_trade_cost_per_km: 1.2
      feed_trade_cost_categories:
        grain_protein:
          cost_per_km: 0.6
        forage:
          cost_per_km: 1.2
        bulky_low_quality:
          cost_per_km: 1.6

# Use coarser spatial aggregation for faster processing
aggregation:
  regions:
    target_count: 250  # Reduced from 400 for faster processing
  resource_class_quantiles: [0.33, 0.67]  # Just 3 classes instead of 4
  irrigated_area_source: "current"

# Fewer trade hubs for simpler network visualization
trade:
  hubs: 10  # Reduced from 20

# Override the full crop list with a limited subset for fast execution
# This replaces the default crops list entirely
crops:
  - wheat          # Major cereal
  - wetland-rice   # Major cereal (Asia)
  - maize          # Major cereal (Americas/Africa)
  - soybean        # Major legume/oil crop
  - white-potato   # Major tuber
  - cassava        # Major tropical staple
  - tomato         # Vegetable
  - cabbage        # Vegetable
  - onion          # Vegetable
  - banana         # Fruit
  - citrus         # Fruit

# Add minimum consumption constraints to showcase animal products in figures
# Values in g/person/day (modest minima to ensure some production)
food_groups:
  constraints:
    red_meat:
      min: 20       # ~140g/week
    dairy:
      min: 100      # ~1 small serving/day
    eggs:
      min: 15       # ~1 egg every 4 days

solving:
  solver: "gurobi"
