# PCE-Based Global Sensitivity Analysis Configuration
# ----------------------------------------------------
# This configuration uses a space-filling Sobol sequence to generate scenarios
# for PCE-based sensitivity analysis. Polynomial Chaos Expansions are fitted
# to model outputs, yielding analytical Sobol indices (first-order and
# total-order) as well as conditional indices for designated slice parameters.
#
# The analysis is replicated at three L1 production-stability costs (0.22,
# 0.05, 0.5). Each L1 value has its own baseline scenario so that consumer
# values / piecewise utility blocks are correctly calibrated.

name: "pce_sensitivity"
scenarios:
  # PCE Sensitivity Analysis Scenarios
  # -----------------------------------
  # Uses a scrambled Sobol sequence for space-filling design, transformed
  # via inverse CDF to each parameter's distribution. PCE is fitted to
  # model outputs, giving analytical Sobol indices.
  #
  # Parameters and their uncertainty ranges (see docs/sensitivity_analysis.rst
  # for detailed justification and references):
  #   - yield_factor: 0.8-1.2 uniform (20% uncertainty in crop yields)
  #   - ch4_factor: 0.5-1.5 normal 90% CI (combined EF + GWP100 uncertainty)
  #   - n2o_factor: 0.3-1.7 normal 90% CI (combined EF + GWP100 uncertainty)
  #   - luc_factor: 0.3-1.7 normal 90% CI (70% uncertainty in LUC emissions)
  #   - flw_factor: 0.7-1.3 uniform (30% uncertainty in food loss & waste)
  #   - fcr_factor: 0.8-1.2 uniform (20% uncertainty in feed conversion ratios)
  #   - rr_protective: 0-1 (grouped quantile for protective risk factors)
  #   - rr_harmful: 0-1 (grouped quantile for harmful risk factors)
  #   - value_per_yll: 0-20000 (YLL valuation, slice parameter)
  #   - ghg_price: 0-300 (GHG price, slice parameter)
  #
  # Each generator group is replicated at three L1 production-stability costs
  # (0.22, 0.05, 0.5) with matching baseline scenarios for calibration.

  # Baseline scenarios for calibrating piecewise food utility blocks.
  # One per L1 cost so that consumer values (dual variables) reflect the
  # production-stability regime of each scenario group.
  baseline: &baseline_template
    validation:
      enforce_baseline_diet: true
    food_utility_piecewise:
      enabled: false
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0

  baseline_l1_0p05:
    <<: *baseline_template
    validation:
      enforce_baseline_diet: true
      production_stability:
        l1_cost: 0.05

  baseline_l1_0p5:
    <<: *baseline_template
    validation:
      enforce_baseline_diet: true
      production_stability:
        l1_cost: 0.5

  # Default scenario for reference (no sensitivity adjustments)
  default: {}

  _generators:
    # --- Default L1 (0.22) ---
    - name: pce_{sample_id}
      mode: sensitivity
      method: pce
      grid_resolution: 50
      method_options:
        n_mc_conditional: 4096
        cross_truncation: 0.8
      samples: 8
      slice_parameters: [value_per_yll, ghg_price]
      parameter_groups: &pce_parameter_groups
        "Emission factors": [ch4_factor, n2o_factor, luc_factor]
        "Agricultural": [yield_factor, flw_factor, fcr_factor]
        "Health risk": [rr_protective, rr_harmful]
      parameters: &pce_parameters
        yield_factor:
          lower: 0.8
          upper: 1.2
          bounds: [0, null]
        ch4_factor:
          distribution: normal_ci
          lower: 0.5
          upper: 1.5
          confidence: 0.9
          bounds: [0, null]
        n2o_factor:
          distribution: normal_ci
          lower: 0.3
          upper: 1.7
          confidence: 0.9
          bounds: [0, null]
        luc_factor:
          distribution: normal_ci
          lower: 0.3
          upper: 1.7
          confidence: 0.9
          bounds: [0, null]
        flw_factor:
          lower: 0.7
          upper: 1.3
          bounds: [0, null]
        fcr_factor:
          lower: 0.8
          upper: 1.2
          bounds: [0, null]
        rr_protective:
          lower: 0
          upper: 1
          bounds: [0, 1]
        rr_harmful:
          lower: 0
          upper: 1
          bounds: [0, 1]
        value_per_yll:
          lower: 0
          upper: 20000
          bounds: [0, null]
        ghg_price:
          lower: 0
          upper: 300
          bounds: [0, null]
      template: &pce_template
        sensitivity:
          crop_yields:
            all: "{yield_factor}"
          emission_factors:
            ch4: "{ch4_factor}"
            n2o: "{n2o_factor}"
            luc: "{luc_factor}"
          food_loss_waste: "{flw_factor}"
          feed_conversion: "{fcr_factor}"
          health_relative_risk:
            protective: "{rr_protective}"
            harmful: "{rr_harmful}"
        health:
          value_per_yll: "{value_per_yll}"
        emissions:
          ghg_price: "{ghg_price}"
        consumer_values:
          baseline_scenario: "baseline"

    # --- L1 = 0.05 ---
    - name: pce-l1-0p05_{sample_id}
      mode: sensitivity
      method: pce
      grid_resolution: 50
      method_options:
        n_mc_conditional: 4096
        cross_truncation: 0.8
      samples: 8
      slice_parameters: [value_per_yll, ghg_price]
      parameter_groups: *pce_parameter_groups
      parameters: *pce_parameters
      template:
        <<: *pce_template
        validation:
          production_stability:
            l1_cost: 0.05
        consumer_values:
          baseline_scenario: "baseline_l1_0p05"

    # --- L1 = 0.5 ---
    - name: pce-l1-0p5_{sample_id}
      mode: sensitivity
      method: pce
      grid_resolution: 50
      method_options:
        n_mc_conditional: 4096
        cross_truncation: 0.8
      samples: 8
      slice_parameters: [value_per_yll, ghg_price]
      parameter_groups: *pce_parameter_groups
      parameters: *pce_parameters
      template:
        <<: *pce_template
        validation:
          production_stability:
            l1_cost: 0.5
        consumer_values:
          baseline_scenario: "baseline_l1_0p5"

# Set planning horizon and baseline year to match GDD baseline data (2018)
planning_horizon: 2020
baseline_year: 2020

# Block-based diminishing marginal utility for food consumption
food_utility_piecewise:
  enabled: true

validation:
  use_actual_yields: true
  production_stability:
    enabled: true
    penalty_mode: "l1"
    deviation_type: "absolute"
    l1_cost: 0.22

water:
  supply_scenario: "current_use"

residues:
  max_feed_fraction_by_region:
    Asia: 0.70

grazing:
  # Slightly higher utilization rate matches grassland supply with feed demand
  isimip_utilization_rate: 0.60

land:
  regional_limit: 1.0 # fraction of each region's potential cropland that is made available.

health:
  region_clusters: 15
  intake_grid_points: 8  # Number of grid knots over empirical RR range

# Compare all scenarios in plots
plotting:
  comparison_scenarios: "all"

solving:
  solver: "gurobi"
  io_api: "direct"
  threads: 2
  mem_mb: 9000
  time_limit: 60
  runtime: 30

remote_solve:
  enabled: false
  local_scenarios: ["baseline", "baseline_l1_0p05", "baseline_l1_0p5"]
  host: "shr"
  workdir: "~/food-opt-scratch"
  pixi_env: "gurobi"
  use_slurm: true
  slurm_account: "sjdavis"
  slurm_partition: "owners"
  sync_pixi_files: false
  ssh_options: []
  rsync_options: []
  preflight_check: true
