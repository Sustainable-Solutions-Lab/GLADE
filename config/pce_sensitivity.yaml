# PCE-Based Global Sensitivity Analysis Configuration
# ----------------------------------------------------
# This configuration uses a space-filling Sobol sequence to generate scenarios
# for PCE-based sensitivity analysis. Polynomial Chaos Expansions are fitted
# to model outputs, yielding analytical Sobol indices (first-order and
# total-order) as well as conditional indices for designated slice parameters.

name: "pce_sensitivity"
scenarios:
  # PCE Sensitivity Analysis Scenarios
  # -----------------------------------
  # Uses a scrambled Sobol sequence for space-filling design, transformed
  # via inverse CDF to each parameter's distribution. PCE is fitted to
  # model outputs, giving analytical Sobol indices.
  #
  # Parameters and their uncertainty ranges:
  #   - yield_factor: 0.8-1.2 (20% uncertainty in crop yields)
  #   - ch4_factor: 0.7-1.3 (30% uncertainty in CH4 emission factors)
  #   - n2o_factor: 0.7-1.3 (30% uncertainty in N2O emission factors)
  #   - luc_factor: 0.5-1.5 (50% uncertainty in LUC emissions)
  #   - rr_*: 0-1 (quantile interpolation between GBD rr_low and rr_high)
  #   - value_per_yll: 5000-500000 (YLL valuation, slice parameter)
  #   - ghg_price: 0-300 (GHG price, slice parameter)

  # Baseline scenario for calibrating piecewise food utility blocks (dual variables)
  baseline:
    validation:
      enforce_baseline_diet: true
      production_stability:
        enabled: false
    food_utility_piecewise:
      enabled: false
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0

  # Default scenario for reference (no sensitivity adjustments)
  default: {}

  _generators:
    - name: pce_{sample_id}
      mode: sensitivity
      method: pce        # "pce" or "rf"
      grid_resolution: 50
      method_options:
        n_mc_conditional: 4096
      samples: 1024
      slice_parameters: [value_per_yll, ghg_price]
      parameters:
        # yield_factor:
        #   lower: 0.8
        #   upper: 1.2
        ch4_factor:
          lower: 0.7
          upper: 1.3
        n2o_factor:
          lower: 0.7
          upper: 1.3
        # luc_factor:
        #   lower: 0.5
        #   upper: 1.5
        # rr_fruits:
        #   lower: 0
        #   upper: 1
        # rr_vegetables:
        #   lower: 0
        #   upper: 1
        rr_whole_grains:
          lower: 0
          upper: 1
        rr_legumes:
          lower: 0
          upper: 1
        # rr_nuts_seeds:
        #   lower: 0
        #   upper: 1
        rr_red_meat:
          lower: 0
          upper: 1
        value_per_yll:
          lower: 0
          upper: 20000
        ghg_price:
          lower: 0
          upper: 300
      template:
        sensitivity:
          # crop_yields:
          #   all: "{yield_factor}"
          emission_factors:
            ch4: "{ch4_factor}"
            n2o: "{n2o_factor}"
            # luc: "{luc_factor}"
          health_relative_risk:
            # fruits: "{rr_fruits}"
            # vegetables: "{rr_vegetables}"
            whole_grains: "{rr_whole_grains}"
            legumes: "{rr_legumes}"
            # nuts_seeds: "{rr_nuts_seeds}"
            red_meat: "{rr_red_meat}"
        health:
          value_per_yll: "{value_per_yll}"
        emissions:
          ghg_price: "{ghg_price}"

# Block-based diminishing marginal utility for food consumption
food_utility_piecewise:
  enabled: true

# Use validation mode for more realistic production patterns
validation:
  use_actual_yields: true
  production_stability:
    enabled: true
    penalty_mode: "l1"

# Enable health modeling for RR sensitivity
health:
  enabled: true
  value_per_yll: 50000

# Enable GHG pricing
emissions:
  ghg_pricing_enabled: true
  ghg_price: 100

# Use regionalized feed efficiency values
animal_products:
  feed_efficiency_regions: null

# Compare all scenarios in plots
plotting:
  comparison_scenarios: "all"

# Solver configuration
solving:
  solver: "gurobi"
  io_api: "direct"
  threads: 6
  mem_mb: 8000
  runtime: 10

remote_solve:
  enabled: true
  local_scenarios: ["baseline"]
  host: "shr"
  workdir: "~/food-opt-scratch"
  pixi_env: "gurobi"
  use_slurm: true
  slurm_account: "sjdavis"
  slurm_partition: "serc"
  sync_workflow: true
  sync_pixi_files: false
  ssh_options: []
  rsync_options: []
  preflight_check: true
