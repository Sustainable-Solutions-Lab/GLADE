# Central Healthy & Sustainable Diet Scenario
# -------------------------------------------
# Single (GHG, YLL) operating point used as the central case in the
# paper's "transition to healthy & sustainable diets" subsection.
# Round-number anchors: GHG price 50 USD/tCO2-eq (in the neighbourhood
# of widely cited SCC reference values, e.g. the US IWG central $51),
# life valued at 5000 USD/YLL (the lower bound of the conventional VSL
# range, see paper main text).
#
# Mirrors the solve-time setup of config/ghg_yll_grid.yaml (same
# planning horizon, baseline year, food-utility piecewise blocks,
# production-stability penalties), so the baseline calibrates against
# the same diet that ghg_yll_grid uses.

name: "central"
scenarios:
  # Suppress the implicit "default" scenario inherited from default.yaml.
  default: null

  # Baseline scenario for calibrating piecewise food utility blocks
  # (dual variables). Identical structure to ghg_yll_grid's baseline.
  baseline:
    validation:
      enforce_baseline_diet: true
    food_utility_piecewise:
      enabled: false
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0

  # Zero-pricing optimum (reference point for the transition).
  reference:
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0
    macronutrients:
      cal:
        equal_to_baseline: true

  # Central healthy & sustainable point.
  central:
    emissions:
      ghg_price: 50
    health:
      value_per_yll: 5000
    macronutrients:
      cal:
        equal_to_baseline: true

# Per-country reforestation cap: no country may reforest more than 50% of
# its current agricultural land (baseline cropland + existing pasture). Pins
# the discrete central/reference/baseline solves to the same cap the paper's
# surrogate sweeps use (reforest_fraction: 0.5 in
# paper/plotting_config.yaml), so the central-scenario headline numbers stay
# consistent with the capped response surfaces. Deep-merges with the
# reforestation_cap_buffer_mha default from config/default.yaml.
sensitivity:
  max_reforestation_fraction: 0.5

# Block-based diminishing marginal utility for food consumption
food_utility_piecewise:
  enabled: true

plotting:
  comparison_scenarios: "all"

solving:
  solver: "gurobi"
  io_api: "direct"
  threads: 4
  mem_mb: 10000
  runtime: 60
