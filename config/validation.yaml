name: "validation"
scenarios:
  default: {}

planning_horizon: 2020

validation:
  use_actual_yields: true
  use_actual_production: true
  enforce_baseline_diet: true
  disable_spared_cropland: true
  disable_spared_grassland: true
  slack_marginal_cost: 10
  grassland_yield_multiplier: 1.2
  feed_efficiency_multiplier: 1.15

water:
  supply_scenario: current_use

residues:
  max_feed_fraction_by_region:
    Asia: 0.70

animal_products:
  # Use regionalized feed efficiency values
  feed_efficiency_regions: null

grazing:
  # Slightly higher utilization rate matches grassland supply with feed demand
  isimip_utilization_rate: 0.60

land:
  regional_limit: 1.

# macronutrients:
#   cal:
#     min: 2400

health:
  enabled: false

solving:
  io_api: "direct"
  solver: "highs"
  threads: 1
