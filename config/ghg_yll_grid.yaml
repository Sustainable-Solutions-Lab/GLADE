# GHG/YLL Grid Sensitivity Analysis Configuration
# -----------------------------------------------
# Mirrors the combined GHG+YLL setup from sensitivity.yaml, but explores
# the full Cartesian grid of GHG price and YLL value combinations.

name: "ghg_yll_grid"
scenarios:
  # GHG/YLL Grid Sensitivity Scenarios
  # ----------------------------------
  # Full 2D grid over GHG prices and YLL values.

  # Baseline scenario for calibrating piecewise food utility blocks (dual variables)
  baseline:
    validation:
      enforce_baseline_diet: true
      production_stability:
        enabled: false
    food_utility_piecewise:
      enabled: false
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0

  ghg_yll_0:
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0
    macronutrients:
      cal:
        equal_to_baseline: true
    # food_groups:
    #   fix_within_group_ratios:
    #     enabled: true
    # macronutrients:
    #   protein:
    #     min: 68.49
    #   fat:
    #     min: 56.13

  # =============================================================================
  # Generated Scenarios (full grid)
  # =============================================================================

  _generators:
    - name: ghg_yll_{ghg}_{yll}
      mode: grid
      parameters:
        ghg:
          space: log
          start: 2
          stop: 500
          num: 8
          round: true
        yll:
          space: log
          start: 50
          stop: 100000
          num: 8
          round: true
      template:
        emissions:
          ghg_price: "{ghg}"
        health:
          value_per_yll: "{yll}"
        macronutrients:
          cal:
            equal_to_baseline: true
        # food_groups:
        #   fix_within_group_ratios:
        #     enabled: true
        # macronutrients:
        #   protein:
        #     min: 68.49
        #   fat:
        #     min: 56.13

# Block-based diminishing marginal utility for food consumption
food_utility_piecewise:
  enabled: true

crop_costs:
  per_tonne_cost_fraction: 0.9

validation:
  use_actual_yields: true
  production_stability:
    enabled: true
    penalty_mode: "l1"
    deviation_type: "absolute"
    l1_cost: 0.1
    # Absolute deviation with l1_cost=0.01-0.1 also quite viable performance-wise

# Compare all scenarios in plots
plotting:
  comparison_scenarios: "all"

solving:
  solver: "gurobi"
  io_api: "direct"
  threads: 2
  mem_mb: 8000
  runtime: 30

remote_solve:
  enabled: true
  local_scenarios: ["baseline"]
  host: "shr"
  workdir: "~/food-opt-scratch"
  pixi_env: "gurobi"
  use_slurm: true
  slurm_account: "sjdavis"
  slurm_partition: "serc"
  sync_workflow: true
  sync_pixi_files: false
  ssh_options: []
  rsync_options: []
  preflight_check: true
