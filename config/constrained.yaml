name: "constrained"
scenarios:
  # Production Stability Sensitivity Scenarios
  # ----------------------------------------
  # Each scenario relaxes production stability bounds (max_relative_deviation)
  # from near-baseline production toward unconstrained optimization.
  # The final scenario disables production stability entirely.

  ps_000:
    validation:
      production_stability:
        enabled: true
        crops:
          enabled: true
          max_relative_deviation: 0.00
        animals:
          enabled: true
          max_relative_deviation: 0.00

  ps_005:
    validation:
      production_stability:
        enabled: true
        crops:
          enabled: true
          max_relative_deviation: 0.05
        animals:
          enabled: true
          max_relative_deviation: 0.05

  ps_010:
    validation:
      production_stability:
        enabled: true
        crops:
          enabled: true
          max_relative_deviation: 0.10
        animals:
          enabled: true
          max_relative_deviation: 0.10

  ps_020:
    validation:
      production_stability:
        enabled: true
        crops:
          enabled: true
          max_relative_deviation: 0.20
        animals:
          enabled: true
          max_relative_deviation: 0.20

  ps_040:
    validation:
      production_stability:
        enabled: true
        crops:
          enabled: true
          max_relative_deviation: 0.40
        animals:
          enabled: true
          max_relative_deviation: 0.40

  ps_080:
    validation:
      production_stability:
        enabled: true
        crops:
          enabled: true
          max_relative_deviation: 0.80
        animals:
          enabled: true
          max_relative_deviation: 0.80

  ps_100:
    validation:
      production_stability:
        enabled: true
        crops:
          enabled: true
          max_relative_deviation: 1.00
        animals:
          enabled: true
          max_relative_deviation: 1.00

  ps_unconstrained:
    validation:
      production_stability:
        enabled: false
        crops:
          enabled: true
          max_relative_deviation: 0.20
        animals:
          enabled: true
          max_relative_deviation: 0.20

plotting:
  comparison_scenarios: "all"

# Scenario presets loosen production stability bounds from "today" toward
# unconstrained optimization.

# Enable production stability at base level so input files are included for all
# scenarios (Snakemake input functions run before scenario overrides apply).
# Enable land slack to allow minor exceedance of regional land limits.
validation:
  land_slack: true
  production_stability:
    enabled: true
    crops:
      enabled: true
      enable_slack: true
    animals:
      enabled: true
      enable_slack: true

water:
  supply_scenario: current_use

# Use Gurobi solver to get IIS diagnosis for infeasibility
solving:
  solver: gurobi
