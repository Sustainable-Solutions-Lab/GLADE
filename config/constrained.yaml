name: "constrained"
scenarios:
  # Deviation-penalty Sensitivity Scenarios
  # ---------------------------------------
  # Each scenario relaxes the hard-mode land + feed bounds
  # (max_relative_deviation) from near-baseline production toward
  # unconstrained optimization. The final scenario disables the
  # deviation penalty entirely.

  _generators:
    - name: ps_{deviation}
      parameters:
        deviation:
          values: [0.00, 0.05, 0.10, 0.20, 0.40, 0.80, 1.00]
          name_format: "lambda x: f'{int(x*100):03d}'"
      template:
        deviation_penalty:
          enabled: true
          land:
            enabled: true
            crops:
              enabled: true
              max_relative_deviation: "{deviation}"
          feed:
            enabled: true
            max_relative_deviation: "{deviation}"

  ps_unconstrained:
    deviation_penalty:
      enabled: false

plotting:
  comparison_scenarios: "all"

# Enable deviation penalty at base level so input files are included for
# all scenarios (Snakemake input functions run before scenario overrides
# apply). Enable land slack to allow minor exceedance of regional land
# limits.
validation:
  land_slack: true
deviation_penalty:
  enabled: true
  penalty_mode: "hard"
  land:
    enabled: true
    crops:
      enabled: true
      enable_slack: true
  feed:
    enabled: true
    enable_slack: true

water:
  supply_scenario: current_use

# Use Gurobi solver to get IIS diagnosis for infeasibility
solving:
  solver: gurobi
