name: "constrained"
scenarios:
  # Production Stability Sensitivity Scenarios
  # ----------------------------------------
  # Each scenario relaxes production stability bounds (max_relative_deviation)
  # from near-baseline production toward unconstrained optimization.
  # The final scenario disables production stability entirely.

  _generators:
    - name: ps_{deviation}
      parameters:
        deviation:
          values: [0.00, 0.05, 0.10, 0.20, 0.40, 0.80, 1.00]
          name_format: "lambda x: f'{int(x*100):03d}'"
      template:
        validation:
          production_stability:
            enabled: true
            crops:
              enabled: true
              max_relative_deviation: "{deviation}"
            animals:
              enabled: true
              max_relative_deviation: "{deviation}"

  ps_unconstrained:
    validation:
      production_stability:
        enabled: false
        crops:
          enabled: true
          max_relative_deviation: 0.20
        animals:
          enabled: true
          max_relative_deviation: 0.20

plotting:
  comparison_scenarios: "all"

# Scenario presets loosen production stability bounds from "today" toward
# unconstrained optimization.

# Enable production stability at base level so input files are included for all
# scenarios (Snakemake input functions run before scenario overrides apply).
# Enable land slack to allow minor exceedance of regional land limits.
validation:
  land_slack: true
  production_stability:
    enabled: true
    crops:
      enabled: true
      enable_slack: true
    animals:
      enabled: true
      enable_slack: true

water:
  supply_scenario: current_use

# Use Gurobi solver to get IIS diagnosis for infeasibility
solving:
  solver: gurobi
