# Combined Sensitivity Analysis Configuration
# -------------------------------------------
# Combines GHG price sensitivity, YLL value sensitivity, and joint GHG+YLL
# sensitivity into a single configuration with multiple scenario groups.
#
# Scenario groups:
#   - ghg_*: GHG price sensitivity (health value = 0)
#   - yll_*: Health value sensitivity (GHG price = 0)
#   - ghg_yll_*: Combined sensitivity (both vary together)

name: "sensitivity"
scenarios:
  # Combined Sensitivity Analysis Scenarios
  # ---------------------------------------
  # Includes three sensitivity analyses:
  #   1. GHG price sensitivity (ghg_*): vary GHG price with health value = 0
  #   2. YLL value sensitivity (yll_*): vary health value with GHG price = 0
  #   3. Combined sensitivity (ghg_yll_*): vary both parameters together

  # Baseline scenario for calibrating piecewise food utility blocks (dual variables)
  baseline:
    validation:
      enforce_baseline_diet: true
    food_utility_piecewise:
      enabled: false
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0

  # =============================================================================
  # GHG Price Sensitivity (health value = 0)
  # =============================================================================

  ghg_0:
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0
    macronutrients:
      cal:
        equal_to_baseline: true

  # =============================================================================
  # YLL Value Sensitivity (GHG price = 0)
  # =============================================================================

  yll_0:
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0
    macronutrients:
      cal:
        equal_to_baseline: true

  # =============================================================================
  # Combined GHG+YLL Sensitivity (both vary together)
  # =============================================================================

  ghg_yll_0:
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0
    macronutrients:
      cal:
        equal_to_baseline: true

  # =============================================================================
  # Generated Scenarios
  # =============================================================================

  _generators:
    # GHG price sensitivity: 1 to 500 USD/tCO2-eq (log-spaced, 10 points)
    - name: ghg_{ghg}
      parameters:
        ghg:
          space: log
          start: 5
          stop: 500
          num: 10
          round: true
      template:
        emissions:
          ghg_price: "{ghg}"
        health:
          value_per_yll: 0
        macronutrients:
          cal:
            equal_to_baseline: true

    # YLL value sensitivity: 5 to 100000 USD/YLL (log-spaced, 10 points)
    - name: yll_{yll}
      parameters:
        yll:
          space: log
          start: 50
          stop: 100000
          num: 10
          round: true
      template:
        emissions:
          ghg_price: 0
        health:
          value_per_yll: "{yll}"
        macronutrients:
          cal:
            equal_to_baseline: true

    # Combined sensitivity: both parameters vary together (log-spaced, 10 points each)
    - name: ghg_yll_{ghg}
      mode: zip
      parameters:
        ghg:
          space: log
          start: 5
          stop: 500
          num: 10
          round: true
        yll:
          space: log
          start: 50
          stop: 100000
          num: 10
          round: true
      template:
        emissions:
          ghg_price: "{ghg}"
        health:
          value_per_yll: "{yll}"
        macronutrients:
          cal:
            equal_to_baseline: true

# Set planning horizon and baseline year to match GDD baseline data (2018)
planning_horizon: 2020
baseline_year: 2020

# Block-based diminishing marginal utility for food consumption
food_utility_piecewise:
  enabled: true

validation:
  use_actual_yields: true
  production_stability:
    enabled: true
    penalty_mode: "l1"
    deviation_type: "absolute"
    l1_cost: 0.5
    # Absolute deviation with l1_cost=0.01-0.1 also quite viable performance-wise

water:
  supply_scenario: "current_use"

residues:
  max_feed_fraction_by_region:
    Asia: 0.70

grazing:
  # Slightly higher utilization rate matches grassland supply with feed demand
  isimip_utilization_rate: 0.60
  forage_overlap_subtraction_alpha: 1.0

land:
  regional_limit: 1.0 # fraction of each region's potential cropland that is made available.

health:
  region_clusters: 15
  intake_grid_points: 8  # Number of grid knots over empirical RR range

# Compare all scenarios in plots
plotting:
  comparison_scenarios: "all"

solving:
  solver: "gurobi"
  io_api: "direct"
  threads: 8
  mem_mb: 9000
  runtime: 20

remote_solve:
  enabled: true
  local_scenarios: ["baseline"]
  host: "shr"
  workdir: "~/food-opt-scratch"
  pixi_env: "gurobi"
  use_slurm: true
  slurm_account: "sjdavis"
  slurm_partition: "serc"
  sync_workflow: true
  sync_pixi_files: false
  ssh_options: []
  rsync_options: []
  preflight_check: true
