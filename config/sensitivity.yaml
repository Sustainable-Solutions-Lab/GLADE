# Combined Sensitivity Analysis Configuration
# -------------------------------------------
# GHG price, YLL value, and joint GHG+YLL sensitivity at the calibrated
# default production-stability regime (`l1_cost=0.12`, `animals.l1_cost=0.033`;
# see notebooks/prod_stability_calibration.ipynb for the calibration).
#
# Alternative stability regimes (0.05 / 0.5) live in
# config/stability_sensitivity.yaml.
#
# Scenario groups:
#   - ghg_*: GHG price sensitivity (health value = 0)
#   - yll_*: Health value sensitivity (GHG price = 0)
#   - ghg_yll_*: Combined sensitivity (both vary together)

name: "sensitivity"
scenarios:
  # Baseline scenario for calibrating piecewise food utility blocks.
  baseline:
    validation:
      enforce_baseline_diet: true
    food_utility_piecewise:
      enabled: false
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0

  _generators:
    # --- Zero-point scenarios ------------------------------------------------
    - name: "{prefix}"
      parameters:
        prefix:
          values: ["ghg_0", "yll_0", "ghg_yll_0"]
      template:
        emissions:
          ghg_price: 0
        health:
          value_per_yll: 0
        macronutrients:
          cal:
            equal_to_baseline: true

    # --- GHG price sensitivity: 5 to 500 USD/tCO2-eq (log-spaced) -----------
    - name: "ghg_{ghg}"
      parameters:
        ghg: &ghg_range
          space: log
          start: 5
          stop: 500
          num: &num_points 10
          round: true
      template:
        emissions:
          ghg_price: "{ghg}"
        health:
          value_per_yll: 0
        macronutrients:
          cal:
            equal_to_baseline: true

    # --- YLL value sensitivity: 50 to 100000 USD/YLL (log-spaced) -----------
    - name: "yll_{yll}"
      parameters:
        yll: &yll_range
          space: log
          start: 50
          stop: 100000
          num: *num_points
          round: true
      template:
        emissions:
          ghg_price: 0
        health:
          value_per_yll: "{yll}"
        macronutrients:
          cal:
            equal_to_baseline: true

    # --- Combined sensitivity: both parameters vary together (log-spaced) ---
    - name: ghg_yll_{ghg}
      mode: zip
      parameters:
        ghg: *ghg_range
        yll: *yll_range
      template:
        emissions:
          ghg_price: "{ghg}"
        health:
          value_per_yll: "{yll}"
        macronutrients:
          cal:
            equal_to_baseline: true

# Set planning horizon and baseline year to match GDD baseline data (2018)
planning_horizon: 2020
baseline_year: 2020

# Block-based diminishing marginal utility for food consumption
food_utility_piecewise:
  enabled: true

validation:
  use_actual_yields: true
  production_stability:
    enabled: true
    penalty_mode: "l1"
    deviation_type: "absolute"
    l1_cost: 0.12
    animals:
      l1_cost: 0.033

# Compare all scenarios in plots
plotting:
  comparison_scenarios: "all"

solving:
  solver: "gurobi"
  io_api: "direct"
  threads: 2
  mem_mb: 10000
  runtime: 20

remote_solve:
  enabled: false
  local_scenarios: ["baseline"]
  host: "shr"
  workdir: "~/food-opt-scratch"
  pixi_env: "gurobi"
  use_slurm: true
  slurm_account: "sjdavis"
  slurm_partition: "owners"
  sync_pixi_files: false
  ssh_options: []
  rsync_options: []
  preflight_check: true
