# Combined Sensitivity Analysis Configuration
# -------------------------------------------
# Combines GHG price sensitivity, YLL value sensitivity, and joint GHG+YLL
# sensitivity into a single configuration with multiple scenario groups.
#
# Scenario groups:
#   - ghg_*: GHG price sensitivity (health value = 0)
#   - yll_*: Health value sensitivity (GHG price = 0)
#   - ghg_yll_*: Combined sensitivity (both vary together)

name: "sensitivity"
scenarios:
  # Combined Sensitivity Analysis Scenarios
  # ---------------------------------------
  # Includes three sensitivity analyses:
  #   1. GHG price sensitivity (ghg_*): vary GHG price with health value = 0
  #   2. YLL value sensitivity (yll_*): vary health value with GHG price = 0
  #   3. Combined sensitivity (ghg_yll_*): vary both parameters together

  # Baseline scenario for calibrating piecewise food utility blocks (dual variables)
  baseline:
    validation:
      enforce_baseline_diet: true
    food_utility_piecewise:
      enabled: false
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0

  # =============================================================================
  # Generated Scenarios
  # =============================================================================
  # Each generator sweeps its primary parameter(s) × l1_cost (production
  # stability penalty). The default l1_cost (0.5) produces the original
  # scenario names; alternative values append a suffix (e.g. _l1_0p1).

  _generators:
    # Zero-point scenarios for each sensitivity group × l1_cost
    - name: "{prefix}{l1_cost}"
      mode: grid
      parameters:
        prefix:
          values: ["ghg_0", "yll_0", "ghg_yll_0"]
        l1_cost: &l1_cost_param
          values: [0.5, 0.1, 10]
          name_format: "lambda x: '' if x == 0.5 else '_l1_' + str(x).replace('.', 'p')"
      template:
        emissions:
          ghg_price: 0
        health:
          value_per_yll: 0
        macronutrients:
          cal:
            equal_to_baseline: true
        validation:
          production_stability:
            l1_cost: "{l1_cost}"

    # GHG price sensitivity: 5 to 500 USD/tCO2-eq (log-spaced)
    - name: "ghg_{ghg}{l1_cost}"
      mode: grid
      parameters:
        ghg: &ghg_range
          space: log
          start: 5
          stop: 500
          num: &num_points 10
          round: true
        l1_cost: *l1_cost_param
      template:
        emissions:
          ghg_price: "{ghg}"
        health:
          value_per_yll: 0
        macronutrients:
          cal:
            equal_to_baseline: true
        validation:
          production_stability:
            l1_cost: "{l1_cost}"

    # YLL value sensitivity: 50 to 100000 USD/YLL (log-spaced)
    - name: "yll_{yll}{l1_cost}"
      mode: grid
      parameters:
        yll: &yll_range
          space: log
          start: 50
          stop: 100000
          num: *num_points
          round: true
        l1_cost: *l1_cost_param
      template:
        emissions:
          ghg_price: 0
        health:
          value_per_yll: "{yll}"
        macronutrients:
          cal:
            equal_to_baseline: true
        validation:
          production_stability:
            l1_cost: "{l1_cost}"

    # Combined sensitivity: both parameters vary together (log-spaced)
    # Separate generators per l1_cost because ghg+yll must be zipped (not crossed).
    - name: ghg_yll_{ghg}
      mode: zip
      parameters:
        ghg: *ghg_range
        yll: *yll_range
      template:
        emissions:
          ghg_price: "{ghg}"
        health:
          value_per_yll: "{yll}"
        macronutrients:
          cal:
            equal_to_baseline: true

    - name: ghg_yll_{ghg}_l1_0p1
      mode: zip
      parameters:
        ghg: *ghg_range
        yll: *yll_range
      template:
        emissions:
          ghg_price: "{ghg}"
        health:
          value_per_yll: "{yll}"
        macronutrients:
          cal:
            equal_to_baseline: true
        validation:
          production_stability:
            l1_cost: 0.1

    - name: ghg_yll_{ghg}_l1_10
      mode: zip
      parameters:
        ghg: *ghg_range
        yll: *yll_range
      template:
        emissions:
          ghg_price: "{ghg}"
        health:
          value_per_yll: "{yll}"
        macronutrients:
          cal:
            equal_to_baseline: true
        validation:
          production_stability:
            l1_cost: 10

# Set planning horizon and baseline year to match GDD baseline data (2018)
planning_horizon: 2020
baseline_year: 2020

# Block-based diminishing marginal utility for food consumption
food_utility_piecewise:
  enabled: true

validation:
  use_actual_yields: true
  production_stability:
    enabled: true
    penalty_mode: "l1"
    deviation_type: "absolute"
    l1_cost: 0.5
    # Absolute deviation with l1_cost=0.01-0.1 also quite viable performance-wise

health:
  region_clusters: 15
  intake_grid_points: 8  # Number of grid knots over empirical RR range

# Compare all scenarios in plots
plotting:
  comparison_scenarios: "all"

solving:
  solver: "gurobi"
  io_api: "direct"
  threads: 2
  mem_mb: 9000
  runtime: 20

remote_solve:
  enabled: false
  local_scenarios: ["baseline"]
  host: "shr"
  workdir: "~/food-opt-scratch"
  pixi_env: "gurobi"
  use_slurm: true
  slurm_account: "sjdavis"
  slurm_partition: "owners"
  sync_workflow: true
  sync_pixi_files: false
  ssh_options: []
  rsync_options: []
  preflight_check: true
