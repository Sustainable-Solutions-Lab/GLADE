# Combined Sensitivity Analysis Configuration
# -------------------------------------------
# Combines GHG price sensitivity, YLL value sensitivity, and joint GHG+YLL
# sensitivity into a single configuration with multiple scenario groups.
#
# Scenario groups:
#   - ghg_*: GHG price sensitivity (health value = 0)
#   - yll_*: Health value sensitivity (GHG price = 0)
#   - ghg_yll_*: Combined sensitivity (both vary together)
#
# Each group is replicated at three L1 production-stability costs (0.22,
# 0.05, 0.5).  Each L1 value has its own baseline scenario so that consumer
# values / piecewise utility blocks are correctly calibrated.

name: "sensitivity"
scenarios:
  # Baseline scenarios for calibrating piecewise food utility blocks.
  # One per L1 cost so that consumer values (dual variables) reflect the
  # production-stability regime of each scenario group.
  baseline: &baseline_template
    validation:
      enforce_baseline_diet: true
    food_utility_piecewise:
      enabled: false
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0

  baseline_l1_0p05:
    <<: *baseline_template
    validation:
      enforce_baseline_diet: true
      production_stability:
        l1_cost: 0.05

  baseline_l1_0p5:
    <<: *baseline_template
    validation:
      enforce_baseline_diet: true
      production_stability:
        l1_cost: 0.5

  # =============================================================================
  # Generated Scenarios
  # =============================================================================
  # Each generator sweeps its primary parameter(s) at one L1 cost.
  # The default L1 (0.22) uses top-level defaults for l1_cost and
  # consumer_values.baseline_scenario; non-default L1 values override both.

  _generators:
    # --- Zero-point scenarios ------------------------------------------------
    - name: "{prefix}"
      parameters:
        prefix:
          values: ["ghg_0", "yll_0", "ghg_yll_0"]
      template: &zero_template
        emissions:
          ghg_price: 0
        health:
          value_per_yll: 0
        macronutrients:
          cal:
            equal_to_baseline: true

    - name: "{prefix}_l1_0p05"
      parameters:
        prefix:
          values: ["ghg_0", "yll_0", "ghg_yll_0"]
      template:
        <<: *zero_template
        validation:
          production_stability:
            l1_cost: 0.05
        consumer_values:
          baseline_scenario: "baseline_l1_0p05"

    - name: "{prefix}_l1_0p5"
      parameters:
        prefix:
          values: ["ghg_0", "yll_0", "ghg_yll_0"]
      template:
        <<: *zero_template
        validation:
          production_stability:
            l1_cost: 0.5
        consumer_values:
          baseline_scenario: "baseline_l1_0p5"

    # --- GHG price sensitivity: 5 to 500 USD/tCO2-eq (log-spaced) -----------
    - name: "ghg_{ghg}"
      parameters:
        ghg: &ghg_range
          space: log
          start: 5
          stop: 500
          num: &num_points 10
          round: true
      template: &ghg_template
        emissions:
          ghg_price: "{ghg}"
        health:
          value_per_yll: 0
        macronutrients:
          cal:
            equal_to_baseline: true

    - name: "ghg_{ghg}_l1_0p05"
      parameters:
        ghg: *ghg_range
      template:
        <<: *ghg_template
        validation:
          production_stability:
            l1_cost: 0.05
        consumer_values:
          baseline_scenario: "baseline_l1_0p05"

    - name: "ghg_{ghg}_l1_0p5"
      parameters:
        ghg: *ghg_range
      template:
        <<: *ghg_template
        validation:
          production_stability:
            l1_cost: 0.5
        consumer_values:
          baseline_scenario: "baseline_l1_0p5"

    # --- YLL value sensitivity: 50 to 100000 USD/YLL (log-spaced) -----------
    - name: "yll_{yll}"
      parameters:
        yll: &yll_range
          space: log
          start: 50
          stop: 100000
          num: *num_points
          round: true
      template: &yll_template
        emissions:
          ghg_price: 0
        health:
          value_per_yll: "{yll}"
        macronutrients:
          cal:
            equal_to_baseline: true

    - name: "yll_{yll}_l1_0p05"
      parameters:
        yll: *yll_range
      template:
        <<: *yll_template
        validation:
          production_stability:
            l1_cost: 0.05
        consumer_values:
          baseline_scenario: "baseline_l1_0p05"

    - name: "yll_{yll}_l1_0p5"
      parameters:
        yll: *yll_range
      template:
        <<: *yll_template
        validation:
          production_stability:
            l1_cost: 0.5
        consumer_values:
          baseline_scenario: "baseline_l1_0p5"

    # --- Combined sensitivity: both parameters vary together (log-spaced) ----
    # Separate generators per l1_cost because ghg+yll must be zipped (not crossed).
    - name: ghg_yll_{ghg}
      mode: zip
      parameters:
        ghg: *ghg_range
        yll: *yll_range
      template: &ghg_yll_template
        emissions:
          ghg_price: "{ghg}"
        health:
          value_per_yll: "{yll}"
        macronutrients:
          cal:
            equal_to_baseline: true

    - name: ghg_yll_{ghg}_l1_0p05
      mode: zip
      parameters:
        ghg: *ghg_range
        yll: *yll_range
      template:
        <<: *ghg_yll_template
        validation:
          production_stability:
            l1_cost: 0.05
        consumer_values:
          baseline_scenario: "baseline_l1_0p05"

    - name: ghg_yll_{ghg}_l1_0p5
      mode: zip
      parameters:
        ghg: *ghg_range
        yll: *yll_range
      template:
        <<: *ghg_yll_template
        validation:
          production_stability:
            l1_cost: 0.5
        consumer_values:
          baseline_scenario: "baseline_l1_0p5"

# Set planning horizon and baseline year to match GDD baseline data (2018)
planning_horizon: 2020
baseline_year: 2020

# Block-based diminishing marginal utility for food consumption
food_utility_piecewise:
  enabled: true

validation:
  use_actual_yields: true
  production_stability:
    enabled: true
    penalty_mode: "l1"
    deviation_type: "absolute"
    l1_cost: 0.22

health:
  region_clusters: 15
  intake_grid_points: 8  # Number of grid knots over empirical RR range

# Compare all scenarios in plots
plotting:
  comparison_scenarios: "all"

solving:
  solver: "gurobi"
  io_api: "direct"
  threads: 4
  mem_mb: 9000
  runtime: 20

remote_solve:
  enabled: true
  local_scenarios: ["baseline", "baseline_l1_0p05", "baseline_l1_0p5"]
  host: "shr"
  workdir: "~/food-opt-scratch"
  pixi_env: "gurobi"
  use_slurm: true
  slurm_account: "sjdavis"
  slurm_partition: "owners"
  sync_pixi_files: false
  ssh_options: []
  rsync_options: []
  preflight_check: true
