# Global Sensitivity Analysis Configuration
# -----------------------------------------
# This configuration uses Sobol quasi-random sampling to generate scenarios
# for computing global sensitivity indices (first-order and total-order Sobol
# indices) across model parameters with uncertain values.
#
# The sensitivity analysis varies:
#   - Crop yields (all crops)
#   - CH4 emission factors (enteric + manure)
#   - N2O emission factors (manure application)
#   - Land-use change emission factors
#   - Health relative risk reference values
#
# These factors are applied as multipliers to the base model values.

name: "global_sensitivity"
scenario_defs: "config/global_sensitivity_scenarios.yaml"

# Use validation mode for more realistic production patterns
validation:
  use_actual_yields: true

# Enable health modeling for RR sensitivity
health:
  enabled: true
  value_per_yll: 50000

# Enable GHG pricing
emissions:
  ghg_pricing_enabled: true
  ghg_price: 100

# Use regionalized feed efficiency values
animal_products:
  feed_efficiency_regions: null

# Compare all scenarios in plots
plotting:
  comparison_scenarios: "all"

# Solver configuration
solving:
  solver: "highs"
  threads: 4
