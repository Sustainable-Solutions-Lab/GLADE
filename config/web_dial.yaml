# Configuration for the interactive "Carbon Price Dial" web widget.
#
# This config sweeps the GHG price from $0 to $500/tCO2-eq across a dense set
# of scenarios so the web widget can interpolate smoothly as the user drags a
# slider. It uses its own results tree (`results/web_dial`) and the
# open-source HiGHS solver so the whole sweep is solved consistently with one
# solver and is independent of the Gurobi-solved documentation figures.
#
# All non-scenario settings below mirror docs/config/doc_figures.yaml (coarse
# 250-region resolution for fast solves) except the solver.

name: "web_dial"

scenarios:
  # `default` and `baseline` mirror docs/config/doc_figures.yaml so the shared
  # results tree stays consistent.
  default: {}

  baseline:
    # Fixed consumption to extract consumer values (dual variables).
    validation:
      enforce_baseline_diet: true
    food_utility_piecewise:
      enabled: false
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0

  # --- GHG price sweep ($0 -> $500/tCO2-eq) ---
  # Denser at the low end where the system responds most strongly. All use
  # piecewise food utility (demand-side flexibility) with calories held at
  # baseline, matching the documentation GHG scenarios.
  ghg_0: &ghg_base
    food_utility_piecewise: {enabled: true}
    macronutrients: {cal: {equal_to_baseline: true}}
    health: {value_per_yll: 0}
    emissions: {ghg_price: 0}

  ghg_5:
    <<: *ghg_base
    emissions: {ghg_price: 5}
  ghg_10:
    <<: *ghg_base
    emissions: {ghg_price: 10}
  ghg_15:
    <<: *ghg_base
    emissions: {ghg_price: 15}
  ghg_20:
    <<: *ghg_base
    emissions: {ghg_price: 20}
  ghg_25:
    <<: *ghg_base
    emissions: {ghg_price: 25}
  ghg_30:
    <<: *ghg_base
    emissions: {ghg_price: 30}
  ghg_40:
    <<: *ghg_base
    emissions: {ghg_price: 40}
  ghg_50:
    <<: *ghg_base
    emissions: {ghg_price: 50}
  ghg_60:
    <<: *ghg_base
    emissions: {ghg_price: 60}
  ghg_75:
    <<: *ghg_base
    emissions: {ghg_price: 75}
  ghg_90:
    <<: *ghg_base
    emissions: {ghg_price: 90}
  ghg_100:
    <<: *ghg_base
    emissions: {ghg_price: 100}
  ghg_120:
    <<: *ghg_base
    emissions: {ghg_price: 120}
  ghg_140:
    <<: *ghg_base
    emissions: {ghg_price: 140}
  ghg_160:
    <<: *ghg_base
    emissions: {ghg_price: 160}
  ghg_180:
    <<: *ghg_base
    emissions: {ghg_price: 180}
  ghg_200:
    <<: *ghg_base
    emissions: {ghg_price: 200}
  ghg_225:
    <<: *ghg_base
    emissions: {ghg_price: 225}
  ghg_250:
    <<: *ghg_base
    emissions: {ghg_price: 250}
  ghg_300:
    <<: *ghg_base
    emissions: {ghg_price: 300}
  ghg_350:
    <<: *ghg_base
    emissions: {ghg_price: 350}
  ghg_400:
    <<: *ghg_base
    emissions: {ghg_price: 400}
  ghg_450:
    <<: *ghg_base
    emissions: {ghg_price: 450}
  ghg_500:
    <<: *ghg_base
    emissions: {ghg_price: 500}

planning_horizon: 2020
baseline_year: 2020

# Enable piecewise utility at base level (blocks get built from baseline)
food_utility_piecewise:
  enabled: true

cost_calibration:
  enabled: true

validation:
  use_actual_yields: true

deviation_penalty:
  enabled: true
  penalty_mode: "l1"
  deviation_type: "absolute"

water:
  supply_scenario: "current_use"

health:
  enabled: false

solving:
  solver: "highs"
