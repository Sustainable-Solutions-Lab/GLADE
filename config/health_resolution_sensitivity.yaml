# Health Resolution Sensitivity Configuration
# ------------------------------------------
# Varies health model resolution parameters together to assess runtime/accuracy tradeoffs:
#   - health.region_clusters
#   - health.intake_grid_points
#   - health.log_rr_points
#
# Policy valuation is kept fixed at representative values:
#   - emissions.ghg_price = 200 USD/tCO2-eq
#   - health.value_per_yll = 50000 USD/YLL

name: "health_resolution_sensitivity"
scenarios:
  # Baseline scenario for calibrating piecewise food utility blocks (dual variables)
  baseline:
    validation:
      enforce_baseline_diet: true
      production_stability:
        enabled: false
    food_utility_piecewise:
      enabled: false
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0

  _generators:
    - name: hr_c{clusters}_p{points}
      mode: zip
      parameters:
        clusters:
          values: [8, 12, 16, 20, 30]
        points:
          values: [4, 6, 8, 10, 15]
      template:
        emissions:
          ghg_price: 200
        health:
          value_per_yll: 50000
          region_clusters: "{clusters}"
          intake_grid_points: "{points}"
          log_rr_points: "{points}"
        macronutrients:
          cal:
            equal_to_baseline: true

# Keep baseline year aligned with GDD (2018); planning horizon must satisfy schema
planning_horizon: 2030
baseline_year: 2020

# Block-based diminishing marginal utility for food consumption
food_utility_piecewise:
  enabled: true

health:
  region_clusters: 30
  intake_grid_points: 15
  log_rr_points: 15

validation:
  use_actual_yields: true
  production_stability:
    enabled: true
    penalty_mode: "l1"
    deviation_type: "absolute"
    l1_cost: 1.0

animal_products:
  # Use regionalized feed efficiency values
  feed_efficiency_regions: null

plotting:
  comparison_scenarios: "all"

solving:
  solver: "gurobi"
  io_api: "direct"
  threads: 2
  mem_mb: 9000
  runtime: 20

remote_solve:
  enabled: true
  local_scenarios: ["baseline"]
  host: "shr"
  workdir: "~/food-opt-scratch"
  pixi_env: "gurobi"
  use_slurm: true
  slurm_account: "sjdavis"
  slurm_partition: "serc"
  sync_workflow: true
  sync_pixi_files: false
  ssh_options: []
  rsync_options: []
  preflight_check: true
