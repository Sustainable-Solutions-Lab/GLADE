# Bioenergy comparison: baseline vs no bioenergy demand
# ------------------------------------------------------
# Both scenarios use a moderate GHG price (10 USD/tCO2-eq) and
# production stability. The "no_bioenergy" scenario disables all
# exogenous biofuel/industrial and biogas crop demand.

name: "bioenergy"
scenarios:
  baseline:
    validation:
      enforce_baseline_diet: true
    food_utility_piecewise:
      enabled: false
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0

  with_bioenergy:
    emissions:
      ghg_price: 10
    health:
      value_per_yll: 0
    macronutrients:
      cal:
        equal_to_baseline: true

  no_bioenergy:
    emissions:
      ghg_price: 10
    health:
      value_per_yll: 0
    macronutrients:
      cal:
        equal_to_baseline: true
    biomass:
      biofuel_demand_scale: 0.0

# Match sensitivity.yaml setup
planning_horizon: 2020
baseline_year: 2020

food_utility_piecewise:
  enabled: true

validation:
  use_actual_yields: true
  production_stability:
    enabled: true
    penalty_mode: "l1"
    deviation_type: "absolute"

water:
  supply_scenario: "current_use"

residues:
  max_feed_fraction_by_region:
    Asia: 0.70

grazing:
  isimip_utilization_rate: 0.60

land:
  regional_limit: 1.0

health:
  region_clusters: 15
  intake_grid_points: 8

plotting:
  comparison_scenarios: "all"

solving:
  solver: "gurobi"
  io_api: "direct"
  threads: 8
  mem_mb: 9000
  runtime: 20
