# Test config for FAOSTAT price-based crop costs pipeline.
# Uses sensitivity as base with no calibration.

name: "cost_test"

scenarios:
  default: {}

planning_horizon: 2020
baseline_year: 2020

validation:
  use_actual_yields: true

water:
  supply_scenario: "current_use"

health:
  enabled: false

solving:
  solver: highs
  io_api: "direct"
  threads: 1
  runtime: 10
  mem_mb: 6000

crop_costs:
  calibration:
    enabled: false
