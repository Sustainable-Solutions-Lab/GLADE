# Joint GHG price and biomass price sensitivity configuration.
# Runs a 5x5 grid of scenarios combining carbon prices (0–200 USD/tCO2-eq)
# and biomass prices (0–200 USD/tonne dry matter).

name: "ghg_biomass"
scenarios:
  # Joint GHG Price and Biomass Price Sensitivity Scenarios
  # --------------------------------------------------------
  # Uses _generators DSL to create a grid of GHG prices (0-300 USD_2024/tCO2-eq)
  # and biomass prices (0-200 USD_2024/tonne dry matter).

  _generators:
    - name: ghg{ghg}_biomass{biomass}
      mode: grid
      parameters:
        ghg:
          values: [0, 50, 100, 150, 200, 250, 300]
        biomass:
          values: [0, 50, 100, 150, 200]
      template:
        emissions:
          ghg_pricing_enabled: true
          ghg_price: "{ghg}"
        biomass:
          marginal_values_usd_per_tonne: "{biomass}"

# Use coarser spatial aggregation for faster processing
aggregation:
  regions:
    target_count: 250  # Reduced from 400 for faster processing

macronutrients:
  cal:
    min: 2400    # kcal/person/day

# Enable emissions tracking; individual scenarios set prices and toggles
emissions:
  ghg_pricing_enabled: true
  ghg_price: 100  # Overridden by scenario grid

# Biomass production settings; individual scenarios set prices
biomass:
  marginal_values_usd_per_tonne: 100  # Overridden by scenario grid

# Compare all combined scenarios in plots
plotting:
  comparison_scenarios: "all"

solving:
  solver: "gurobi"
  io_api: "direct"
  threads: 2
