# GHG Price Sensitivity with Fixed Baseline Diet
# ------------------------------------------------
# Varies GHG price while keeping food consumption fixed to baseline values.
# Since diet is fixed, food utility is irrelevant and disabled, and no
# baseline calibration scenario is needed.

name: "ghg_sensitivity_fixed_diet"
scenarios:
  ghg_0:
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0

  # Explicit anchors for the figure's representative prices (would
  # otherwise fall between geomspace samples).
  ghg_20:
    emissions:
      ghg_price: 20
    health:
      value_per_yll: 0

  ghg_100:
    emissions:
      ghg_price: 100
    health:
      value_per_yll: 0

  _generators:
    - name: ghg_{ghg}
      parameters:
        ghg:
          space: log
          start: 20
          stop: 500
          num: 20
          round: true
      template:
        emissions:
          ghg_price: "{ghg}"
        health:
          value_per_yll: 0

# Fix diet to baseline
validation:
  enforce_baseline_diet: true

health:
  enabled: false

plotting:
  comparison_scenarios: "all"

solving:
  solver: "gurobi"
  io_api: "direct"
  threads: 2
  mem_mb: 9000
  runtime: 20
