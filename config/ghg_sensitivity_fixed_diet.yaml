# GHG Price Sensitivity with Fixed Baseline Diet
# ------------------------------------------------
# Varies GHG price while keeping food consumption fixed to baseline values.
# Since diet is fixed, food utility is irrelevant and disabled, and no
# baseline calibration scenario is needed.
#
# Swept continuously over a 20-point log grid (5–500 USD/tCO2eq) plus an
# explicit 50 anchor, for the paper's single-axis figure 3
# (paper/scripts/figure_03_*).  The paper reads exactly these prices via
# ``figure_03_ghg_prices`` in paper/plotting_config.yaml — keep the two in
# lockstep.  The original 5/50/500 anchors fall out of this grid (5, 500)
# plus the explicit 50, so the deterministic figure-1 inputs and the
# three-price Extended Data companions (yield distributions, feed mosaic)
# are unaffected.

name: "ghg_sensitivity_fixed_diet"
scenarios:
  # Explicit central anchor (50 is not a node of the log grid below).
  ghg_50:
    emissions:
      ghg_price: 50
    health:
      value_per_yll: 0

  _generators:
    - name: ghg_{ghg}
      parameters:
        ghg:
          space: log
          start: 5
          stop: 500
          num: 20
          round: true
      template:
        emissions:
          ghg_price: "{ghg}"
        health:
          value_per_yll: 0

# Fix diet to baseline
validation:
  enforce_baseline_diet: true

health:
  enabled: false

plotting:
  comparison_scenarios: "all"

solving:
  solver: "gurobi"
  io_api: "direct"
  threads: 2
  mem_mb: 9000
  runtime: 20
