# GHG Price Sensitivity with Fixed Baseline Diet
# ------------------------------------------------
# Varies GHG price while keeping food consumption fixed to baseline values.
# Since diet is fixed, food utility is irrelevant and disabled, and no
# baseline calibration scenario is needed.
#
# The paper's figure 3 reads exactly the low/central/high anchors below
# (matching plotting_config.yaml: ghg_display_range = {5, 500},
# transition.ghg_price = 50) — no full sweep is needed.

name: "ghg_sensitivity_fixed_diet"
scenarios:
  default: null
  ghg_5:
    emissions:
      ghg_price: 5
    health:
      value_per_yll: 0

  ghg_50:
    emissions:
      ghg_price: 50
    health:
      value_per_yll: 0

  ghg_500:
    emissions:
      ghg_price: 500
    health:
      value_per_yll: 0

# Fix diet to baseline
validation:
  enforce_baseline_diet: true

health:
  enabled: false

plotting:
  comparison_scenarios: "all"

solving:
  solver: "gurobi"
  io_api: "direct"
  threads: 2
  mem_mb: 9000
  runtime: 20
