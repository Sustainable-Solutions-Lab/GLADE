# Global Sensitivity Analysis Configuration
# ------------------------------------------
# This configuration uses a space-filling Sobol sequence to generate scenarios
# across uncertain model parameters. Surrogate-based sensitivity analysis
# (PCE, Random Forest) is configured separately under `sensitivity_analysis`.
#
# The analysis is replicated at three production-stability regimes:
#   default (calibrated):  land/animal L1 costs from calibration file, factor 1.0
#   lower  (factor 1/sqrt(10) ~ 0.3162):  half an order of magnitude below central
#   higher (factor sqrt(10) ~ 3.1623):    half an order of magnitude above central
# The lower/higher variants apply a multiplicative factor on top of the
# calibrated central values via deviation_penalty.{land,feed}.l1_cost_factor,
# so they automatically track the calibration when it is refreshed.
# Each regime has its own baseline scenario for consumer-values calibration.

name: "gsa"
scenarios:
  # GSA Scenarios
  # -------------
  # Uses a scrambled Sobol sequence for space-filling design, transformed
  # via inverse CDF to each parameter's distribution.
  #
  # Parameters and their uncertainty ranges (see docs/sensitivity_analysis.rst
  # for detailed justification and references):
  #   - yield_factor: 0.8-1.2 uniform (20% uncertainty in crop yields)
  #   - ch4_factor: 0.5-1.5 normal 90% CI (combined EF + GWP100 uncertainty)
  #   - n2o_factor: 0.3-1.7 normal 90% CI (combined EF + GWP100 uncertainty)
  #   - luc_factor: 0.3-1.7 normal 90% CI (70% uncertainty in LUC emissions)
  #   - flw_factor: 0.7-1.3 uniform (30% uncertainty in food loss & waste)
  #   - fcr_factor: 0.8-1.2 uniform (20% uncertainty in feed conversion ratios)
  #   - rr_protective: 0-1 (grouped quantile for protective risk factors)
  #   - rr_harmful: 0-1 (grouped quantile for harmful risk factors)
  #   - value_per_yll: 50-50000 (YLL valuation, slice parameter; log-uniform)
  #   - ghg_price: 0-500 (GHG price, slice parameter)
  #
  # Each generator group is replicated at the three production-stability
  # regimes described above, each with its own calibration baseline scenario.

  # Baseline scenarios for calibrating piecewise food utility blocks.
  # One per L1 cost so that consumer values (dual variables) reflect the
  # production-stability regime of each scenario group.
  baseline: &baseline_template
    validation:
      enforce_baseline_diet: true
    food_utility_piecewise:
      enabled: false
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0

  baseline_l1_low:
    <<: *baseline_template
    validation:
      enforce_baseline_diet: true
    deviation_penalty:
      land:
        l1_cost_factor: 0.31623   # 1 / sqrt(10)
      feed:
        l1_cost_factor: 0.31623

  baseline_l1_high:
    <<: *baseline_template
    validation:
      enforce_baseline_diet: true
    deviation_penalty:
      land:
        l1_cost_factor: 3.16228   # sqrt(10)
      feed:
        l1_cost_factor: 3.16228

  # Default scenario for reference (no sensitivity adjustments)
  default: {}

  _generators:
    # --- Default stability regime (calibrated, resolved at solve time) ---
    - name: gsa_{sample_id}
      mode: sensitivity
      samples: 8192
      slice_parameters: [value_per_yll, ghg_price]
      parameter_groups: &gsa_parameter_groups
        "Emission factors": [ch4_factor, n2o_factor, luc_factor]
        "Agricultural": [yield_factor, flw_factor, fcr_factor]
        "Health risk": [rr_protective, rr_harmful]
      parameters: &gsa_parameters
        yield_factor:
          lower: 0.8
          upper: 1.2
          bounds: [0, null]
        ch4_factor:
          distribution: normal_ci
          lower: 0.5
          upper: 1.5
          confidence: 0.9
          bounds: [0, null]
        n2o_factor:
          distribution: normal_ci
          lower: 0.3
          upper: 1.7
          confidence: 0.9
          bounds: [0, null]
        luc_factor:
          distribution: normal_ci
          lower: 0.3
          upper: 1.7
          confidence: 0.9
          bounds: [0, null]
        flw_factor:
          lower: 0.7
          upper: 1.3
          bounds: [0, null]
        fcr_factor:
          lower: 0.8
          upper: 1.2
          bounds: [0, null]
        rr_protective:
          lower: 0
          upper: 1
          bounds: [0, 1]
        rr_harmful:
          lower: 0
          upper: 1
          bounds: [0, 1]
        value_per_yll:
          distribution: log_uniform
          lower: 50
          upper: 50000
        ghg_price:
          distribution: log_uniform
          lower: 5
          upper: 500
      template: &gsa_template
        sensitivity:
          crop_yields:
            all: "{yield_factor}"
          emission_factors:
            ch4: "{ch4_factor}"
            n2o: "{n2o_factor}"
            luc: "{luc_factor}"
          food_loss_waste: "{flw_factor}"
          feed_conversion: "{fcr_factor}"
          health_relative_risk:
            protective: "{rr_protective}"
            harmful: "{rr_harmful}"
        health:
          value_per_yll: "{value_per_yll}"
        emissions:
          ghg_price: "{ghg_price}"
        macronutrients:
          cal:
            equal_to_baseline: true
        consumer_values:
          baseline_scenario: "baseline"

    # --- Lower stability (factor 1/sqrt(10) ~ 0.3162 on both penalties) ---
    - name: gsa-l1-low_{sample_id}
      mode: sensitivity
      samples: 2048
      slice_parameters: [value_per_yll, ghg_price]
      parameter_groups: *gsa_parameter_groups
      parameters: *gsa_parameters
      template:
        <<: *gsa_template
        deviation_penalty:
          land:
            l1_cost_factor: 0.31623
          feed:
            l1_cost_factor: 0.31623
        consumer_values:
          baseline_scenario: "baseline_l1_low"

    # --- Higher stability (factor sqrt(10) ~ 3.1623 on both penalties) ---
    - name: gsa-l1-high_{sample_id}
      mode: sensitivity
      samples: 2048
      slice_parameters: [value_per_yll, ghg_price]
      parameter_groups: *gsa_parameter_groups
      parameters: *gsa_parameters
      template:
        <<: *gsa_template
        deviation_penalty:
          land:
            l1_cost_factor: 3.16228
          feed:
            l1_cost_factor: 3.16228
        consumer_values:
          baseline_scenario: "baseline_l1_high"

# Surrogate-based sensitivity analysis methods.
# Each method is applied independently to the same solved GSA scenarios.
sensitivity_analysis:
  holdout_fraction: 0.15
  threads: 6
  # Downstream consumers (notebooks, uncertainty-band plots) load the bundle for
  # this method when no explicit choice is provided.  Must match a key under
  # ``methods``.
  default_surrogate: xgb
  # GSA solves run outside Snakemake on the cluster (tools/batch-solve), so
  # the surrogate fit reads scenarios from disk rather than declaring every
  # expected output.  A small fraction of Sobol scenarios may be missing
  # (per-solve TimeLimit hits); the rule errors out if more than 50% are
  # missing as a guardrail.  See sensitivity_analysis.discover_scenarios_on_disk
  # in config/default.yaml for the full rationale.
  discover_scenarios_on_disk: true
  methods:
    xgb:
      method_options:
        n_estimators: 5000
        max_depth: 4
        learning_rate: 0.02
        subsample: 0.8
        colsample_bytree: 0.8
        min_child_weight: 5
        early_stopping_rounds: 50
  # Deep-merged with default.yaml's outputs: adds every objective-breakdown
  # category as its own surrogate column (objective_breakdown.crop_production,
  # objective_breakdown.health_burden, ...), so figures can recover producer
  # cost separately from internalised YLL/GHG terms and consumer values.
  outputs:
    objective_breakdown:
      kind: vector
      source: objective_breakdown.parquet
      reducer: pivot_row
      label: Objective breakdown
      units: bn USD

# Block-based diminishing marginal utility for food consumption
food_utility_piecewise:
  enabled: true

# Compare all scenarios in plots
plotting:
  comparison_scenarios: "all"

solving:
  solver: "gurobi"
  io_api: "direct"
  # 2 solver threads runs more efficiently at scale on the cluster (more jobs in
  # parallel per node).  Each GSA solve is small enough that single-thread gurobi
  # is already near-optimal; hyperthreading gives diminishing returns.
  threads: 2
  # Budgets re-profiled 2026-06-03 from local solves (feed-revision model, incl.
  # inline analysis). Peak RSS is model-dominated, not B&B-dominated: measured
  # 4.70-4.87 GB across central and L1 regimes and the slowest (3.6 min) sample
  # peaked the same, so hard samples do NOT balloon memory. Solve time median
  # 2.2 min, mean 2.4, p95 3.4, p99 5.4, thin tail to ~27 min (1 in ~1238 hits
  # the 30-min cap and fails -- retried as a straggler). mem_mb at ~1.2x the
  # observed peak keeps the per-element slurm footprint small (the cluster is
  # memory-limited); pair with a modest --parallel (e.g. 3) at submit time.
  mem_mb: 6000
  time_limit: 30  # Hard limit (successes observed up to ~27 min)
  runtime: 6      # Realistic typical+p99 estimate for slurm/local scheduling
  inline_analysis: true  # Fuse solve + analyze to avoid writing intermediate .nc files
