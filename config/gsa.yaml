# Global Sensitivity Analysis Configuration
# ------------------------------------------
# Space-filling Sobol sequence over the uncertain model parameters, solved at
# the single calibrated production-stability regime. Surrogate-based
# sensitivity analysis is configured under `sensitivity_analysis`.
#
# Parameters (see docs/sensitivity_analysis.rst for justification/refs):
#   - yield_factor:  0.8-1.2 uniform (20% uncertainty in crop yields)
#   - ch4_factor:    0.5-1.5 normal 90% CI (EF + GWP100 uncertainty)
#   - n2o_factor:    0.3-1.7 normal 90% CI (EF + GWP100 uncertainty)
#   - luc_factor:    0.3-1.7 normal 90% CI (70% uncertainty in LUC emissions)
#   - flw_factor:    0.7-1.3 uniform (30% uncertainty in food loss & waste)
#   - fcr_factor:    0.8-1.2 uniform (20% uncertainty in feed conversion ratios)
#   - rr_protective / rr_harmful: 0-1 grouped quantile for health risk factors
#   - reforest_fraction: 0.05-1.0 uniform; per-country cap on the fraction of
#     reforestable agricultural land (baseline cropland + existing pasture)
#     that may be spared for carbon sequestration. 1.0 = unconstrained; under
#     heavy emission weighting the unconstrained model reforests ~80-90% of
#     some countries' agricultural area, so this tests sensitivity to
#     disallowing such concentrated reforestation. Wired to the solve-time
#     per-country constraint via land.reforestation_cap.max_fraction.
#   - value_per_yll: 50-50000 log-uniform (slice parameter)
#   - ghg_price:     5-500 log-uniform (slice parameter)
#
# The lower/higher production-stability regimes (L1 cost factor +/- sqrt(10))
# live in a companion config, gsa_l1.yaml, on the paper branch.

name: "gsa"

# default flipped health.enabled to false; the GSA sweeps value_per_yll, so it
# needs the health module (and the GBD-anchored baseline diet) enabled at base.
health:
  enabled: true

scenarios:
  # Baseline scenario for calibrating piecewise food utility blocks. Consumer
  # values (dual variables) are taken from this enforced-baseline solve.
  baseline:
    validation:
      enforce_baseline_diet: true
    food_utility_piecewise:
      enabled: false
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0

  # Default scenario for reference (no sensitivity adjustments)
  default: {}

  _generators:
    - name: gsa_{sample_id}
      mode: sensitivity
      samples: 16384
      slice_parameters: [value_per_yll, ghg_price]
      parameter_groups:
        "Emission factors": [ch4_factor, n2o_factor, luc_factor]
        "Agricultural": [yield_factor, flw_factor, fcr_factor]
        "Health risk": [rr_protective, rr_harmful]
        "Land use": [reforest_fraction]
      parameters:
        yield_factor:
          lower: 0.8
          upper: 1.2
          bounds: [0, null]
        ch4_factor:
          distribution: normal_ci
          lower: 0.5
          upper: 1.5
          confidence: 0.9
          bounds: [0, null]
        n2o_factor:
          distribution: normal_ci
          lower: 0.3
          upper: 1.7
          confidence: 0.9
          bounds: [0, null]
        luc_factor:
          distribution: normal_ci
          lower: 0.3
          upper: 1.7
          confidence: 0.9
          bounds: [0, null]
        flw_factor:
          lower: 0.7
          upper: 1.3
          bounds: [0, null]
        fcr_factor:
          lower: 0.8
          upper: 1.2
          bounds: [0, null]
        rr_protective:
          lower: 0
          upper: 1
          bounds: [0, 1]
        rr_harmful:
          lower: 0
          upper: 1
          bounds: [0, 1]
        reforest_fraction:
          lower: 0.05
          upper: 1.0
          bounds: [0.05, 1]
        value_per_yll:
          distribution: log_uniform
          lower: 50
          upper: 50000
        ghg_price:
          distribution: log_uniform
          lower: 5
          upper: 500
      template:
        sensitivity:
          crop_yields:
            all: "{yield_factor}"
          emission_factors:
            ch4: "{ch4_factor}"
            n2o: "{n2o_factor}"
            luc: "{luc_factor}"
          food_loss_waste: "{flw_factor}"
          feed_conversion: "{fcr_factor}"
          health_relative_risk:
            protective: "{rr_protective}"
            harmful: "{rr_harmful}"
        land:
          reforestation_cap:
            max_fraction: "{reforest_fraction}"
        health:
          value_per_yll: "{value_per_yll}"
        emissions:
          ghg_price: "{ghg_price}"
        macronutrients:
          cal:
            equal_to_baseline: true
        consumer_values:
          baseline_scenario: "baseline"

# Surrogate-based sensitivity analysis methods.
sensitivity_analysis:
  holdout_fraction: 0.15
  threads: 6
  default_surrogate: mlp
  # GSA solves run outside Snakemake on the cluster (tools/batch-solve), so the
  # surrogate fit reads scenarios from disk rather than declaring every output.
  discover_scenarios_on_disk: true
  sobol:
    # Allowlist of scalar outputs whose Sobol indices are computed/plotted.
    # Adds `sequestration` to the default set so the reforestation cap's
    # direct carbon effect is a first-class Sobol target.
    outputs: [total_cost, co2, ch4, n2o, land_use, yll, sequestration]
  methods:
    xgb:
      method_options:
        n_estimators: 5000
        max_depth: 4
        learning_rate: 0.02
        subsample: 0.8
        colsample_bytree: 0.8
        min_child_weight: 5
        early_stopping_rounds: 50
  # Deep-merged with default.yaml's outputs.
  outputs:
    # Reforestation carbon credit: net CO2 from spare_land + spare_existing_
    # grassland sequestration (negative). The most direct surrogate target for
    # the reforestation-cap parameter.
    sequestration:
      source: net_emissions.parquet
      reducer: filter_sum
      filter_col: source
      filter_value: "Carbon sequestration"
      value_col: mtco2eq
      label: Carbon sequestration
      units: "MtCO\u2082eq"
    # Per-objective-breakdown category, so figures can recover producer cost
    # separately from internalised YLL/GHG terms and consumer values.
    objective_breakdown:
      kind: vector
      source: objective_breakdown.parquet
      reducer: pivot_row
      label: Objective breakdown
      units: bn USD
    # Spatial fields: per-region land use (~700 regions each).  Too high-
    # dimensional to train element-by-element, so they are PCA-compressed and
    # the surrogate predicts n_components scores; predict_field reconstructs the
    # full map. ~20-30 components capture >99% of variance (see docs).
    cropland_by_region:
      kind: field
      source: land_use.parquet
      reducer: region_field
      value_col: area_mha
      key_col: region
      exclude_col: crop
      exclude_value: grassland
      n_components: 30
      label: Cropland area by region
      units: Mha
    grazing_by_region:
      kind: field
      source: land_use.parquet
      reducer: region_field
      value_col: area_mha
      key_col: region
      include_col: crop
      include_value: grassland
      n_components: 30
      label: Grazing area by region
      units: Mha

# Block-based diminishing marginal utility for food consumption
food_utility_piecewise:
  enabled: true

# Compare all scenarios in plots
plotting:
  comparison_scenarios: "all"

solving:
  solver: "gurobi"
  io_api: "direct"
  threads: 2
  options_gurobi:
    LogToConsole: 0
    OutputFlag: 1
    # Concurrent root relaxation (barrier + primal + dual simplex, take whichever
    # finishes). The dense per-country reforestation-cap rows make the plain
    # barrier (Method=2) stall numerically (primal residual stuck ~1e7, >700s,
    # then a spurious infeasible_or_unbounded); NumericFocus=2 repairs the
    # barrier's conditioning so it solves the root in ~20s, and concurrency
    # keeps a simplex fallback for the rare extreme-corner sample where the
    # barrier still struggles. Pure dual simplex (Method=1) is memory-light but
    # too slow here (its root stalls even on typical samples). Costs more memory
    # (barrier factorization) -> mem_mb raised; tune cluster --parallel to fit.
    Method: 3
    NumericFocus: 2
    MIPGap: 0.001
    MIPFocus: 2
  mem_mb: 10000
  time_limit: 30  # Hard limit
  runtime: 6
  inline_analysis: true  # Fuse solve + analyze to avoid writing intermediate .nc files
