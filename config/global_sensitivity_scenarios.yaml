# Global Sensitivity Analysis Scenarios
# -------------------------------------
# Uses Sobol quasi-random sampling to generate scenarios for sensitivity
# analysis. For D=5 parameters and N=64 base samples, this generates
# N*(D+2) = 448 total scenarios (for computing first-order and total-order
# Sobol indices without second-order interactions).
#
# Parameters and their uncertainty ranges:
#   - yield_factor: 0.8-1.2 (20% uncertainty in crop yields)
#   - ch4_factor: 0.7-1.3 (30% uncertainty in CH4 emission factors)
#   - n2o_factor: 0.7-1.3 (30% uncertainty in N2O emission factors)
#   - luc_factor: 0.5-1.5 (50% uncertainty in LUC emissions)
#   - rr_factor: 0.8-1.2 (20% uncertainty in health relative risks)

# Default scenario for reference (no sensitivity adjustments)
default: {}

_generators:
  # Sobol sampling for global sensitivity analysis
  - name: sa_{sample_id}
    mode: sobol
    samples: 64
    parameters:
      yield_factor:
        min: 0.8
        max: 1.2
      ch4_factor:
        min: 0.7
        max: 1.3
      n2o_factor:
        min: 0.7
        max: 1.3
      luc_factor:
        min: 0.5
        max: 1.5
      rr_factor:
        min: 0.8
        max: 1.2
    template:
      sensitivity:
        crop_yields:
          all: "{yield_factor}"
        emission_factors:
          ch4: "{ch4_factor}"
          n2o: "{n2o_factor}"
          luc: "{luc_factor}"
        health_relative_risk: "{rr_factor}"
