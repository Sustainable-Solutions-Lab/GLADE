# Production Stability Sensitivity Analysis
# ------------------------------------------
# 5x5 log-log grid sweep of crop/grassland L1 cost (Mha) and animal L1
# cost (Mt DM, native units) to map out land-area deviation as a function
# of both penalty strengths.
#
# Each grid point gets its own baseline scenario so that consumer values
# (piecewise food utility blocks) are calibrated under the matching
# production-stability regime.

name: "prod_stability"
scenarios:
  # Baseline for the zero-stability reference scenario
  baseline_off:
    validation:
      enforce_baseline_diet: true
      production_stability:
        enabled: false
    food_utility_piecewise:
      enabled: false
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0

  l1_0_base:
    validation:
      production_stability:
        enabled: false
    consumer_values:
      baseline_scenario: "baseline_off"
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0
    macronutrients:
      cal:
        equal_to_baseline: true

  _generators:
    # --- Per-grid-point baseline scenarios ---
    # Solved with enforce_baseline_diet to extract consumer values (duals)
    # under each production stability regime.
    - name: baseline_c{crop_cost}_a{animal_cost}
      mode: grid
      parameters: &grid_params
        crop_cost:
          space: log
          start: 0.01
          stop: 1
          num: 5
          name_format: "lambda x: str(round(x, 4)).replace('.', 'p')"
        animal_cost:
          space: log
          start: 0.01
          stop: 1
          num: 5
          name_format: "lambda x: str(round(x, 4)).replace('.', 'p')"
      template:
        validation:
          enforce_baseline_diet: true
          production_stability:
            enabled: true
            penalty_mode: "l1"
            deviation_type: "absolute"
            l1_cost: "{crop_cost}"
            animals:
              l1_cost: "{animal_cost}"
        food_utility_piecewise:
          enabled: false
        emissions:
          ghg_price: 0
        health:
          value_per_yll: 0

    # --- Grid scenarios ---
    # Each references its matching baseline via {param_fmt} for the
    # name-formatted parameter value.
    - name: grid_c{crop_cost}_a{animal_cost}
      mode: grid
      parameters: *grid_params
      template:
        validation:
          production_stability:
            enabled: true
            penalty_mode: "l1"
            deviation_type: "absolute"
            l1_cost: "{crop_cost}"
            animals:
              l1_cost: "{animal_cost}"
        consumer_values:
          baseline_scenario: "baseline_c{crop_cost_fmt}_a{animal_cost_fmt}"
        emissions:
          ghg_price: 0
        health:
          value_per_yll: 0
        macronutrients:
          cal:
            equal_to_baseline: true

# Align with sensitivity.yaml
planning_horizon: 2020
baseline_year: 2020

# Block-based diminishing marginal utility for food consumption
food_utility_piecewise:
  enabled: true

# Fallback baseline for the inherited `default` scenario; per-grid-point
# baselines are still selected individually via each scenario's template.
consumer_values:
  baseline_scenario: "baseline_off"

validation:
  use_actual_yields: true

plotting:
  comparison_scenarios: "all"

solving:
  solver: "gurobi"
  io_api: "direct"
  threads: 2
  mem_mb: 9000
  runtime: 45

remote_solve:
  enabled: true
  local_scenarios:
    - "baseline_off"
    - "baseline_c0p01_a0p01"
    - "baseline_c0p01_a0p0316"
    - "baseline_c0p01_a0p1"
    - "baseline_c0p01_a0p3162"
    - "baseline_c0p01_a1p0"
    - "baseline_c0p0316_a0p01"
    - "baseline_c0p0316_a0p0316"
    - "baseline_c0p0316_a0p1"
    - "baseline_c0p0316_a0p3162"
    - "baseline_c0p0316_a1p0"
    - "baseline_c0p1_a0p01"
    - "baseline_c0p1_a0p0316"
    - "baseline_c0p1_a0p1"
    - "baseline_c0p1_a0p3162"
    - "baseline_c0p1_a1p0"
    - "baseline_c0p3162_a0p01"
    - "baseline_c0p3162_a0p0316"
    - "baseline_c0p3162_a0p1"
    - "baseline_c0p3162_a0p3162"
    - "baseline_c0p3162_a1p0"
    - "baseline_c1p0_a0p01"
    - "baseline_c1p0_a0p0316"
    - "baseline_c1p0_a0p1"
    - "baseline_c1p0_a0p3162"
    - "baseline_c1p0_a1p0"
  host: "shr"
  workdir: "~/food-opt-scratch"
  pixi_env: "gurobi"
  use_slurm: true
  slurm_account: "sjdavis"
  slurm_partition: "owners"
  sync_pixi_files: false
  ssh_options: []
  rsync_options: []
  preflight_check: true
