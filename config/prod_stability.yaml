# Production Stability Sensitivity Analysis
# ------------------------------------------
# 5x5 log-log grid sweep of crop/grassland L1 cost (Mha) and animal L1
# cost (Mt DM, native units) to map out land-area deviation as a function
# of both penalty strengths.

name: "prod_stability"
scenarios:
  # Baseline scenario for calibrating piecewise food utility blocks
  baseline:
    validation:
      enforce_baseline_diet: true
    food_utility_piecewise:
      enabled: false
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0

  # Zero stability cost (no penalty, pure cost minimization)
  l1_0_base:
    validation:
      production_stability:
        enabled: false
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0
    macronutrients:
      cal:
        equal_to_baseline: true

  _generators:
    # 5x5 grid: crop_cost x animal_cost (both log-spaced)
    - name: grid_c{crop_cost}_a{animal_cost}
      mode: grid
      parameters:
        crop_cost:
          space: log
          start: 0.01
          stop: 1
          num: 5
          name_format: "lambda x: str(round(x, 4)).replace('.', 'p')"
        animal_cost:
          space: log
          start: 0.01
          stop: 1
          num: 5
          name_format: "lambda x: str(round(x, 4)).replace('.', 'p')"
      template:
        validation:
          production_stability:
            enabled: true
            penalty_mode: "l1"
            deviation_type: "absolute"
            l1_cost: "{crop_cost}"
            animals:
              l1_cost: "{animal_cost}"
        emissions:
          ghg_price: 0
        health:
          value_per_yll: 0
        macronutrients:
          cal:
            equal_to_baseline: true

# Align with sensitivity.yaml
planning_horizon: 2020
baseline_year: 2020

# Block-based diminishing marginal utility for food consumption
food_utility_piecewise:
  enabled: true

validation:
  use_actual_yields: true

plotting:
  comparison_scenarios: "all"

solving:
  solver: "highs"
  io_api: "direct"
  threads: 2
  mem_mb: 9000
  runtime: 20

remote_solve:
  enabled: true
  local_scenarios: ["baseline"]
  host: "shr"
  workdir: "~/food-opt-scratch"
  pixi_env: "gurobi"
  use_slurm: true
  slurm_account: "sjdavis"
  slurm_partition: "serc"
  sync_pixi_files: false
  ssh_options: []
  rsync_options: []
  preflight_check: true
