# Food Demand Calibration
# -----------------------
# Generates ``data/curated/calibration/food_demand.csv`` -- a per-food global
# demand multiplier. Applied at solve time to ``target_mt`` for each
# food_consumption link (see ``_match_baseline_to_consume_links`` in
# ``workflow/scripts/solve_model/core.py``). The multiplier reconciles the
# residual per-food global gap between FAOSTAT QCL-derived supply and the
# GDD-IA-derived demand that remains after food_waste calibration.
#
# Without this step the model carries the residual mismatch as food-level
# slack in every downstream solve, which (a) inflates production-stability
# duals (the LP has to either over-produce, under-consume, or eat slack
# cost), and (b) injects spurious sign on the cost-calibration corrections
# for the affected foods (e.g. olive-oil excess pushes olive's cost
# calibration negative).
#
# Method:
#   multiplier = clip((consumption - net_slack) / consumption, [0.5, 2.0])
#
# where net_slack = sum(slack_positive_food) - sum(-slack_negative_food)
# summed over countries for each food. Positive net slack means the LP had
# to invoke positive slack (shortage filling) -> demand was too high -> the
# multiplier shrinks. Negative net slack means the LP absorbed excess
# supply -> demand was too low -> the multiplier grows.
#
# Usage:
#   tools/calibrate food_demand
#
# Or equivalently:
#   tools/smk --configfile config/calibration/food_demand.yaml -- \
#     data/curated/calibration/food_demand.csv

# Shared name across all calibration configs so the expensive upstream
# processing is built once under processing/calibration/ and reused.
name: "calibration"

scenarios:
  # Single uncalibrated scenario. With food_demand_calibration disabled at
  # the base level, solve_model does not read the calibration file, so the
  # food_consumption p_set values carry only the raw baseline-diet demand
  # and the slack reveals the gap.
  food_demand_uncal: {}

planning_horizon: 2020

# Mirrors validation.yaml and food_waste.yaml: production and consumption
# are pinned to baseline so slack on food buses reflects supply/demand
# mismatch only.
validation:
  use_actual_yields: true
  use_actual_production: true
  enforce_baseline_diet: true
  enforce_baseline_feed: true
  disable_spared_cropland: true
  disable_spared_grassland: true
  slack_marginal_cost: 10

# The enforced-baseline validation solve is incompatible with piecewise
# food utility; disable it regardless of the base config's setting.
food_utility_piecewise:
  enabled: false

# Skip downstream calibrations so this step is order-independent.
cost_calibration:
  enabled: false

food_demand_calibration:
  enabled: false     # Don't apply calibration (we're generating it)
  generate: true     # Generate calibration from solved model
  scenario: "food_demand_uncal"

health:
  value_per_yll: 0

emissions:
  ghg_pricing_enabled: false

solving:
  io_api: "direct"
  solver: gurobi
  threads: 2
