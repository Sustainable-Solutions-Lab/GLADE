# Cost Calibration Configuration
# -------------------------------
# Generates production cost calibration corrections for crops, grassland,
# and animals by:
#   1. Solving a baseline scenario (enforce_baseline_diet, no stability)
#      → extracts consumer values for piecewise food utility
#   2. Solving a calibration scenario (piecewise utility + hard production
#      stability at ±1%) → extracts duals as cost corrections
#
# Usage:
#   tools/calibrate cost
#
# Or equivalently:
#   tools/smk --configfile config/calibration/cost.yaml -- \
#     data/curated/calibration/crop_cost.csv \
#     data/curated/calibration/grassland_cost.csv \
#     data/curated/calibration/animal_cost.csv

# Shared name across all calibration configs so the expensive upstream
# processing is built once under processing/calibration/ and reused.
name: "calibration"

scenarios:
  # Step 1: Baseline solve to extract consumer values / utility blocks.
  #
  # Production stability is enabled with a +/-5 % band so that the food
  # p_set duals reflect the marginal cost of supply under realistic
  # (geographically pinned) production patterns, while leaving the LP
  # enough room to absorb residual FAOSTAT-vs-FBS mismatches that the
  # food-demand calibration could not close. The file-level
  # ``validation.slack_marginal_cost`` override ($7 500/t) caps the
  # remaining slack-driven duals at the upper end of realistic
  # wholesale prices. See docs/costs.rst.
  cost_baseline:
    validation:
      enforce_baseline_diet: true
    deviation_penalty:
      enabled: true
      penalty_mode: "hard"
      land:
        enabled: true
        crops:
          enabled: true
          max_relative_deviation: 0.05
          enable_slack: true
        grassland:
          enabled: true
          max_relative_deviation: 0.05
          enable_slack: true
        land_conversion:
          enabled: false
      feed:
        enabled: true
        max_relative_deviation: 0.05
        enable_slack: true
      diet:
        enabled: false
    food_utility_piecewise:
      enabled: false
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0

  # Step 2: Calibration solve with tight production stability
  cost_calibration:
    deviation_penalty:
      enabled: true
      penalty_mode: "hard"
      land:
        enabled: true
        crops:
          enabled: true
          max_relative_deviation: 0.01
          enable_slack: true
        grassland:
          enabled: true
          max_relative_deviation: 0.01
          enable_slack: true
        land_conversion:
          enabled: false
      feed:
        enabled: true
        max_relative_deviation: 0.01
        enable_slack: true
      diet:
        enabled: false
    food_utility_piecewise:
      enabled: true
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0

planning_horizon: 2020
baseline_year: 2020

# Enable piecewise utility at base level (blocks get built from baseline)
food_utility_piecewise:
  enabled: true

cost_calibration:
  enabled: false     # Don't apply calibration (we're generating it)
  generate: true     # Generate calibration from solved model
  scenario: "cost_calibration"

# Override the default consumer_values.baseline_scenario ("baseline") to
# point at the renamed scenario above.
consumer_values:
  baseline_scenario: "cost_baseline"

validation:
  use_actual_yields: true
  # Cap slack-driven duals at the upper end of realistic food wholesale
  # prices. Bumped from 5.0 -> 7.5 ($7 500/t) to leave headroom for
  # high-value foods (beef, lamb, cheese, butter, olive-oil, nuts) whose
  # actual wholesale prices sit between $5 000 and $7 000/t. This same
  # parameter penalises production-stability slack (see step 2): a higher
  # cap lets cost corrections absorb a wider range of structural
  # mismatches in one shot, but masks underlying data errors if it goes
  # too high. See docs/costs.rst.
  slack_marginal_cost: 7.5

water:
  supply_scenario: "current_use"

health:
  enabled: false

solving:
  solver: gurobi
  io_api: "direct"
  threads: 2
  mem_mb: 9000
  runtime: 20
