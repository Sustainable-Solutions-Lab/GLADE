# Production-stability L1 calibration
# -----------------------------------
# Drives the land-use deviation and animal-feed deviation simultaneously to
# `target_deviation_pct` (default 5% of observed 2020 totals) by running
# Broyden's quasi-Newton iteration in log-log coordinates. Each iteration is
# one paired solve (baseline with `enforce_baseline_diet=true` to derive
# consumer values, then main with piecewise utility active).
#
# Warm-starts from the previously calibrated YAML when one exists on disk;
# otherwise uses the seed values in `prod_stability_calibration`.
#
# Usage:
#   tools/calibrate stability
#
# Or equivalently:
#   tools/smk --configfile config/calibration/stability.yaml -- \
#     data/curated/calibration/prod_stability_l1.yaml

name: "stability_calibration"

planning_horizon: 2020
baseline_year: 2020

# Block-based diminishing marginal utility for food consumption (used by main
# solves; baseline solves disable this inside the calibration script).
food_utility_piecewise:
  enabled: true

# Fallback consumer_values baseline; the script overrides this per iteration
# to point at that iteration's baseline scenario.
consumer_values:
  baseline_scenario: "_cal_baseline_iter00"

validation:
  use_actual_yields: true
  # Numeric defaults; per-iteration scenarios override these with the
  # current iterate's lambda values.
  production_stability:
    enabled: true
    penalty_mode: "l1"
    deviation_type: "absolute"
    land_l1_cost: 0.1
    animal_feed_l1_cost: 0.03

# Trigger the calibrate_prod_stability rule. The script writes the
# calibrated_l1_yaml; don't try to resolve the sentinel at solve time.
prod_stability_calibration:
  enabled: false
  generate: true

solving:
  solver: "gurobi"
  io_api: "direct"
  # Solves run sequentially in the iteration, so give each solve more
  # threads instead of running multiple solves in parallel.
  threads: 8
  mem_mb: 12000
  runtime: 45
