# Deviation-penalty L1 calibration
# --------------------------------
# Drives the land and animal-feed deviation simultaneously to
# `target_deviation_pct` (default 5% of observed 2020 totals) by running
# Broyden's quasi-Newton iteration in log-log coordinates. Each iteration is
# one paired solve (baseline with `enforce_baseline_diet=true` to derive
# consumer values, then main with piecewise utility active).
#
# Warm-starts from the previously calibrated YAML when one exists on disk;
# otherwise uses the seed values in `deviation_penalty.calibration.seeds`.
#
# Usage:
#   tools/calibrate stability
#
# Or equivalently:
#   tools/smk --configfile config/calibration/stability.yaml -- \
#     data/curated/calibration/deviation_penalty.yaml

# Shared name across all calibration configs so the expensive upstream
# processing is built once under processing/calibration/ and reused.
name: "calibration"

planning_horizon: 2020
baseline_year: 2020

# Pin the calibration regime explicitly: the main solve inherits these
# values (the baseline solve is always forced to 0/0 in the script so that
# consumer values reflect raw revealed preferences).
emissions:
  ghg_price: 0
health:
  value_per_yll: 0

# Block-based diminishing marginal utility for food consumption (used by main
# solves; baseline solves disable this inside the calibration script).
food_utility_piecewise:
  enabled: true

# Fallback consumer_values baseline; the script overrides this per iteration
# to point at that iteration's baseline scenario.
consumer_values:
  baseline_scenario: "_cal_baseline_iter00"

validation:
  use_actual_yields: true

# Per-iteration scenarios override these; the baseline iteration disables
# the penalty entirely via enforce_baseline_diet + l1_cost overrides.
deviation_penalty:
  enabled: true
  penalty_mode: "l1"
  deviation_type: "absolute"
  land:
    crops:
      l1_cost: 0.1
      l1_cost_factor: 1.0
    grassland:
      l1_cost: 0.1
      l1_cost_factor: 1.0
  feed:
    l1_cost: 0.03
    l1_cost_factor: 1.0
  diet:
    enabled: false
    l1_cost: 3.0
    l1_cost_factor: 1.0
  calibration:
    enabled: false   # solves resolve l1_cost from the params, not the YAML
    generate: true   # trigger the calibrate_deviation_penalty rule

solving:
  solver: gurobi
  io_api: "direct"
  # Solves run sequentially in the iteration, so give each solve more
  # threads instead of running multiple solves in parallel.
  threads: 8
  mem_mb: 12000
  runtime: 45
