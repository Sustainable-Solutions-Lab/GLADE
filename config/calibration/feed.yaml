# Feed Calibration
# ----------------
# Generates the per-country feed-side calibration CSVs under
# ``data/curated/calibration/``:
#
#   * Grassland yield and fodder conversion corrections (surplus side)
#     and exogenous forage supply (deficit side), all derived from the
#     ``feed:ruminant_forage:*`` bus slack.
#   * Exogenous monogastric/ruminant protein supply (deficit side)
#     derived from the ``feed:{mono,ruminant}_protein:*`` bus slack —
#     standing in for fishmeal, synthetic amino acids, and animal
#     by-products that the model does not produce endogenously.
#
# The calibration scenario is solved in validation mode with both feed
# calibrations *disabled* so that bus slack reveals the per-country
# supply/demand gaps. The downstream rules then write the corrections
# back to the curated calibration CSVs that the regular workflow reads.
#
# Usage:
#   tools/calibrate feed
#
# Or equivalently (tools/calibrate is just a thin wrapper):
#   tools/smk --configfile config/calibration/feed.yaml -- \
#     data/curated/calibration/grassland_yield.csv \
#     data/curated/calibration/fodder_conversion.csv \
#     data/curated/calibration/exogenous_forage.csv \
#     data/curated/calibration/exogenous_feed.csv

# Shared name across all calibration configs so the expensive upstream
# processing (crop yields, harvested area, regions, etc.) is built once
# under processing/calibration/ and reused by each calibration step.
name: "calibration"

scenarios:
  # No scenario-level overrides needed: the generated calibrations are
  # disabled at the base level (see grazing.grassland_forage_calibration
  # and exogenous_feed_calibration below), so the solved scenario's feed-bus
  # slack reveals the supply/demand gap.
  feed_uncal: {}

planning_horizon: 2020

validation:
  use_actual_yields: true
  use_actual_production: true
  enforce_baseline_diet: true
  enforce_baseline_feed: true
  disable_spared_cropland: true
  disable_spared_grassland: true
  slack_marginal_cost: 10

cost_calibration:
  enabled: false

# food_demand calibration depends on food_loss_waste.csv (and thus on
# food_waste calibration which runs after feed). Disable here so the
# feed step can run on a fresh clone where food_demand.csv may not yet
# exist. Feed slack is not affected by per-food demand multipliers since
# the feed-bus mass balance is upstream of food consumption.
food_demand_calibration:
  enabled: false

grazing:
  grassland_forage_calibration:
    enabled: false     # Don't apply calibration (we're generating it)
    generate: true     # Generate calibration from solved model
    scenario: feed_uncal

exogenous_feed_calibration:
  enabled: false       # Don't apply calibration (we're generating it)
  generate: true       # Generate calibration from solved model
  scenario: feed_uncal

# Anchoring pinned on to reproduce the committed (anchored) calibration
# artefacts; anchor-off regeneration is deferred to a dedicated PR (see cost.yaml).
diet:
  anchor_groups_to_gbd: true

health:
  value_per_yll: 0

emissions:
  ghg_pricing_enabled: false

solving:
  io_api: "direct"
  solver: gurobi
  threads: 2
