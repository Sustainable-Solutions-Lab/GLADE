# Grassland Forage Calibration
# ----------------------------
# Generates the grassland / fodder / exogenous-forage calibration CSVs
# under ``data/curated/calibration/``. The calibration scenario is solved
# in validation mode with the forage calibration *disabled* so that the
# slack on ruminant-forage buses reveals per-country supply/demand gaps.
# ``compute_grassland_calibration`` then converts those gaps into yield,
# conversion, and exogenous-forage corrections.
#
# Usage:
#   tools/calibrate grassland
#
# Or equivalently (tools/calibrate is just a thin wrapper):
#   tools/smk --configfile config/calibration/grassland.yaml -- \
#     data/curated/calibration/grassland_yield.csv \
#     data/curated/calibration/fodder_conversion.csv \
#     data/curated/calibration/exogenous_forage.csv

name: "grassland_calibration"

scenarios:
  uncalibrated:
    grazing:
      grassland_forage_calibration:
        enabled: false

planning_horizon: 2020

validation:
  use_actual_yields: true
  use_actual_production: true
  enforce_baseline_diet: true
  enforce_baseline_feed: true
  disable_spared_cropland: true
  disable_spared_grassland: true
  slack_marginal_cost: 10

cost_calibration:
  enabled: false

grazing:
  grassland_forage_calibration:
    generate: true
    scenario: uncalibrated

health:
  value_per_yll: 0

emissions:
  ghg_pricing_enabled: false

solving:
  io_api: "direct"
  solver: "gurobi"
  threads: 2
