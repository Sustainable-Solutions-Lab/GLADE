# Global Sensitivity Analysis with Fixed Diet
# -------------------------------------------
# Companion to `gsa.yaml`: same production-side uncertainties, but the
# optimizer is constrained to the baseline diet via
# `validation.enforce_baseline_diet: true`. With consumption pinned, the
# problem reduces to a least-cost production sweep; diet-specific dials
# (piecewise food utility, consumer values, YLL weighting, relative-risk
# quantiles) drop out.
#
# Differences vs. gsa.yaml:
#   - `enforce_baseline_diet: true` applied at the base config (and thus
#     every scenario).
#   - `food_utility_piecewise.enabled: false` (required with enforce_baseline_diet).
#   - No baseline calibration scenarios — consumer values are not used.
#   - Parameters `rr_protective`, `rr_harmful`, `value_per_yll` dropped
#     (they only steer the optimum through diet choice, which is now fixed).
#   - Single production-stability regime (the calibrated one).

name: "gsa_fixed_diet"

scenarios:
  # GSA Scenarios (fixed diet)
  # --------------------------
  # Space-filling Sobol sequence transformed via inverse CDF.
  #
  # Parameters (see docs/sensitivity_analysis.rst for justification/refs):
  #   - yield_factor: 0.8-1.2 uniform (20% uncertainty in crop yields)
  #   - ch4_factor:   0.5-1.5 normal 90% CI (EF + GWP100 uncertainty)
  #   - n2o_factor:   0.3-1.7 normal 90% CI (EF + GWP100 uncertainty)
  #   - luc_factor:   0.3-1.7 normal 90% CI (70% uncertainty in LUC emissions)
  #   - flw_factor:   0.7-1.3 uniform (30% uncertainty in food loss & waste)
  #   - fcr_factor:   0.8-1.2 uniform (20% uncertainty in feed conversion ratios)
  #   - ghg_price:    log-uniform 5-500 USD/tCO2eq (slice parameter)

  # Reference scenario with no sensitivity adjustments and zero GHG price.
  default:
    emissions:
      ghg_price: 0

  _generators:
    - name: gsa-fd_{sample_id}
      mode: sensitivity
      samples: 8192
      slice_parameters: [ghg_price]
      parameter_groups:
        "Emission factors": [ch4_factor, n2o_factor, luc_factor]
        "Agricultural": [yield_factor, flw_factor, fcr_factor]
      parameters:
        yield_factor:
          lower: 0.8
          upper: 1.2
          bounds: [0, null]
        ch4_factor:
          distribution: normal_ci
          lower: 0.5
          upper: 1.5
          confidence: 0.9
          bounds: [0, null]
        n2o_factor:
          distribution: normal_ci
          lower: 0.3
          upper: 1.7
          confidence: 0.9
          bounds: [0, null]
        luc_factor:
          distribution: normal_ci
          lower: 0.3
          upper: 1.7
          confidence: 0.9
          bounds: [0, null]
        flw_factor:
          lower: 0.7
          upper: 1.3
          bounds: [0, null]
        fcr_factor:
          lower: 0.8
          upper: 1.2
          bounds: [0, null]
        ghg_price:
          distribution: log_uniform
          lower: 5
          upper: 500
      template:
        sensitivity:
          crop_yields:
            all: "{yield_factor}"
          emission_factors:
            ch4: "{ch4_factor}"
            n2o: "{n2o_factor}"
            luc: "{luc_factor}"
          food_loss_waste: "{flw_factor}"
          feed_conversion: "{fcr_factor}"
        emissions:
          ghg_price: "{ghg_price}"

# Surrogate-based sensitivity analysis methods.
# Each method is applied independently to the same solved GSA scenarios.
sensitivity_analysis:
  holdout_fraction: 0.15
  threads: 6
  # Downstream consumers (notebooks, uncertainty-band plots) load the bundle for
  # this method when no explicit choice is provided.  Must match a key under
  # ``methods``.
  default_surrogate: xgb
  methods:
    pce:
      grid_resolution: 15
      method_options:
        n_mc_conditional: 2048
        cross_truncation: 0.8
    rf:
      grid_resolution: 15
      method_options:
        n_estimators: 500
    mars:
      grid_resolution: 15
      method_options:
        max_terms: 50
        max_degree: 2
        penalty: 3.0
        n_knots: 25
    xgb:
      grid_resolution: 15
      method_options:
        n_estimators: 5000
        max_depth: 4
        learning_rate: 0.02
        subsample: 0.8
        colsample_bytree: 0.8
        min_child_weight: 5
        early_stopping_rounds: 50

# Match GDD baseline data (2018) via planning horizon / baseline year.
planning_horizon: 2020
baseline_year: 2020

# Piecewise food utility is incompatible with enforce_baseline_diet.
food_utility_piecewise:
  enabled: false

# Fix consumption to the baseline diet and keep the calibrated L1
# production-stability regime used in gsa.yaml.
validation:
  use_actual_yields: true
  enforce_baseline_diet: true
  production_stability:
    enabled: true
    penalty_mode: "l1"
    deviation_type: "absolute"

# Keep post-hoc YLL evaluation disabled: diet is fixed, so health outputs
# would be essentially constant across scenarios and just add solve time.
health:
  enabled: false

# Compare all scenarios in plots
plotting:
  comparison_scenarios: "all"

solving:
  solver: "gurobi"
  io_api: "direct"
  threads: 2
  mem_mb: 9000
  # Fixed-diet runs are pure LPs (no MIP from piecewise utility/health valuation)
  # and typically solve in <1 min. Keep budgets tight so SLURM allocations
  # are small and scheduling stays favourable.
  time_limit: 5   # Hard limit (minutes)
  runtime: 2      # Initial limit before retries for more favourable slurm scheduling
  inline_analysis: true  # Fuse solve + analyze to avoid writing intermediate .nc files
