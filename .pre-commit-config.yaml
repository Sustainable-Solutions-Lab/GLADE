repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        name: ruff (linter)
        args: [--fix]
      - id: ruff-format
        name: ruff (formatter)
  - repo: https://github.com/snakemake/snakefmt
    rev: v0.11.4
    hooks:
      - id: snakefmt
  - repo: https://github.com/fsfe/reuse-tool
    rev: v4.0.3
    hooks:
      - id: reuse
  - repo: local
    hooks:
      - id: worktree-symlinks
        name: symlink shared directories in worktrees
        entry: tools/hooks/worktree-symlinks
        language: script
        stages: [post-checkout]
        always_run: true
        pass_filenames: false
