# Configuration for generating documentation figures
# This inherits from default.yaml but uses coarser resolution for faster execution
# and to showcase global coverage without excessive computational cost

name: "doc_figures"

scenarios:
  # Scenario definitions for documentation figures
  # -----------------------------------------------
  # The 'default' scenario mirrors config/scenarios.yaml so existing doc figure
  # rules (which hardcode scen-default) keep working unchanged.
  #
  # The 'baseline' scenario fixes consumption to current-day levels and is used
  # to extract consumer values (dual variables) for piecewise food utility
  # calibration.
  #
  # The four trade-friction scenarios sweep trade costs from 0.25x to 100x the
  # baseline values. They use piecewise food utility (derived from the baseline
  # solve) to induce realistic demand, keeping the model as a pure LP for fast
  # solves.

  default: {}

  baseline:
    # Fixed consumption to extract consumer values (dual variables)
    validation:
      enforce_baseline_diet: true
    food_groups:
      fix_within_group_ratios:
        enabled: true

  # --- Trade friction scenarios for landing-page GIF ---
  # Each multiplies every cost_per_km and default_trade_cost_per_km by the
  # stated factor. All use piecewise food utility for demand incentives.

  free_trade:
    food_utility_piecewise:
      enabled: true
    food_groups:
      fix_within_group_ratios:
        enabled: true
    validation:
      production_stability:
        enabled: true
        penalty_mode: "l1"
    trade:
      crop_default_trade_cost_per_km: 0.0025
      crop_trade_cost_categories:
        bulk_dry_goods:
          cost_per_km: 0.0015
        bulky_fresh:
          cost_per_km: 0.0035
        perishable_high_value:
          cost_per_km: 0.0055
      food_default_trade_cost_per_km: 0.00525
      food_trade_cost_categories:
        chilled_meat:
          cost_per_km: 0.007
        dairy_and_eggs:
          cost_per_km: 0.006
      feed_default_trade_cost_per_km: 0.003
      feed_trade_cost_categories:
        grain_protein:
          cost_per_km: 0.0015
        forage:
          cost_per_km: 0.003
        bulky_low_quality:
          cost_per_km: 0.004

  default_trade:
    food_utility_piecewise:
      enabled: true
    food_groups:
      fix_within_group_ratios:
        enabled: true
    validation:
      production_stability:
        enabled: true
        penalty_mode: "l1"

  costly_trade:
    food_utility_piecewise:
      enabled: true
    food_groups:
      fix_within_group_ratios:
        enabled: true
    validation:
      production_stability:
        enabled: true
        penalty_mode: "l1"
    trade:
      crop_default_trade_cost_per_km: 0.04
      crop_trade_cost_categories:
        bulk_dry_goods:
          cost_per_km: 0.024
        bulky_fresh:
          cost_per_km: 0.056
        perishable_high_value:
          cost_per_km: 0.088
      food_default_trade_cost_per_km: 0.084
      food_trade_cost_categories:
        chilled_meat:
          cost_per_km: 0.112
        dairy_and_eggs:
          cost_per_km: 0.096
      feed_default_trade_cost_per_km: 0.048
      feed_trade_cost_categories:
        grain_protein:
          cost_per_km: 0.024
        forage:
          cost_per_km: 0.048
        bulky_low_quality:
          cost_per_km: 0.064

  autarky:
    food_utility_piecewise:
      enabled: true
    food_groups:
      fix_within_group_ratios:
        enabled: true
    validation:
      production_stability:
        enabled: true
        penalty_mode: "l1"
    trade:
      crop_default_trade_cost_per_km: 1.0
      crop_trade_cost_categories:
        bulk_dry_goods:
          cost_per_km: 0.6
        bulky_fresh:
          cost_per_km: 1.4
        perishable_high_value:
          cost_per_km: 2.2
      food_default_trade_cost_per_km: 2.1
      food_trade_cost_categories:
        chilled_meat:
          cost_per_km: 2.8
        dairy_and_eggs:
          cost_per_km: 2.4
      feed_default_trade_cost_per_km: 1.2
      feed_trade_cost_categories:
        grain_protein:
          cost_per_km: 0.6
        forage:
          cost_per_km: 1.2
        bulky_low_quality:
          cost_per_km: 1.6

# Disable health and GHG pricing globally for all doc figure scenarios
health:
  enabled: false

emissions:
  ghg_pricing_enabled: false

solving:
  solver: "gurobi"
