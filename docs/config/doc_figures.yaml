# Configuration for generating documentation figures
# This inherits from default.yaml but uses coarser resolution for faster execution
# and to showcase global coverage without excessive computational cost

name: "doc_figures"

scenarios:
  # Scenario definitions for documentation figures
  # -----------------------------------------------
  # The 'default' scenario mirrors config/scenarios.yaml so existing doc figure
  # rules (which hardcode scen-default) keep working unchanged.
  #
  # The 'baseline' scenario fixes consumption to current-day levels and is used
  # to extract consumer values (dual variables) for piecewise food utility
  # calibration.
  #
  # The GHG price scenarios sweep carbon prices from $0 to $500/tCO2-eq for the
  # landing-page production pattern GIF, showing how land use shifts under
  # increasing carbon pricing. All use piecewise food utility and l1 production
  # stability, matching the sensitivity analysis setup.

  default: {}

  baseline:
    # Fixed consumption to extract consumer values (dual variables).
    # Mirrors the `baseline` scenario in config/gsa.yaml so that the
    # extracted values match what GSA scenarios calibrate against.
    validation:
      enforce_baseline_diet: true
    food_utility_piecewise:
      enabled: false
    emissions:
      ghg_price: 0
    health:
      value_per_yll: 0

  # --- GHG price scenarios for landing-page GIF ---
  # Round numbers on a roughly log scale from $0 to $500/tCO2-eq.
  ghg_0: &ghg_base
    food_utility_piecewise: {enabled: true}
    macronutrients: {cal: {equal_to_baseline: true}}
    health: {value_per_yll: 0}
    emissions: {ghg_price: 0}

  ghg_10:
    <<: *ghg_base
    emissions: {ghg_price: 10}

  ghg_50:
    <<: *ghg_base
    emissions: {ghg_price: 50}

  ghg_200:
    <<: *ghg_base
    emissions: {ghg_price: 200}

  ghg_500:
    <<: *ghg_base
    emissions: {ghg_price: 500}

planning_horizon: 2020
baseline_year: 2020

# Enable piecewise utility at base level (blocks get built from baseline)
food_utility_piecewise:
  enabled: true

cost_calibration:
  enabled: true

validation:
  use_actual_yields: true

deviation_penalty:
  enabled: true
  penalty_mode: "l1"
  deviation_type: "absolute"

water:
  supply_scenario: "current_use"

health:
  enabled: false

solving:
  solver: "gurobi"
