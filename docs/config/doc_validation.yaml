# Standalone validation configuration for documentation figures.
# Mirrors config/validation.yaml but writes to results/doc_validation/ so
# documentation runs don't clobber the main validation workspace.
#
# We skip the ``uncalibrated`` scenario here: the grassland-forage
# calibration CSVs in ``data/curated/calibration/`` are committed to the
# repo, so the default ``grassland_forage_calibration`` block in
# ``config/default.yaml`` (``enabled: true, generate: false``) consumes
# them directly and there's no need to regenerate.

name: "doc_validation"

# The published results use the GDD-IA survey-based baseline diet (the
# calibration artefact set consumed here was fit against it).
diet:
  source: gdd_ia
scenarios:
  default: {}

planning_horizon: 2020

validation:
  use_actual_yields: true
  use_actual_production: true
  enforce_baseline_diet: true
  enforce_baseline_feed: true
  disable_spared_cropland: true
  disable_spared_grassland: true
  slack_marginal_cost: 10

deviation_penalty:
  enabled: false

cost_calibration:
  enabled: false

food_demand_calibration:
  enabled: false

# Health module on with zero objective weight: post-hoc YLL evaluation only.
health:
  enabled: true
  value_per_yll: 0

# With health on, the baseline diet is GBD-anchored, so consume the artefact
# set calibrated against that diet (the `default` set is anchoring-off).
calibration:
  source: "gbd-anchored"

emissions:
  ghg_pricing_enabled: false

solving:
  io_api: "direct"
  solver: "gurobi"
  threads: 2
