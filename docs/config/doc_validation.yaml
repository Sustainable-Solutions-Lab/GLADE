# Standalone validation configuration for documentation figures.
# Based on config/validation.yaml but with gurobi solver for consistency
# with other doc configs. Unlike a scenario override, top-level settings
# here are visible to processing rules that read config[...] directly.

name: "doc_validation"
scenarios:
  default: {}
  feed_calibrated:
    grazing:
      grassland_forage_calibration:
        enabled: false
  uncalibrated:
    animal_products:
      feed_efficiency_calibration:
        enabled: false
    grazing:
      grassland_forage_calibration:
        enabled: false

planning_horizon: 2020

validation:
  use_actual_yields: true
  use_actual_production: true
  enforce_baseline_diet: true
  enforce_baseline_feed: true
  disable_spared_cropland: true
  disable_spared_grassland: true
  slack_marginal_cost: 10
  grassland_yield_multiplier: 1.2

water:
  supply_scenario: current_use

residues:
  max_feed_fraction_by_region:
    Asia: 0.70

animal_products:
  feed_efficiency_regions: null
  feed_efficiency_calibration:
    generate: true
    scenario: uncalibrated

grazing:
  isimip_utilization_rate: 0.60
  forage_overlap_subtraction_alpha: 1.0
  grassland_forage_calibration:
    generate: true
    scenario: feed_calibrated

land:
  regional_limit: 1.

health:
  enabled: false

emissions:
  ghg_pricing_enabled: false

solving:
  solver: "gurobi"
