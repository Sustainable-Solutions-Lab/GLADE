# SPDX-License-Identifier: CC-BY-4.0

version = 1
SPDX-PackageName = "GLADE"
SPDX-PackageSupplier = "Koen van Greevenbroek"
SPDX-PackageDownloadLocation = "https://github.com/Sustainable-Solutions-Lab/GLADE"

[[annotations]]
path = [
    "data/manually_downloaded/IHME-GBD_2023-death-rates-2020.csv",
    "data/manually_downloaded/IHME_GBD_2019_RELATIVE_RISKS_Y2020M10D15.XLSX"
]
precedence = "aggregate"
SPDX-FileCopyrightText = "Institute for Health Metrics and Evaluation (IHME)"
SPDX-License-Identifier = "LicenseRef-IHME-NonCommercial"

[[annotations]]
path = "data/curated/M49-codes.csv"
precedence = "override"
SPDX-FileCopyrightText = "2026 United Nations Statistics Division"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
path = "data/curated/**.csv"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Koen van Greevenbroek"
SPDX-License-Identifier = "PDDL-1.0"

# Machine-generated calibration provenance stamps (written by
# workflow/scripts/write_calibration_provenance.py via tools/calibrate).
[[annotations]]
path = "data/curated/calibration/**/provenance.yaml"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Koen van Greevenbroek"
SPDX-License-Identifier = "CC-BY-4.0"

# Root LICENSE copy so GitHub detects the project license (it only scans the
# repository root, not LICENSES/). The canonical text lives in LICENSES/.
[[annotations]]
path = "LICENSE"
precedence = "override"
SPDX-FileCopyrightText = "2007 Free Software Foundation, Inc."
SPDX-License-Identifier = "GPL-3.0-or-later"

# IFA FUBC dataset (bundled due to Dryad API access restrictions)
[[annotations]]
path = "data/bundled/doi_10_5061_dryad_2rbnzs7qh__v20250311/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "Ludemann, Gruere, Heffer, Dobermann (2022)"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
path = "docs/_static/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Koen van Greevenbroek"
SPDX-License-Identifier = "CC-BY-4.0"

[[annotations]]
path = "pixi.lock"
precedence = "override"
SPDX-FileCopyrightText = "2026 Koen van Greevenbroek"
SPDX-License-Identifier = "CC0-1.0"

# Vendored D3 (minified) for the Carbon Price Dial widget. Overrides the
# docs/_static/** aggregate above, which would otherwise mislabel it.
[[annotations]]
path = "docs/_static/carbon-dial/lib/d3.min.js"
precedence = "override"
SPDX-FileCopyrightText = "2010-2023 Mike Bostock"
SPDX-License-Identifier = "ISC"

# Auto-generated benchmark outputs (gitignored)
[[annotations]]
path = "benchmarks/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Koen van Greevenbroek"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Jupyter notebooks: JSON format makes inline SPDX headers difficult to parse
[[annotations]]
path = "notebooks/*.ipynb"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Koen van Greevenbroek"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Tutorial notebooks rendered into the docs by MyST-NB.
[[annotations]]
path = "docs/tutorials/*.ipynb"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Koen van Greevenbroek"
SPDX-License-Identifier = "CC-BY-4.0"
