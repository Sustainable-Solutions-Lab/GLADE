version = 1
SPDX-PackageName = "food-opt"
SPDX-PackageSupplier = "Koen van Greevenbroek"
SPDX-PackageDownloadLocation = "https://github.com/koen-vg/food-opt"

[[annotations]]
path = [
    "data/manually_downloaded/GDD-dietary-intake/**",
    "data/manually_downloaded/GDD-dietary-intake/**.csv",
    "data/manually_downloaded/GDD-dietary-intake/**.xlsx"
]
precedence = "aggregate"
SPDX-FileCopyrightText = "Tufts University"
SPDX-License-Identifier = "LicenseRef-GDD-NonCommercial"

[[annotations]]
path = [
    "data/manually_downloaded/IHME-GBD_2023-death-rates-2020.csv",
    "data/manually_downloaded/IHME_GBD_2019_RELATIVE_RISKS_Y2020M10D15.XLSX"
]
precedence = "aggregate"
SPDX-FileCopyrightText = "Institute for Health Metrics and Evaluation (IHME)"
SPDX-License-Identifier = "LicenseRef-IHME-NonCommercial"

[[annotations]]
path = "data/curated/M49-codes.csv"
precedence = "override"
SPDX-FileCopyrightText = "2026 United Nations Statistics Division"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
path = "data/curated/**.csv"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Koen van Greevenbroek"
SPDX-License-Identifier = "PDDL-1.0"

# IFA FUBC dataset (bundled due to Dryad API access restrictions)
[[annotations]]
path = "data/bundled/doi_10_5061_dryad_2rbnzs7qh__v20250311/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "Ludemann, Gruere, Heffer, Dobermann (2022)"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
path = "docs/_static/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Koen van Greevenbroek"
SPDX-License-Identifier = "CC-BY-4.0"

[[annotations]]
path = "pixi.lock"
precedence = "override"
SPDX-FileCopyrightText = "2026 Koen van Greevenbroek"
SPDX-License-Identifier = "CC0-1.0"

# Auto-generated benchmark outputs (gitignored)
[[annotations]]
path = "benchmarks/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Koen van Greevenbroek"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Jupyter notebooks: JSON format makes inline SPDX headers difficult to parse
[[annotations]]
path = "notebooks/*.ipynb"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Koen van Greevenbroek"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Tutorial notebooks rendered into the docs by MyST-NB.
[[annotations]]
path = "docs/tutorials/*.ipynb"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Koen van Greevenbroek"
SPDX-License-Identifier = "CC-BY-4.0"

# Data-bundle README/ATTRIBUTIONS/CITATION templates: rendered into the
# bundle archive at build time. SPDX kept out of the templates themselves
# so the rendered output stays clean.
[[annotations]]
path = [
    "docs/data_bundle/README.template.md",
    "docs/data_bundle/ATTRIBUTIONS.template.md",
    "docs/data_bundle/CITATION.template.cff",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Koen van Greevenbroek"
SPDX-License-Identifier = "CC-BY-4.0"

# Local notes (gitignored). Kept covered for REUSE compliance when the
# directory exists in the working tree.
[[annotations]]
path = "notes/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Koen van Greevenbroek"
SPDX-License-Identifier = "CC-BY-4.0"
