# Small test configuration for sensitivity analysis
# Uses test config base (reduced resolution) with minimal GSA samples

name: "test_sensitivity"
scenarios:
  # Small sensitivity test scenarios
  # 3 parameters x 32 samples for fast testing

  # Default scenario for reference
  default: {}

  _generators:
    - name: gsa_{sample_id}
      mode: sensitivity
      samples: 32
      parameters:
        yield_factor:
          lower: 0.8
          upper: 1.2
        ch4_factor:
          lower: 0.7
          upper: 1.3
        luc_factor:
          lower: 0.5
          upper: 1.5
      template:
        sensitivity:
          crop_yields:
            all: "{yield_factor}"
          emission_factors:
            ch4: "{ch4_factor}"
            luc: "{luc_factor}"

sensitivity_analysis:
  holdout_fraction: 0.15
  methods:
    pce:
      grid_resolution: 10
      method_options:
        cross_truncation: 0.8

# Inherit from test config for fast execution
aggregation:
  regions:
    target_count: 200
  resource_class_quantiles: [0.5]
  irrigated_area_source: "current"

trade:
  hubs: 14

crops:
  - wheat
  - maize
  - soybean
  - white-potato

# Disable multi-cropping (requires wetland-rice which is not in test crop list)
multiple_cropping:
  double_rice: null
  rice_wheat: null

# Enable health for RR sensitivity testing
health:
  enabled: true
  value_per_yll: 50000

# Enable GHG pricing
emissions:
  ghg_pricing_enabled: true
  ghg_price: 100

# Use actual yields for more realistic results
validation:
  use_actual_yields: true

solving:
  solver: "highs"
  threads: 4
