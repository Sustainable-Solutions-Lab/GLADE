# Minimal test configuration for pytest integration tests.
# Inherits from default.yaml but uses reduced resolution for fast execution.

name: "test"

scenarios:
  # Toy scenarios for pytest integration tests.
  # Subset of production scenarios to exercise key code paths.

  default:
    health:
      enabled: false
    emissions:
      ghg_pricing_enabled: false

  G:
    health:
      enabled: false
    emissions:
      ghg_pricing_enabled: true

aggregation:
  regions:
    target_count: 200
  resource_class_quantiles: [0.5]
  irrigated_area_source: "current"

trade:
  hubs: 14

crops:
  - wheat
  - wetland-rice
  - maize
  - soybean
  - groundnut
  - rapeseed
  - white-potato
  - tomato
  - banana
  - sugarcane
