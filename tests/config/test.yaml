# Minimal test configuration for pytest integration tests.
# Inherits from default.yaml but uses reduced resolution for fast execution.

name: "test"

scenario_defs: "tests/config/test_scenarios.yaml"

aggregation:
  regions:
    target_count: 200
  resource_class_quantiles: [0.5]
  irrigated_area_source: "current"

trade:
  hubs: 14

crops:
  - wheat
  - wetland-rice
  - maize
  - soybean
  - groundnut
  - rapeseed
  - white-potato
  - tomato
  - banana
  - sugarcane
