# Minimal test configuration for pytest integration tests.
# Inherits from default.yaml but uses reduced resolution for fast execution.

name: "test"

# The test config knowingly reuses the default calibration artefacts at a
# much coarser structural resolution; calibration fidelity is irrelevant
# for the integration tests.
calibration:
  accept_provenance_mismatch: true

scenarios:
  # Toy scenarios for pytest integration tests.
  # Subset of production scenarios to exercise key code paths.

  default:
    emissions:
      ghg_pricing_enabled: false

  G:
    emissions:
      ghg_pricing_enabled: true

health:
  enabled: false

macronutrients:
  cal:
    min: 2400  # kcal/person/day

aggregation:
  regions:
    target_count: 200
  resource_class_quantiles: [0.5]
  irrigated_area_source: "current"

commodities:
  hubs: 14

crops:
  - wheat
  - wetland-rice
  - maize
  - soybean
  - groundnut
  - rapeseed
  - white-potato
  - tomato
  - banana
  - sugarcane
  - apple  # CROPGRIDS-backed crop; exercises build_crop_yields_cropgrids

# Inherited default.yaml lists apple here, but be explicit so the
# cropgrids_crops <-> crops invariant is obvious in the test config.
cropgrids_crops:
  - apple
